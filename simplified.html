function AdminBulkImport({showToast}) {
  const[mediaFiles,setMediaFiles]=useState({});
  const[uploadedMedia,setUploadedMedia]=useState({});
  const[parsedRows,setParsedRows]=useState([]);
  const[mediaProgress,setMediaProgress]=useState(0);
  const[mediaStatus,setMediaStatus]=useState('');
  const[importProgress,setImportProgress]=useState(0);
  const[importStatus,setImportStatus]=useState('');
  const[rowStatuses,setRowStatuses]=useState({});
  const[importing,setImporting]=useState(false);
  const[uploadingMedia,setUploadingMedia]=useState(false);
  const[connStatus,setConnStatus]=useState('');
  const fileRef=useRef();
  const csvRef=useRef();

  const cfg=sbCfg();
  const connected=!!cfg;
  const sbBucket=store.get('stellas_sb_bucket','videos')||'videos';

  async function testConn(){
    if(!cfg){setConnStatus('Set Supabase URL & Key in Settings first');return;}
    setConnStatus('Testing...');
    try{
      const r=await fetch(cfg.url+'/rest/v1/menu_items?limit=1',{
        headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
      });
      setConnStatus(r.ok?'Connected! Ready to import.':'Error '+r.status);
    }catch(e){setConnStatus('Error: '+e.message);}
  }

  function parseCSVLine(line){
    const r=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(line[i]===','&&!inQ){r.push(cur);cur='';}
      else cur+=line[i];
    }
    r.push(cur);return r;
  }

  function parseCSV(text){
    // Strip BOM, normalize Windows \r\n and Mac \r line endings
    text=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const lines=text.split('\n').filter(function(l){return l.trim();});
    if(lines.length<2){console.warn('[Bulk] CSV has fewer than 2 lines');return[];}
    const headers=parseCSVLine(lines[0]).map(function(h){return h.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');});
    console.log('[Bulk] CSV headers found:',headers);
    const rows=[];
    for(var i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=parseCSVLine(lines[i]);
      const row={};
      headers.forEach(function(h,idx){row[h]=(vals[idx]||'').trim();});
      // Accept row if it has a name field (check multiple possible column names)
      const rowName=row.name||row.item_name||row.item||'';
      if(rowName){
        if(!row.name)row.name=rowName; // normalize to 'name'
        rows.push(row);
      }
    }
    console.log('[Bulk] Parsed',rows.length,'rows from',lines.length-1,'data lines');
    return rows;
  }

  function downloadTemplate(){
    const hdr='name,price,category,description,ingredients,image_filename,video_filename,trigger_keywords,trigger_action,visible';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([hdr+'\n'],{type:'text/csv'}));
    a.download='stellas_menu_template.csv';a.click();
  }

  function downloadExample(){
    const rows=[
      'name,price,category,description,ingredients,image_filename,video_filename,trigger_keywords,trigger_action,visible',
      'Margherita Pizza,18,Mains,Classic pizza with San Marzano tomatoes and fresh mozzarella,flour|tomato|mozzarella|basil,margherita.jpg,margherita.mp4,"tell me about the margherita, show me the pizza",item-request,true',
      'Pepperoni Pizza,21,Mains,House sauce with pepperoni and mozzarella,flour|tomato|mozzarella|pepperoni,pepperoni.jpg,,"pepperoni pizza",item-request,true',
      'Tiramisu,12,Desserts,Classic tiramisu with mascarpone and espresso-soaked ladyfingers,mascarpone|espresso|ladyfingers|cocoa,tiramisu.jpg,tiramisu.mp4,"show me desserts, tiramisu",item-request,true',
    ];
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
    a.download='stellas_menu_example.csv';a.click();
  }

  function handleMediaFiles(files){
    const nf={...mediaFiles};
    for(const f of files)nf[f.name]=f;
    setMediaFiles(nf);
  }

  async function uploadAllMedia(){
    if(!cfg){showToast('Set Supabase credentials in Settings first');return;}
    const files=Object.values(mediaFiles);
    if(!files.length){showToast('No files selected');return;}
    setUploadingMedia(true);
    const uploaded={...uploadedMedia};
    for(let i=0;i<files.length;i++){
      const f=files[i];
      setMediaStatus('Uploading '+f.name+' ('+(i+1)+'/'+files.length+')...');
      setMediaProgress(Math.round(i/files.length*100));
      try{
        const res=await fetch(cfg.url+'/storage/v1/object/'+sbBucket+'/'+encodeURIComponent(f.name),{
          method:'POST',
          headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':f.type,'x-upsert':'true'},
          body:f
        });
        if(res.ok||res.status===200){
          uploaded[f.name]=cfg.url+'/storage/v1/object/public/'+sbBucket+'/'+encodeURIComponent(f.name);
        } else {
          const t=await res.text();
          console.error('[Bulk] Upload failed:',f.name,res.status,t);
        }
      }catch(e){console.warn('[Bulk] Upload error:',f.name,e.message);}
    }
    setUploadedMedia(uploaded);
    setMediaProgress(100);
    const n=Object.keys(uploaded).length;
    setMediaStatus(n+' file'+(n!==1?'s':'')+' uploaded!');
    setUploadingMedia(false);
    showToast(n+' files uploaded!');
  }

  function handleCSV(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const rows=parseCSV(e.target.result);
      if(!rows.length){showToast('No valid rows found in CSV');return;}
      setParsedRows(rows);
      setRowStatuses({});
      setImportProgress(0);
      setImportStatus('');
      showToast(rows.length+' items parsed and ready to import');
    };
    reader.readAsText(file);
  }

  async function importAll(){
    if(!cfg){showToast('Set Supabase credentials in Settings first');return;}
    if(!parsedRows.length){showToast('Upload a CSV first');return;}
    setImporting(true);
    const statuses={};
    let ok=0,fail=0;
    for(let i=0;i<parsedRows.length;i++){
      const row=parsedRows[i];
      statuses[i]='importing';
      setRowStatuses({...statuses});
      setImportProgress(Math.round(i/parsedRows.length*100));
      setImportStatus('Importing '+row.name+'... ('+(i+1)+'/'+parsedRows.length+')');
      try{
        const imgFile=row.image_filename||row.image||'';
        const vidFile=row.video_filename||row.video||'';
        const imgUrl=uploadedMedia[imgFile]
          ||(imgFile&&imgFile.startsWith('http')?imgFile:'')
          ||(imgFile?cfg.url+'/storage/v1/object/public/'+sbBucket+'/'+encodeURIComponent(imgFile):'')
          ||row.img_url||'';
        const vidUrl=uploadedMedia[vidFile]
          ||(vidFile&&vidFile.startsWith('http')?vidFile:'')
          ||row.video_url||'';
        const trigKw=row.trigger_keywords||'';
        const trigAction=row.trigger_action||'item-request';
        const triggers=trigKw?[{keywords:trigKw,action:trigAction,videoFilename:vidFile}]:[];
        // Build using JS app's field names so menuToSB() maps them correctly
        const item={
          id:Date.now()*100+i,
          name:row.name,
          price:parseFloat(row.price)||0,
          cat:row.category||row.cat||'Mains',
          desc:row.description||row.desc||'',
          ing:(row.ingredients||row.ing||'').replace(/\|/g,', '),
          imgUrl:imgUrl,
          videoUrl:vidUrl,
          videoFilename:vidFile,
          visible:row.visible!=='false',
          triggerKeywords:trigKw,
          triggerType:trigAction,
          triggers:triggers,
        };
        // Use the app's own sbUpsert+menuToSB — exact same path as saving from Menu tab
        await sbUpsert('menu_items', menuToSB(item));
        ok++;
        statuses[i]='ok';
      }catch(e){
        console.error('[Bulk] Failed:',row.name,e.message);
        fail++;
        statuses[i]='fail';
      }
      setRowStatuses({...statuses});
      await new Promise(function(resolve){setTimeout(resolve,150);});
    }
    setImportProgress(100);
    setImportStatus(ok+' imported'+(fail>0?', '+fail+' failed! Check console for errors.':'! Reloading menu...'));
    setImporting(false);
    showToast(ok+' items imported!');
    // Reload menu from Supabase so new items appear immediately without page refresh
    if(ok>0 && loadMenuData && setMenu){
      try{
        const freshMenu=await loadMenuData();
        if(freshMenu&&freshMenu.length){
          setMenu(freshMenu);
          showToast('Menu updated — '+freshMenu.length+' total items loaded!');
          setImportStatus(ok+' items imported and menu refreshed!');
        }
      }catch(e){
        console.warn('[Bulk] Menu reload failed:',e);
        showToast('Imported! Refresh the page to see new items.');
      }
    }
  }

  const mediaCount=Object.keys(mediaFiles).length;
  const dropStyle={border:'2px dashed var(--gold)',borderRadius:14,padding:24,textAlign:'center',cursor:'pointer',background:'rgba(201,168,76,.04)'};

  function ProgBar({pct}){
    return h('div',{style:{height:6,background:'rgba(201,168,76,.2)',borderRadius:3,overflow:'hidden',margin:'6px 0'}},
      h('div',{style:{height:'100%',background:'linear-gradient(to right,var(--green2),var(--gold))',width:pct+'%',transition:'width .3s'}})
    );
  }

  function SPill({s}){
    if(!s)return h('span',{style:{fontSize:11,color:'var(--text3)'}},'Ready');
    if(s==='importing')return h('span',{style:{fontSize:11,background:'rgba(201,168,76,.15)',color:'var(--gold3)',padding:'2px 8px',borderRadius:20,fontWeight:700}},'...');
    if(s==='ok')return h('span',{style:{fontSize:11,background:'rgba(42,90,64,.12)',color:'var(--green2)',padding:'2px 8px',borderRadius:20,fontWeight:700}},'Saved');
    return h('span',{style:{fontSize:11,background:'rgba(220,60,60,.1)',color:'var(--red)',padding:'2px 8px',borderRadius:20,fontWeight:700}},'Failed');
  }

  return h('div',null,

    h('div',{style:{marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Bulk Menu Import'),
      h('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},'Upload a CSV + images/videos to populate your menu at once')
    ),

    h('div',{className:'glass',style:{padding:12,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}},
      h('div',null,
        connected
          ? h('span',{style:{fontSize:13,color:'var(--green2)',fontWeight:700}},'Supabase connected')
          : h('span',{style:{fontSize:13,color:'var(--red)'}},'No Supabase credentials — go to Settings tab'),
        connStatus&&h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},connStatus)
      ),
      h('button',{className:'btn btn-gold btn-sm',onClick:testConn},'Test Connection')
    ),

    h('div',{className:'glass',style:{padding:16,marginBottom:14}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:8}},' Download CSV Template'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:6,marginBottom:12}},
        [{n:'name',d:'Required'},{n:'price',d:'Required'},{n:'category',d:'Starters, Mains...'},
         {n:'description',d:'Item description'},{n:'ingredients',d:'Use | between items'},
         {n:'image_filename',d:'e.g. pizza.jpg'},{n:'video_filename',d:'e.g. pizza.mp4'},
         {n:'trigger_keywords',d:'comma-separated'},{n:'trigger_action',d:'item-request'},
         {n:'visible',d:'true or false'}
        ].map(function(c){
          return h('div',{key:c.n,style:{background:'rgba(42,90,64,.08)',border:'1px solid rgba(42,90,64,.2)',borderRadius:8,padding:'5px 8px'}},
            h('div',{style:{fontSize:11,fontWeight:700,color:'var(--green2)'}},c.n),
            h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:1}},c.d)
          );
        })
      ),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
        h('button',{className:'btn btn-green btn-sm',onClick:downloadTemplate},'Download Blank Template'),
        h('button',{className:'btn btn-gold btn-sm',onClick:downloadExample},'Download Example (3 items)')
      )
    ),

    h('div',{className:'glass',style:{padding:16,marginBottom:14}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:4}},' Upload Images & Videos'),
      h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:10}},'Select all files at once. Max 50MB per file on Supabase free tier.'),
      h('div',{style:dropStyle,
        onClick:function(){if(fileRef.current)fileRef.current.click();},
        onDragOver:function(e){e.preventDefault();e.currentTarget.style.background='rgba(201,168,76,.12)';},
        onDragLeave:function(e){e.currentTarget.style.background='rgba(201,168,76,.04)';},
        onDrop:function(e){e.preventDefault();e.currentTarget.style.background='rgba(201,168,76,.04)';handleMediaFiles(e.dataTransfer.files);}
      },
        h('div',{style:{fontSize:28,marginBottom:4}},'Files'),
        h('div',{style:{fontSize:14,fontWeight:700,color:'var(--text1)'}},
          mediaCount>0?mediaCount+' file'+(mediaCount!==1?'s':'')+' selected':'Click or drag files here'
        ),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},'Images: .jpg .png .webp  Videos: .mp4 .mov')
      ),
      h('input',{ref:fileRef,type:'file',accept:'image/*,video/mp4,video/quicktime',multiple:true,
        style:{display:'none'},
        onChange:function(e){handleMediaFiles(e.target.files);}}),
      mediaCount>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}},
        Object.keys(mediaFiles).map(function(name){
          return h('div',{key:name,style:{
            background:'white',
            border:'1px solid '+(uploadedMedia[name]?'var(--green2)':'rgba(201,168,76,.3)'),
            borderRadius:8,padding:'3px 10px',fontSize:11,color:'var(--text2)',display:'flex',alignItems:'center',gap:5
          }},
            mediaFiles[name].type.startsWith('image/')?'IMG':'VID',
            ' ',name,
            uploadedMedia[name]?' OK':''
          );
        })
      ),
      mediaStatus&&h('div',{style:{marginTop:8}},
        h(ProgBar,{pct:mediaProgress}),
        h('div',{style:{fontSize:12,color:'var(--text2)'}},mediaStatus)
      ),
      mediaCount>0&&h('button',{
        className:'btn btn-green btn-sm',
        style:{marginTop:12,opacity:uploadingMedia?0.6:1},
        onClick:uploadAllMedia,
        disabled:uploadingMedia||!connected
      },uploadingMedia?'Uploading...':'Upload '+mediaCount+' File'+(mediaCount!==1?'s':'')+' to Supabase')
    ),

    h('div',{className:'glass',style:{padding:16,marginBottom:14}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:8}},' Upload Menu CSV'),
      h('div',{style:dropStyle,
        onClick:function(){if(csvRef.current)csvRef.current.click();},
        onDragOver:function(e){e.preventDefault();e.currentTarget.style.background='rgba(201,168,76,.12)';},
        onDragLeave:function(e){e.currentTarget.style.background='rgba(201,168,76,.04)';},
        onDrop:function(e){e.preventDefault();e.currentTarget.style.background='rgba(201,168,76,.04)';if(e.dataTransfer.files[0])handleCSV(e.dataTransfer.files[0]);}
      },
        h('div',{style:{fontSize:28,marginBottom:4}},parsedRows.length>0?'OK':'CSV'),
        h('div',{style:{fontSize:14,fontWeight:700,color:'var(--text1)'}},
          parsedRows.length>0?parsedRows.length+' items parsed and ready':'Click to select your CSV file'
        ),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},'menu.csv')
      ),
      h('input',{ref:csvRef,type:'file',accept:'.csv,text/csv',style:{display:'none'},
        onChange:function(e){if(e.target.files[0])handleCSV(e.target.files[0]);}})
    ),

    parsedRows.length>0&&h('div',{className:'glass',style:{padding:16}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)'}},' Preview & Import'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{
            className:'btn btn-green btn-sm',
            onClick:importAll,
            disabled:importing||!connected,
            style:{opacity:importing||!connected?0.6:1}
          },importing?'Importing...':'Import All ('+parsedRows.length+' items)'),
          h('button',{
            className:'btn btn-gold btn-sm',
            onClick:function(){setParsedRows([]);setRowStatuses({});setImportProgress(0);setImportStatus('');}
          },'Clear')
        )
      ),
      importStatus&&h('div',{style:{marginBottom:12}},
        h(ProgBar,{pct:importProgress}),
        h('div',{style:{fontSize:12,color:'var(--text2)'}},importStatus)
      ),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
          h('thead',null,
            h('tr',null,
              ['Name','Price','Category','Image','Video','Triggers','Status'].map(function(col){
                return h('th',{key:col,style:{background:'var(--green)',color:'white',padding:'8px 10px',textAlign:'left',fontSize:11}},col);
              })
            )
          ),
          h('tbody',null,
            parsedRows.map(function(row,i){
              const imgFile=row.image_filename||'';
              const vidFile=row.video_filename||'';
              const trigKw=row.trigger_keywords||'';
              const n=trigKw?trigKw.split(',').filter(function(t){return t.trim();}).length:0;
              const td={padding:'7px 10px',borderBottom:'1px solid rgba(201,168,76,.15)',verticalAlign:'middle'};
              return h('tr',{key:i},
                h('td',{style:td},h('strong',null,row.name)),
                h('td',{style:td},'$'+(row.price||'0')),
                h('td',{style:td},row.category||'Mains'),
                h('td',{style:td},imgFile||'—'),
                h('td',{style:td},vidFile||'—'),
                h('td',{style:td},n?n+' triggers':'—'),
                h('td',{style:td},h(SPill,{s:rowStatuses[i]}))
              );
            })
          )
        )
      )
    )
  );
}

// ==========================================
// MAIN APP (simplified - no voice, no text chat, no AI, no table mode)
// ==========================================
function App(){
  const[screen,setScreen]=useState('home');
  const[navTab,setNavTab]=useState('home');
  const[menu,setMenu]=useState(DEFAULT_MENU);
  const[messages,setMessages]=useState(DEFAULT_MESSAGES);
  const[faq,setFaq]=useState([]);
  const[tableOrders,setTableOrders]=useState(()=>store.get('stellas_orders',{}));
  const[selectedItem,setSelectedItem]=useState(null);
  const[responseText,setResponseText]=useState('');
  const[videoUrl,setVideoUrl]=useState('');
  const[showAdmin,setShowAdmin]=useState(false);
  const[adminAuth,setAdminAuth]=useState(false);
  const[adminTab,setAdminTab]=useState('live');
  const[toast,setToast]=useState('');
  const[homeTitles,setHomeTitles]=useState(()=>store.get('stellas_home_titles',{highlights:'Menu Highlights',picks:"Chef's Picks",picksCategory:'Mains'}));

  // Takeout state
  const[takeoutCart,setTakeoutCart]=useState([]);
  const[orderVersion,setOrderVersion]=useState(0);
  const[showTakeoutCart,setShowTakeoutCart]=useState(false);
  const[pendingTakeoutItem,setPendingTakeoutItem]=useState(null);
  const[takeoutConfirmed,setTakeoutConfirmed]=useState(null);
  const[lastOrderNum,setLastOrderNum]=useState('');

  // Load data on mount
  useEffect(()=>{
    loadMenuData().then(v=>{ if(v&&v.length) setMenu(v); });
    loadMessagesData().then(v=>{ if(v&&v.length) setMessages(v); });
    loadFAQData().then(v=>{ if(v&&v.length) setFaq(v); });
    try{ const s=localStorage.getItem('stellas_last_order'); if(s) setLastOrderNum(JSON.parse(s).orderNum); }catch(e){}
  },[]);

  function showToast(msg){setToast(msg);}

  // Navigate to response screen with item
  function handleItemSelect(item){
    setSelectedItem(item);
    setResponseText(`${item.name} is a guest favourite! ${item.desc?item.desc.split('.')[0]+'.':''}`);
    setVideoUrl(resolveVideoUrl(item));
    setScreen('response');
    setNavTab('home');
  }

  // Navigate to response screen with promo
  function handlePromoSelect(promo){
    setSelectedItem(null);
    setResponseText(promo.body || promo.title);
    setVideoUrl(resolveVideoUrl(promo));
    setScreen('response');
    setNavTab('home');
  }

  // Order handler (takeout only)
  function placeOrder(item){
    setPendingTakeoutItem(item);
  }

  // Confirm takeout item
  function confirmTakeoutItem(){
    const item = pendingTakeoutItem;
    if(!item){ setPendingTakeoutItem(null); return; }
    setTakeoutCart(c=>[...c, {...item, qty:1, time:Date.now(), status:'new'}]);
    setPendingTakeoutItem(null);
    showToast(item.name+' added to takeout!');
  }

  // Place full takeout order
  function placeTakeoutOrder(customer){
    if(takeoutCart.length===0) return;
    const orderNum = genOrderNum();
    const orderItems = [...takeoutCart];
    const subtotal = orderItems.reduce((s,i)=>s+(i.price||0),0);
    const existing = store.get('stellas_takeout_orders',[]);
    const newOrder = {
      orderNum, items:orderItems, subtotal,
      customer: customer||{name:'',phone:'',email:''},
      time:Date.now(), status:'new'
    };
    store.set('stellas_takeout_orders',[...existing, newOrder]);
    try{ localStorage.setItem('stellas_last_order', JSON.stringify({orderNum, items:orderItems, customer, time:Date.now()})); }catch(e){}
    setLastOrderNum(orderNum);
    setOrderVersion(v=>v+1);
    setTakeoutCart([]);
    setShowTakeoutCart(false);
    setTakeoutConfirmed({orderNum, items:orderItems, customer});
  }

  function handleNav(tab){
    setNavTab(tab);
    if(tab==='home') setScreen('home');
    else if(tab==='myorder') setScreen('myorder');
    else setScreen(tab);
  }

  const cartCount=takeoutCart.length;
  const pendingOrders=Object.values(tableOrders).flat().filter(o=>o.status!=='done').length;

  const adminTabs=[
    {id:'live',label:'Live',icon:I.activity},
    {id:'takeout',label:'Takeout',icon:I.bag},
    {id:'menu',label:'Menu',icon:I.menu},
    {id:'messages',label:'Messages',icon:I.msg},
    {id:'carousel',label:'Carousel',icon:I.promote},
    {id:'faq',label:'FAQ',icon:I.star},
    {id:'qr',label:'QR Codes',icon:I.qr},
    {id:'analytics',label:'Analytics',icon:I.star},
    {id:'settings',label:'Settings',icon:I.gear},
    {id:'bulk',label:'Bulk Import',icon:I.download},
  ];

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',width:'100%',background:'var(--cream)',position:'relative',overflow:'hidden'}},

    // Order confirmation full-screen page (takeout)
    takeoutConfirmed&&h(OrderConfirmPage,{
      orderNum:takeoutConfirmed.orderNum,
      items:takeoutConfirmed.items,
      customer:takeoutConfirmed.customer||null,
      onDone:()=>{
        setTakeoutConfirmed(null); setScreen('myorder'); setNavTab('myorder');
      }
    }),

    // Toast
    toast&&h(Toast,{msg:toast,onDone:()=>setToast('')}),

    // Takeout Cart drawer
    showTakeoutCart&&h(TakeoutCartDrawer,{
      cart:takeoutCart,setCart:setTakeoutCart,
      onClose:()=>setShowTakeoutCart(false),
      onCheckout:placeTakeoutOrder,
      showToast,
      onViewLastOrder:()=>{
        try{
          const s=localStorage.getItem('stellas_last_order');
          if(s){ setTakeoutConfirmed(JSON.parse(s)); setShowTakeoutCart(false); }
        }catch(e){}
      }
    }),

    // Takeout item confirm popup
    pendingTakeoutItem&&h(TakeoutConfirmPopup,{
      item:pendingTakeoutItem,
      onConfirm:confirmTakeoutItem,
      onCancel:()=>{setPendingTakeoutItem(null);showToast('No worries!');}
    }),

    // Admin
    showAdmin&&!adminAuth&&h(AdminLogin,{onLogin:()=>setAdminAuth(true)}),
    showAdmin&&adminAuth&&h('div',{className:'admin-wrap'},
      h('div',{className:'admin-header'},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,color:'var(--gold)'}},"Stella's Admin",pendingOrders>0&&h('span',{style:{marginLeft:8,background:'var(--red)',color:'white',fontSize:11,padding:'2px 8px',borderRadius:20,fontWeight:700}},pendingOrders)),
        h('button',{onClick:()=>{setShowAdmin(false);},style:{background:'transparent',border:'none',color:'var(--gold2)',fontSize:22,cursor:'pointer'}},'X')
      ),
      h('div',{className:'admin-tabs'},
        adminTabs.map(t=>h('button',{key:t.id,onClick:()=>setAdminTab(t.id),className:`atab ${adminTab===t.id?'active':''}`,style:{position:'relative'}},
          h('div',{style:{width:15,height:15}},t.icon),t.label,
          t.id==='live'&&pendingOrders>0&&h('span',{className:'badge'},pendingOrders)
        ))
      ),
      h('div',{className:'admin-body'},
        adminTab==='live'&&h(AdminLive,{tableOrders,setTableOrders,showToast}),
        adminTab==='takeout'&&h(AdminTakeout,{showToast}),
        adminTab==='menu'&&h(AdminMenu,{menu,setMenu,showToast}),
        adminTab==='messages'&&h(AdminMessages,{messages,setMessages,showToast}),
        adminTab==='carousel'&&h(AdminCarousel,{menu,showToast}),
        adminTab==='faq'&&h(AdminFAQ,{faq,setFaq,showToast}),
        adminTab==='qr'&&h(AdminQR,{tableOrders}),
        adminTab==='analytics'&&h(AdminAnalytics,{tableOrders}),
        adminTab==='settings'&&h(AdminSettingsPanel,{showToast}),
        adminTab==='bulk'&&h(AdminBulkImport,{showToast,setMenu,loadMenuData}),
      )
    ),

    // Customer UI
    !showAdmin&&h(AppHeader,{onAdminClick:()=>setShowAdmin(true),cartCount,
      onCartOpen:()=>setShowTakeoutCart(true)
    }),
    !showAdmin&&h('div',{className:'gold-divider'}),

    !showAdmin&&screen==='home'&&h(HomeScreen,{menu,messages,onItemSelect:handleItemSelect,onPromoSelect:handlePromoSelect,homeTitles:store.get('stellas_home_titles',homeTitles)}),
    !showAdmin&&screen==='response'&&h(ResponseScreen,{item:selectedItem,response:responseText,videoUrl,welcomeImgSrc:getWelcomeImage(messages)||'',onOrder:placeOrder,onBack:()=>{setScreen('home');setNavTab('home');}}),
    !showAdmin&&screen==='menu'&&h(MenuScreen,{menu,onItemSelect:handleItemSelect}),
    !showAdmin&&screen==='locations'&&h(LocationsScreen),
    !showAdmin&&screen==='myorder'&&h(MyOrderScreen,{key:orderVersion}),

    // Bottom nav (4 buttons, no center mic)
    !showAdmin&&h('div',{className:'bottom-nav'},
      [
        {id:'home',label:'Home',icon:I.home},
        {id:'menu',label:'Menu',icon:I.menu},
        {id:'locations',label:'Locations',icon:I.pin},
        {id:'myorder',label:'My Order',icon:I.receipt},
      ].map(item=>h('button',{key:item.id,className:`nav-btn ${navTab===item.id?'active':''}`,onClick:()=>handleNav(item.id)},h('div',{style:{width:22,height:22}},item.icon),h('span',null,item.label)))
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
