<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#1a3a2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Stella's AI Restaurant Host</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'Lato',sans-serif;background:#f5ede4}
#root{display:flex;flex-direction:column}

:root{
  --cream:#f5ede4;--cream2:#ede0d3;--cream3:#faf6f0;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#a07830;--gold4:#f0d890;
  --green:#1a3a2a;--green2:#2a5a40;--green3:#3a6a50;
  --text1:#2c1810;--text2:#5a4a3a;--text3:#8a7a6a;
  --red:#d44;--white:#fff;
  --shadow-float:0 8px 32px rgba(44,24,16,0.18),0 2px 8px rgba(201,168,76,0.15);
  --shadow-glow:0 0 24px rgba(201,168,76,0.35),0 8px 32px rgba(44,24,16,0.18);
  --shadow-btn:0 6px 24px rgba(26,58,42,0.45),0 2px 8px rgba(201,168,76,0.2),inset 0 1px 0 rgba(255,255,255,0.15);
  --shadow-card:0 4px 20px rgba(44,24,16,0.12),0 1px 4px rgba(201,168,76,0.1);
}

/* ─── GLASS CARD ─── */
.glass{
  background:linear-gradient(145deg,rgba(250,246,240,0.95),rgba(240,232,222,0.9));
  border:1.5px solid var(--gold);
  border-radius:20px;
  box-shadow:var(--shadow-float);
  backdrop-filter:blur(10px);
}
.glass-hover{transition:transform .2s,box-shadow .2s}
.glass-hover:active{transform:scale(0.97);box-shadow:var(--shadow-glow)}

/* ─── AVATAR FRAME ─── */
.avatar-frame{
  border-radius:0;
  border-left:none;border-right:none;
  border-top:2px solid var(--gold);
  border-bottom:2px solid var(--gold);
  overflow:hidden;
  position:relative;
  box-shadow:var(--shadow-glow);
  width:100%;
}
.avatar-frame img{width:100%;height:100%;object-fit:cover;object-position:top center}

/* ─── SPARKLE OVERLAY ─── */
.sparkle-overlay{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(to top,rgba(201,168,76,0.2) 0%,transparent 100%);
  pointer-events:none;
}
@keyframes floatSp{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-40px) scale(0);opacity:0}}
.sp{position:absolute;border-radius:50%;background:var(--gold2);animation:floatSp 2.5s ease-out infinite}

/* ─── BUTTONS ─── */
.btn{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Lato',sans-serif;transition:all .2s;-webkit-appearance:none;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at center,rgba(255,255,255,0.2),transparent 60%);opacity:0;transition:opacity .3s}
.btn:active::after{opacity:1}
.btn:active{transform:scale(0.96)}

.btn-green{
  background:linear-gradient(145deg,var(--green2),var(--green));
  color:white;border-radius:50px;padding:14px 28px;font-size:16px;font-weight:700;letter-spacing:.5px;
  box-shadow:var(--shadow-btn);
}
.btn-gold{
  background:linear-gradient(145deg,var(--cream3),var(--cream2));
  color:var(--text1);border:1.5px solid var(--gold);border-radius:50px;padding:14px 28px;font-size:16px;
  box-shadow:0 4px 16px rgba(201,168,76,0.2),0 2px 6px rgba(44,24,16,0.1);
}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-icon{width:22px;height:22px;flex-shrink:0}

/* ─── SPEECH BUBBLE ─── */
.bubble{
  background:linear-gradient(145deg,var(--cream3),var(--cream2));
  border:1.5px solid var(--gold);border-radius:20px;padding:16px 20px;
  position:relative;
  box-shadow:var(--shadow-float);
}
.bubble::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  border:10px solid transparent;border-top-color:var(--gold);border-bottom:0}
.bubble::before{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);z-index:1;
  border:9px solid transparent;border-top-color:var(--cream2);border-bottom:0}

/* ─── HEADER ─── */
.app-header{text-align:center;padding:12px 16px 6px;flex-shrink:0;position:relative}
.app-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold3);letter-spacing:4px;text-transform:uppercase}
.subtitle-line{font-size:12px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:8px}
.subtitle-line::before,.subtitle-line::after{content:'';height:1px;width:40px;background:linear-gradient(to right,transparent,var(--gold))}
.subtitle-line::after{background:linear-gradient(to left,transparent,var(--gold))}
.gold-divider{height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);flex-shrink:0}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  background:linear-gradient(145deg,var(--cream3),var(--cream2));
  border-top:1.5px solid var(--gold);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0;
  box-shadow:0 -4px 20px rgba(201,168,76,0.12);
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;
  cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Lato',sans-serif;font-size:10px;transition:all .2s}
.nav-btn.active{color:var(--gold3)}
.nav-btn svg{width:22px;height:22px}
.nav-talk{
  background:linear-gradient(145deg,var(--green2),var(--green));
  border-radius:50%;width:52px;height:52px;margin-top:-14px;
  border:3px solid var(--gold2);box-shadow:var(--shadow-glow);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:white;transition:all .2s;flex-shrink:0;
}
.nav-talk:active{transform:scale(0.93)}

/* ─── SCROLL ─── */
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.main-scroll::-webkit-scrollbar{display:none}

/* ─── LISTENING WAVE ─── */
@keyframes wavebar{0%,100%{height:4px}50%{height:22px}}
.wbar{width:4px;border-radius:3px;background:var(--gold2);animation:wavebar .8s ease-in-out infinite;min-height:4px}
@keyframes pulsemic{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.6),var(--shadow-btn)}50%{box-shadow:0 0 0 20px rgba(201,168,76,.05),var(--shadow-btn)}}
.mic-pulse{animation:pulsemic 1.6s ease-in-out infinite}

/* ─── TOGGLE ─── */
.tgl{position:relative;width:44px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s}
.tgl-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tgl input:checked+.tgl-slider{background:var(--green2)}
.tgl input:checked+.tgl-slider::before{transform:translateX(20px)}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(3px)}
.sheet{background:var(--cream);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;
  box-shadow:0 -8px 40px rgba(44,24,16,0.2);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text1)}
.close-btn{border:none;background:transparent;font-size:24px;cursor:pointer;color:var(--text3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}

/* ─── INPUTS ─── */
input,textarea,select{font-family:'Lato',sans-serif;font-size:14px}
.field{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--gold);background:white;color:var(--text1);font-size:14px;transition:border-color .2s}
.field:focus{outline:none;border-color:var(--green2);box-shadow:0 0 0 3px rgba(42,90,64,.1)}
.label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:700;letter-spacing:.3px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}

/* ─── FEATURED CARD ─── */
.feat-card{
  border-radius:16px;overflow:hidden;border:1.5px solid var(--gold);
  box-shadow:var(--shadow-float);cursor:pointer;transition:transform .2s;flex-shrink:0;width:160px;
  position:relative;
}
.feat-card:active{transform:scale(.97)}
.feat-card img{width:100%;height:100px;object-fit:cover}
.feat-label{padding:8px 10px;background:linear-gradient(145deg,var(--cream3),var(--cream2))}
.feat-label-title{font-family:'Playfair Display',serif;font-size:13px;color:var(--text1);font-weight:700}
.feat-label-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ─── HSCROLL ─── */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:4px 16px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}

/* ─── SECTION HEADER ─── */
.section-head{display:flex;align-items:center;gap:10px;padding:14px 16px 4px}
.section-head-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text1);white-space:nowrap}
.section-head-line{flex:1;height:1px;background:linear-gradient(to right,var(--gold),transparent)}

/* ─── TABLE BADGE ─── */
.table-badge{
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  color:white;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;
  box-shadow:0 2px 8px rgba(201,168,76,.4);letter-spacing:.5px;
}

/* ─── ORDER ITEM ─── */
.order-item{
  display:flex;align-items:center;gap:10px;padding:12px;
  background:white;border-radius:12px;border:1px solid rgba(201,168,76,.3);
  box-shadow:0 2px 8px rgba(44,24,16,.06);margin-bottom:8px;
}
.order-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.status-new{background:#fff3e0;color:#e67e22}
.status-making{background:#e8f5e9;color:#27ae60}
.status-ready{background:#e3f2fd;color:#1976d2}
.status-done{background:#f3e5f5;color:#7b1fa2}

/* ─── ADMIN ─── */
.admin-wrap{position:fixed;inset:0;display:flex;flex-direction:column;z-index:200;background:var(--cream)}
.admin-header{background:var(--green);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.admin-tabs{display:flex;background:var(--green2);padding:0 8px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.admin-tabs::-webkit-scrollbar{display:none}
.atab{display:flex;align-items:center;gap:6px;padding:11px 14px;background:transparent;
  color:rgba(255,255,255,.65);border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;
  border-radius:8px 8px 0 0;white-space:nowrap;transition:all .2s}
.atab.active{background:var(--cream);color:var(--text1)}
.atab svg{width:16px;height:16px}
.admin-body{flex:1;overflow-y:auto;padding:16px}

/* ─── LIVE TABLE CARD ─── */
.table-card{
  background:white;border-radius:16px;border:1.5px solid var(--gold);
  box-shadow:var(--shadow-float);margin-bottom:12px;overflow:hidden;
}
.table-card-head{
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
}

/* ─── PROMO CARD ─── */
.promo-card{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-float);border:1.5px solid var(--gold);background:var(--cream3)}

/* ─── CHART BARS ─── */
.cbar{background:var(--green2);border-radius:4px 4px 0 0;transition:height .5s ease;min-height:2px}

/* ─── ANIMATIONS ─── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* ─── BADGE ─── */
.badge{
  position:absolute;top:-4px;right:-4px;background:var(--red);color:white;
  border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--cream);
}

/* ─── FILE UPLOAD ─── */
.file-drop{
  border:2px dashed var(--gold);border-radius:12px;padding:20px;text-align:center;
  cursor:pointer;transition:all .2s;background:rgba(201,168,76,.04);
}
.file-drop:hover{background:rgba(201,168,76,.08);border-color:var(--gold3)}

/* ─── NOTIFICATION TOAST ─── */
@keyframes toastIn{from{transform:translateY(-80px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{transform:translateY(0);opacity:1}to{transform:translateY(-80px);opacity:0}}
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;
  box-shadow:var(--shadow-glow);white-space:nowrap;
  animation:toastIn .4s ease forwards;
}
.toast.out{animation:toastOut .4s ease forwards}

/* ─── VIDEO PLAYER ─── */
.video-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.video-overlay video{width:100%;max-width:480px;border-radius:16px;border:2px solid var(--gold)}

/* ─── VIDEO — no controls, no overlay ─── */
video{outline:none;-webkit-appearance:none}
video::-webkit-media-controls{display:none!important}
video::-webkit-media-controls-enclosure{display:none!important}
video::-webkit-media-controls-panel{display:none!important}
video::--webkit-media-controls-play-button{display:none!important}
video::-webkit-media-controls-start-playback-button{display:none!important}
.avatar-video-wrap{width:100%;position:relative;background:#000;border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);box-shadow:var(--shadow-glow);overflow:hidden}
.avatar-video-wrap video{width:100%;height:100%;display:block;object-fit:cover;object-position:top center;pointer-events:none}
/* ─── IDLE BREATHING — makes static image feel alive ─── */
@keyframes idleBreathe{
  0%,100%{transform:scale(1) translateY(0);filter:brightness(1)}
  40%{transform:scale(1.012) translateY(-3px);filter:brightness(1.03)}
  60%{transform:scale(1.008) translateY(-2px);filter:brightness(1.02)}
}
.idle-breathe{
  animation:idleBreathe 4s ease-in-out infinite;
  transform-origin:center bottom;
}
/* ─── CART DRAWER ─── */
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;width:88%;max-width:360px;
  background:var(--cream);z-index:250;
  box-shadow:-8px 0 40px rgba(44,24,16,.2);
  display:flex;flex-direction:column;
  animation:slideInRight .28s ease;
}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:249;backdrop-filter:blur(2px);}
.cart-header{background:var(--green);padding:16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.cart-item{display:flex;gap:10px;padding:12px;background:white;border-radius:12px;border:1px solid rgba(201,168,76,.2);margin-bottom:8px;box-shadow:var(--shadow-card);}
/* ─── ORDER CONFIRM POPUP ─── */
@keyframes slideUpBar{from{transform:translateY(100%)}to{transform:translateY(0)}}
.order-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:flex-end;}
.order-confirm-popup{
  background:var(--cream);width:100%;
  border-top:2px solid var(--gold);
  border-radius:20px 20px 0 0;
  padding:16px 16px 28px;
  box-shadow:0 -8px 32px rgba(44,24,16,.18);
  animation:slideUpBar .28s ease;
}
/* ─── VOLUME SLIDER ─── */
.vol-wrap{position:absolute;bottom:14;right:14;z-index:4;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.62);border:1.5px solid rgba(255,255,255,.2);border-radius:50px;padding:6px 12px;backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.35);}
.vol-btn{background:transparent;border:none;color:white;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.vol-slider{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:2px;background:rgba(255,255,255,.3);outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4);}
/* ─── SETTINGS PROVIDER CARD ─── */
.provider-card{
  padding:10px 12px;border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;
  border:2px solid rgba(201,168,76,.25);background:white;
  box-shadow:var(--shadow-card);
}
.provider-card.active{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-color:var(--green2);box-shadow:var(--shadow-btn);
}
/* ─── KEY MASK ─── */
.key-masked{font-family:monospace;letter-spacing:2px}
/* ─── LIVE BADGE ─── */
.live-badge{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.65);padding:4px 12px;border-radius:20px;
  font-size:12px;font-weight:700;backdrop-filter:blur(6px);
}
/* ─── SEGMENTED CONTROL ─── */
.seg-wrap{display:flex;gap:6px;background:rgba(201,168,76,.1);borderRadius:14px;padding:4px}
input[type=file]{display:none}

/* ─── ORDER CONFIRM PAGE ─── */
@keyframes popIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.ocp-wrap{
  position:fixed;inset:0;z-index:500;
  background:var(--green);
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
}
.ocp-check{font-size:64px;animation:popIn .5s ease forwards;display:block;text-align:center;margin-bottom:10px;}
.ocp-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);font-weight:700;text-align:center;margin-bottom:4px;animation:fadeUp .4s .1s ease both;}
.ocp-sub{font-size:13px;color:rgba(255,255,255,.65);text-align:center;margin-bottom:24px;letter-spacing:.3px;animation:fadeUp .4s .15s ease both;}
.ocp-bubble{
  background:linear-gradient(145deg,var(--gold2),var(--gold3));
  border-radius:20px;padding:18px 32px;margin-bottom:20px;text-align:center;
  box-shadow:0 8px 32px rgba(201,168,76,.4);
  animation:fadeUp .4s .2s ease both;width:100%;max-width:340px;
}
.ocp-bubble-label{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.8);margin-bottom:6px;text-transform:uppercase;}
.ocp-bubble-num{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:white;letter-spacing:2px;line-height:1;}
.ocp-receipt{
  width:100%;max-width:340px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(201,168,76,.25);
  border-radius:16px;padding:14px 16px;margin-bottom:16px;
  animation:fadeUp .4s .25s ease both;
}
.ocp-line{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;color:rgba(255,255,255,.85);}
.ocp-line-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin:4px 0;}
.ocp-line-sub{font-size:12px;color:rgba(255,255,255,.5);}
.ocp-line-total{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);font-weight:700;border-top:1px solid rgba(201,168,76,.35);padding-top:10px;margin-top:4px;}
.ocp-hint{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:24px;animation:fadeUp .4s .3s ease both;}
.ocp-btn{
  background:linear-gradient(145deg,var(--gold),var(--gold3));color:white;

const store={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn('localStorage set failed:',k,e);}},
};

// ==============================================================
// DATA LAYER -- Supabase-first, IndexedDB offline cache
// All menu/messages/faq read from Supabase on startup.
// Every save writes to BOTH Supabase AND IndexedDB (offline cache).
// If Supabase is not configured, falls back to IndexedDB only.
// This means data survives redeployments, device changes, URL changes.
// ==============================================================

// -- IndexedDB (offline cache) ----------------------------------
const DB_NAME='stellas_db';
const DB_VER=1;
let _db=null;
function openDB(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');};
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=()=>rej(req.error);
  });
}
async function idbSet(key,value){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(value,key);
      tx.oncomplete=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }catch(e){console.warn('idbSet fallback:',e);store.set(key,value);}
}
async function idbGet(key,defaultVal){
  try{
    const db=await openDB();
    return new Promise((res)=>{
      const req=db.transaction('kv','readonly').objectStore('kv').get(key);
      req.onsuccess=()=>res(req.result!==undefined?req.result:defaultVal);
      req.onerror=()=>res(defaultVal);
    });
  }catch(e){return store.get(key,defaultVal);}
}
function idbGetSync(key,defaultVal){return store.get(key+'_cache',defaultVal);}

// -- Supabase REST helpers --------------------------------------
function sbCfg(){
  const url=store.get('stellas_sb_url','').replace(/\/$/,'');
  const key=store.get('stellas_sb_key','');
  return url&&key?{url,key}:null;
}
function sbHeaders(cfg){
  return{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=minimal'};
}

// Upsert a row (insert or update by id)
async function sbUpsert(table, row){
  const cfg=sbCfg();if(!cfg)return;
  try{
    const res=await fetch(cfg.url+'/rest/v1/'+table,{
      method:'POST',
      headers:{...sbHeaders(cfg),'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(row)
    });
    if(!res.ok){const t=await res.text();console.error('[SB] upsert',table,'failed:',t);}
  }catch(e){console.error('[SB] upsert error:',e.message);}
}

// Delete a row by id
async function sbDelete(table, id){
  const cfg=sbCfg();if(!cfg)return;
  try{
    await fetch(cfg.url+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbHeaders(cfg)});
  }catch(e){console.error('[SB] delete error:',e.message);}
}

// Load a full table, ordered by id
async function sbLoadAll(table){
  const cfg=sbCfg();if(!cfg)return null;
  try{
    const res=await fetch(cfg.url+'/rest/v1/'+table+'?order=id.asc&limit=1000',{
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
    });
    if(!res.ok)return null;
    return await res.json();
  }catch(e){console.error('[SB] load',table,'error:',e.message);return null;}
}

// -- UNIFIED SAVE: writes to Supabase + IndexedDB cache ---------
async function saveMenu(updatedMenu, showToastFn){
  await idbSet('stellas_menu', updatedMenu);
  const cfg=sbCfg();
  if(cfg){
    // Upsert all items in parallel (fast)
    await Promise.all(updatedMenu.map(item=>sbUpsert('menu_items', menuToSB(item))));
    console.log('[SB] Menu saved to Supabase:', updatedMenu.length, 'items');
  }
  if(showToastFn) showToastFn('✓ Saved');
}

  await idbSet('stellas_messages', updatedMsgs);

    await Promise.all(updatedMsgs.map(m=>sbUpsert('messages', msgToSB(m))));
    console.log('[SB] Messages saved to Supabase:', updatedMsgs.length);
  }
  if(showToastFn) showToastFn('✓ Saved');
}

// -- STARTUP LOAD: Supabase first, IndexedDB fallback -----------
async function loadMenuData(){
  const sbRows = await sbLoadAll('menu_items');
  if(sbRows && sbRows.length){
    const items = sbRows.map(menuFromSB);
    console.log('[SB] Loaded menu from Supabase:', items.length, 'items');
    await idbSet('stellas_menu', items); // keep cache in sync
    return items;
  }
  // Supabase not configured or empty -- use IndexedDB cache
  const cached = await idbGet('stellas_menu', null);
  if(cached && cached.length){ console.log('[IDB] Loaded menu from IndexedDB cache'); return cached; }
  return null;
}

async function loadMessagesData(){
  const sbRows = await sbLoadAll('messages');
  if(sbRows && sbRows.length){
    const msgs = sbRows.map(msgFromSB);
    console.log('[SB] Loaded messages from Supabase:', msgs.length);
    await idbSet('stellas_messages', msgs);
    return msgs;
  }
  const cached = await idbGet('stellas_messages', null);
  if(cached && cached.length){ console.log('[IDB] Loaded messages from IndexedDB cache'); return cached; }
  return null;
}

async function loadFAQData(){
  const sbRows = await sbLoadAll('faq_info');
  if(sbRows && sbRows.length){
    console.log('[SB] Loaded FAQ from Supabase:', sbRows.length);
    await idbSet('stellas_faq', sbRows);
    return sbRows;
  }
  const cached = await idbGet('stellas_faq', null);
  if(cached && cached.length){ console.log('[IDB] Loaded FAQ from IndexedDB cache'); return cached; }
  return null;
}

// ==========================================
// FUZZY ITEM MATCHER -- tolerant, keyword-aware
// ==========================================
function matchMenuItem(rawName, menu) {
  if (!rawName || rawName.toLowerCase() === 'none') return null;
  const q = rawName.toLowerCase().trim();
  const items = menu.filter(i => i.visible);
  // Exact
  let hit = items.find(i => i.name.toLowerCase() === q); if (hit) return hit;
  // Name contains query
  hit = items.find(i => i.name.toLowerCase().includes(q)); if (hit) return hit;
  // Query contains name
  hit = items.find(i => q.includes(i.name.toLowerCase())); if (hit) return hit;
  // Scored: name(5) + any field(2) + stem partial(1)
  const qW = q.split(/\s+/).filter(w => w.length > 2);
  if (!qW.length) return null;
  let best = 0, bestIt = null;
  for (const item of items) {
    const nl = item.name.toLowerCase();
    const hay = [nl,(item.desc||'').toLowerCase(),(item.ing||'').toLowerCase(),(item.cat||'').toLowerCase(),(item.triggerKeywords||'').toLowerCase()].join(' ');
    const hw = hay.split(/\s+/);
    let sc = 0;
    for (const w of qW) {
      if (nl.includes(w)) { sc += 5; continue; }
      if (hay.includes(w)) { sc += 2; continue; }
      for (const h of hw) { if (h.length>3&&w.length>3&&(h.includes(w)||w.includes(h))){ sc+=1; break; } }
    }
    if (sc > best) { best = sc; bestIt = item; }
  }
  return best >= 1 ? bestIt : null;
}

// ==========================================
// CATEGORY SEARCH -- "what are your desserts", "show me lunch", etc.
// Returns matching items by category. Reuses the ingredient list card UI.
// ==========================================
function matchCategoryOrIngredient(question, menu) {
  const q = question.toLowerCase().trim();
  const vis = menu.filter(i => i.visible);
  const groupPhrases = ['what do you have','what have you got','show me','do you have any','what kind of','what types of','what are your',"what's your","what's on",'whats on','full menu','whole menu','everything','all items','dishes with','items with','anything with','what has','what contains','tell me about your','what can i get'];
  const hasGroup = groupPhrases.some(t => q.includes(t));
  // Dietary
  const diet = {
    'vegan':       i => !/(chicken|beef|pork|fish|dairy|cheese|egg|butter|cream|milk|meat|shrimp|bacon)/i.test(i.ing||''),
    'vegetarian':  i => !/(chicken|beef|pork|fish|shrimp|bacon|meat)/i.test(i.ing||''),
    'gluten free': i => !/(gluten)/i.test(i.ing||''),
    'gluten-free': i => !/(gluten)/i.test(i.ing||''),
    'dairy free':  i => !/(cheese|butter|cream|milk|dairy)/i.test(i.ing||''),
  };
  for (const [k,fn] of Object.entries(diet)) {
    if (q.includes(k)) { const m=vis.filter(i=>fn(i)); if(m.length) return {matches:m,searchTerm:k}; }
  }
  if (q.includes('full menu')||q.includes('whole menu')||q.includes('everything')||q.includes('all items'))
    return { matches:vis, searchTerm:'the full menu' };
  // Extract search term
  let term = q;
  groupPhrases.forEach(t => { term = term.replace(t,' '); });
  term = term.replace(/[?!.,]/g,'').replace(/\s+/g,' ').trim();
  const fillers = new Set(['the','and','for','our','you','can','get','are','any','some','have','please','want','like','just','tell','about']);
  const words = term.split(' ').filter(w => w.length>1 && !fillers.has(w));
  if (!words.length) return hasGroup ? {matches:vis,searchTerm:'menu'} : null;
  // Score items
  const scored = vis.map(item => {
    const hay = [item.name,item.cat||'',item.desc||'',item.ing||'',item.triggerKeywords||''].join(' ').toLowerCase();
    const hw = hay.split(/\s+/);
    let sc = 0;
    for (const w of words) {
      if (item.name.toLowerCase().includes(w)) sc+=4;
      else if (hay.includes(w)) sc+=2;
      for (const h of hw) { if(h.length>2&&w.length>2&&h!==w&&(h.includes(w)||w.includes(h))){ sc+=1; break; } }
    }
    return {item,sc};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc);
  // Show carousel: group intent + matches, OR 3+ matches
  if (scored.length>0&&(hasGroup||scored.length>=3)) return {matches:scored.map(x=>x.item),searchTerm:words.join(' ')};
  if (scored.length===1&&hasGroup) return {matches:scored.map(x=>x.item),searchTerm:words.join(' ')};
  return null;
}
function matchCategory(question, menu) { return matchCategoryOrIngredient(question, menu); }

// VIDEO URL RESOLVER
// ==========================================
function resolveVideoUrl(item) {
  if (!item) return '';
  // 1. Direct blob/data URL uploaded from phone
  if (item.videoUrl && item.videoUrl.startsWith('data:')) return item.videoUrl;
  // 2. Already a full https URL
  if (item.videoUrl && item.videoUrl.startsWith('http')) return item.videoUrl;
  // 3. Filename → try Supabase public URL first
  const filename = item.videoFilename || (item.videoUrl && !item.videoUrl.startsWith('data:') ? item.videoUrl : '');
  if (filename) {
    const sbUrl = store.get('stellas_sb_url','').replace(/\/$/,'');
    const sbBucket = store.get('stellas_sb_bucket','videos');
    if (sbUrl) {
      const url = `${sbUrl}/storage/v1/object/public/${sbBucket}/${filename}`;
      console.log('[Storage] Resolved via Supabase:', url);
      return url;
    }
    // 4. Fallback to R2 base URL
    const r2Base = store.get('stellas_r2_base','').replace(/\/$/,'');
    if (r2Base) {
      const url = `${r2Base}/${filename}`;
      console.log('[Storage] Resolved via R2:', url);
      return url;
    }
  }
  return item.videoUrl || '';
}

// ==========================================
// DETECT ORDER INTENT -- flexible, no exact phrases needed
// Scores the input across action verbs + context signals
// ==========================================
function detectOrderIntent(question) {
  const q = question.toLowerCase();

  // Action verb families -- any single word signals possible order
  const actionVerbs = ['order','add','get','have','want','like','bring','send','put','throw','grab','take','give','serve'];
  // Context signals -- table/order context words
  const contextWords = ['table','order','my order','cart','please','now','tonight','us','me','in','this','that'];
  // Intensifiers that alone suggest ordering with a pronoun
  const pronounOrder = ['another','more','one more','same again','again','second','third','extra'];

  const hasAction = actionVerbs.some(w => q.split(/\b/).includes(w));
  const hasContext = contextWords.some(w => q.includes(w));
  const hasPronoun = pronounOrder.some(w => q.includes(w));

  // "throw in the X", "can I get X", "I'd like X at my table" etc -- action + context
  if (hasAction && hasContext) return true;
  // "another X please", "one more X" etc -- pronoun alone is enough
  if (hasPronoun) return true;
  // Direct imperative: starts with action verb
  if (actionVerbs.some(w => q.trimStart().startsWith(w))) return true;

  return false;
}

// Context phrases -- "add this", "order this", "can I get that" -- no item name needed
function detectContextPhrase(question) {
  const q = question.toLowerCase();
  const contextPhrases = [
    // "this" phrases
    'add this','order this','get this','want this','have this','i\'ll take this','this one',
    'can i order this','can i get this','can you add this','put this in',
    'i\'d like this','i want this','throw this in','yes this','this please',
    // "that" phrases
    'add that','order that','get that','want that','that one','i\'ll have that',
    'can i order that','can i get that','can you add that','put that in',
    'i\'d like that','i want that','throw that in','yes that','that please',
    // "it" phrases -- most common spoken form
    'add it','order it','get it','want it','i\'ll have it','i\'ll take it',
    'can i order it','can i get it','can you add it','add it to my order',
    'add it to my cart','add it to the order','put it in my order',
    'bring it to my table','bring it to table','bring it over',
    'i\'d like it','i want it','bring it','send it','get me it',
    'order it for me','add it for me','yes add it','add it please',
    'can i have it','i\'ll get it','i\'ll order it',
    // "one" phrases
    'add one','get one','order one','i\'ll take one','one please','yes one',
    'another one','one more','add another',
    // bare vague intent
    'yes please','yeah add','yep add','yes i want','i want to order',
    'can i order','i would like to order','i\'d like to order',
  ];
  return contextPhrases.some(p => q.includes(p));
}
function matchMessage(question, messages) {
  const q = question.toLowerCase().trim();
  const now = new Date();
  const active = messages.filter(m => {
    if (!m.active) return false;
    if (m.scheduleStart && new Date(m.scheduleStart)>now) return false;
    if (m.scheduleEnd   && new Date(m.scheduleEnd)<now)   return false;
    return true;
  });
  // Priority 0: explicit trigger keywords
  for (const m of active) {
    if (!m.triggerKeywords) continue;
    const phrases = m.triggerKeywords.split(',').map(p=>p.trim().toLowerCase()).filter(Boolean);
    for (const ph of phrases) { if (ph && q.includes(ph)) { console.log('[Msg] trigger:',ph,'->',m.title); return m; } }
  }
  // Priority 1: goodbye
  if (['goodbye','bye','see you','see ya','have a good','leaving now','good night','good evening'].some(w=>q.includes(w))) {
    const m=active.find(m=>m.type==='goodbye'); if(m) return m;
  }
  // Priority 2: greeting — only pure short greetings, not "hi what burgers do you have"
  const isJustGreeting = ['hi','hello','hey','good morning','howdy'].some(w=>q===w||(q.startsWith(w+' ')&&q.split(' ').length<=4));
  if (isJustGreeting) { const m=active.find(m=>m.type==='welcome'); if(m) return m; }
  // Priority 3: promos/specials
  if (['special','specials','promo','deal','offer','happy hour','discount',"what's on",'today','tonight'].some(w=>q.includes(w))) {
    const promos=active.filter(m=>['promo','announcement','seasonal','event'].includes(m.type));
    if (promos.length) {
      const sc=promos.map(m=>({m,s:q.split(/\s+/).filter(w=>w.length>2&&(m.title+' '+m.body).toLowerCase().includes(w)).length})).sort((a,b)=>b.s-a.s);
      return sc[0].s>0?sc[0].m:promos[0];
    }
  }
  // Priority 4: scored scan — high threshold to avoid false positives on menu questions
  const qW=q.split(/\s+/).filter(w=>w.length>3);
  if (!qW.length) return null;
  let best=null,bestSc=0;
  for (const m of active) {
    const hay=(m.title+' '+m.body+' '+(m.triggerKeywords||'')).toLowerCase();
    const sc=qW.filter(w=>hay.includes(w)).length;
    if(sc>bestSc){bestSc=sc;best=m;}
  }
  if (best && bestSc>=Math.min(3,qW.length)) return best;
  return null;
}


// ==========================================
// GLOBAL MENU TRIGGER SCANNER
// Scans ALL menu items' triggers against the question.
// This fires even when no item is currently selected (e.g. from home screen).
// First keyword match across any item wins.
// ==========================================
function matchAnyMenuTrigger(question, menu) {
  if (!menu || !menu.length) return null;
  const q = question.toLowerCase().trim();

  let bestMatch = null;
  let bestWordCount = 0;

  for (const item of menu) {
    if (!item.visible) continue;

    const allTriggers = [];
    if (item.triggers && item.triggers.length) {
      for (const tr of item.triggers) {
        if (!tr.keywords) continue;
        tr.keywords.split(',').map(function(p){return p.trim().toLowerCase();}).filter(Boolean).forEach(function(phrase){
          allTriggers.push({phrase:phrase, type:tr.action||'item-request', videoFilename:tr.videoFilename||''});
        });
      }
    }
    if (item.triggerKeywords) {
      item.triggerKeywords.split(',').map(function(p){return p.trim().toLowerCase();}).filter(Boolean).forEach(function(phrase){
        allTriggers.push({phrase:phrase, type:item.triggerType||'item-request', videoFilename:''});
      });
    }

    for (let ti=0; ti<allTriggers.length; ti++) {
      const t = allTriggers[ti];
      if (!t.phrase || !q.includes(t.phrase)) continue;
      const wordCount = t.phrase.split(/\s+/).length;
      console.log('[Trigger] Candidate:', t.phrase, '| words:', wordCount, '| item:', item.name);
      if (wordCount > bestWordCount) {
        bestWordCount = wordCount;
        bestMatch = {item:item, phrase:t.phrase, type:t.type, videoFilename:t.videoFilename};
      }
    }
  }

  if (bestMatch) {
    console.log('[Trigger] Winner:', bestMatch.phrase, '| item:', bestMatch.item.name);
  } else {
    console.log('[Trigger] No match for:', q);
  }
  return bestMatch;
}
function matchFAQ(question, faq) {
  if (!faq || !faq.length) return null;
  const q = question.toLowerCase().trim();
  const qWords = q.split(/\s+/).filter(w => w.length > 2);

  let best = null, bestScore = 0;
  for (const entry of faq) {
    const haystack = (
      (entry.title || '') + ' ' +
      (entry.body || '') + ' ' +
      (entry.tags || '')
    ).toLowerCase();
    // Count matching words, weight tag matches higher
    const tagWords = (entry.tags||'').toLowerCase().split(',').map(t=>t.trim()).filter(Boolean);
    let score = 0;
    for (const word of qWords) {
      if (haystack.includes(word)) score += tagWords.some(t=>t.includes(word)||word.includes(t)) ? 3 : 1;
    }
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  return bestScore >= 2 ? best : null;
}
// Scans all triggers for a menu item. First keyword match wins.
// Backwards-compatible with old flat triggerKeywords/triggerType fields.
// ==========================================
function matchMenuItemTrigger(question, item) {
  if (!item) return null;
  const q = question.toLowerCase().trim();

  let bestMatch = null;
  let bestPhraseLen = 0;

  const triggersArr = item.triggers && item.triggers.length ? item.triggers : null;
  if (triggersArr) {
    for (const tr of triggersArr) {
      if (!tr.keywords) continue;
      const phrases = tr.keywords.split(',').map(p => p.trim().toLowerCase()).filter(Boolean);
      for (const phrase of phrases) {
        if (phrase && q.includes(phrase) && phrase.length > bestPhraseLen) {
          bestPhraseLen = phrase.length;
          bestMatch = { item, phrase, type: tr.action || 'item-request', videoFilename: tr.videoFilename || '' };
        }
      }
    }
    if (bestMatch) {
      console.log('[Multi-trigger] Matched:', bestMatch.phrase, '| action:', bestMatch.type, '| item:', item.name);
      return bestMatch;
    }
    return null;
  }

  // Legacy fallback: flat triggerKeywords / triggerType
  if (!item.triggerKeywords) return null;
  const phrases = item.triggerKeywords.split(',').map(p => p.trim().toLowerCase()).filter(Boolean);
  for (const phrase of phrases) {
    if (phrase && q.includes(phrase) && phrase.length > bestPhraseLen) {
      bestPhraseLen = phrase.length;
      bestMatch = { item, phrase, type: item.triggerType || 'item-request', videoFilename: '' };
    }
  }
  if (bestMatch) console.log('[Menu Trigger] Legacy matched:', bestMatch.phrase, '| item:', item.name);
  return bestMatch;
}
// Resolve which video to play for a matched trigger.
// Uses trigger's override videoFilename if set, else item's default video.
function resolveTriggerVideo(trigger) {
  if (!trigger) return '';
  const { item, videoFilename } = trigger;
  if (videoFilename) {
    // Build URL from override filename using Supabase/R2
    const sbUrl = store.get('stellas_sb_url','').replace(/\/$/,'');
    const sbBucket = store.get('stellas_sb_bucket','videos');
    if (sbUrl) return sbUrl+'/storage/v1/object/public/'+sbBucket+'/'+videoFilename;
    const r2 = store.get('stellas_r2_base','').replace(/\/$/,'');
    if (r2) return r2+'/'+videoFilename;
    return '';
  }
  return resolveVideoUrl(item);
}

async function askAI(question, menu, messages, tableNum, faq) {
  faq = faq || [];
  console.log('[AI] Question:', question, '| Table:', tableNum||'none');

  const settings = loadSettings();
  const providerKey = settings.provider || 'groq';
  const cfg = AI_PROVIDERS[providerKey];
  const apiKey = settings.keys && settings.keys[providerKey] || '';

  // -- Language instruction --
  const langCode = settings.language || 'en-US';
  const langObj = LANGUAGES.find(l => l.code === langCode) || LANGUAGES[0];
  const isEnglish = langCode.startsWith('en');
  // Appended to every system prompt so Groq replies in the chosen language
  const langInstruction = isEnglish ? '' : ('\n\nIMPORTANT: Reply in ' + langObj.groq + ' only. The ITEM: tag must still be in English exactly as on the menu.');
  console.log('[AI] Language:', langObj.label, '| Instruction:', langInstruction ? 'yes' : 'none');

  if (!apiKey) {
    console.warn('[AI] No key for', cfg.label);
    return { response: 'No API key set for ' + cfg.label + '. Go to Admin > Settings.', item:null, videoUrl:'', noKey:true };
  }

  const items = menu.filter(function(i){ return i.visible; });

  // -- Step 0: Order intent → skip message matching, go straight to menu --
  // This MUST run before matchMessage so "add X to my order" never triggers welcome
  if (detectOrderIntent(question)) {
    console.log('[AI] Order intent detected -- bypassing message matching');
    const quickMatch = matchMenuItem(question, menu);
    console.log('[AI] Order local fuzzy match:', quickMatch ? quickMatch.name : 'none');

    const menuList = items.map(function(i, n){ return (n+1) + '. ' + i.name; }).join('\n');
    const orderPrompt = [
       'You are Anna, a friendly restaurant host at Stella\'s.',
      'A guest said: "' + question + '"',
      '',
      'Menu items:',
      menuList,
      '',
      'Task: Detect if the guest wants to order something.',
      'Reply with exactly 2 lines -- nothing else:',
      'Line 1: A warm 1-sentence reply (e.g. "Sure thing! One Sticky Toffee Pudding coming right up!")',
      'Line 2: FLAG:order-intent | ITEM:[exact menu item name or "unknown"] | QTY:[number]',
      '',
      'Rules:',
      '- Match item name exactly from the menu list above (case-insensitive)',
      '- If they say "this", "that", "another one" with no item name, use ITEM:unknown',
      '- QTY defaults to 1 unless they say "two", "three", a number, or "another"',
      '- Never add any explanation or extra lines',
      langInstruction,
      '',
      'Example output:',
      'Absolutely, I\'ll add that for you!',
      'FLAG:order-intent | ITEM:Spinach & Artichoke Dip | QTY:1'
    ].join('\n');

    try {
      var rawText2 = '';
      if (cfg.format === 'anthropic') {
        var r2 = await fetch(cfg.baseUrl, { method:'POST', headers:{ 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' }, body: JSON.stringify({ model:cfg.model, max_tokens:150, system:orderPrompt, messages:[{role:'user',content:question}] }) });
        var d2 = await r2.json();
        rawText2 = (d2.content && d2.content[0] && d2.content[0].text) || '';
      } else {
        var r2 = await fetch(cfg.baseUrl, { method:'POST', headers:{ 'Authorization':'Bearer '+apiKey, 'Content-Type':'application/json' }, body: JSON.stringify({ model:cfg.model, max_tokens:150, temperature:0.2, messages:[{role:'system',content:orderPrompt},{role:'user',content:question}] }) });
        var d2 = await r2.json();
        rawText2 = (d2.choices && d2.choices[0] && d2.choices[0].message && d2.choices[0].message.content) || '';
      }
      console.log('[AI] Order raw response:', rawText2);

      // Parse the structured FLAG line
      var lines2 = rawText2.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var flagLine = lines2.find(function(l){ return /^FLAG:/i.test(l); });
      var replyLine = lines2.find(function(l){ return !/^FLAG:/i.test(l); }) || 'Sure thing!';

      var parsedFlag = 'none', parsedItem = 'unknown', parsedQty = 1;
      if (flagLine) {
        var parts = flagLine.split('|').map(function(s){return s.trim();});
        parsedFlag = (parts[0]||'').replace(/^FLAG:\s*/i,'').trim();
        parsedItem = (parts[1]||'').replace(/^ITEM:\s*/i,'').trim();
        parsedQty = parseInt((parts[2]||'').replace(/^QTY:\s*/i,'').trim()) || 1;
      }
      console.log('[AI] Intent detected:', parsedFlag, '| Item:', parsedItem, '| Qty:', parsedQty);

      // Resolve item: AI name → fuzzy match → quickMatch → null
      var aiItem2 = (parsedItem && parsedItem.toLowerCase() !== 'unknown') ? matchMenuItem(parsedItem, menu) : null;
      var finalItem2 = aiItem2 || quickMatch || null;
      console.log('[AI] Order item resolved:', finalItem2 ? finalItem2.name : 'none');

      return {
        response: replyLine,
        item: finalItem2,
        videoUrl: resolveVideoUrl(finalItem2),
        orderIntent: parsedFlag === 'order-intent',
        qty: parsedQty,
      };
    } catch(e) {
      console.error('[AI] Order AI call failed:', e);
      if (quickMatch) return { response: 'Great choice! Want me to add ' + quickMatch.name + ' to your order?', item: quickMatch, videoUrl: resolveVideoUrl(quickMatch), orderIntent: true, qty: 1 };
      return { response: "I didn't catch which item -- could you say the name again?", item: null, videoUrl: '', orderIntent: false, qty: 1 };
    }
  }

  // Step 1: Messages (greetings, goodbye, specials, FAQs)
  const msgMatch = matchMessage(question, messages);
  if (msgMatch) {
    console.log('[AI] Message:', msgMatch.title);
    return { response:msgMatch.body||msgMatch.title, item:null, videoUrl:resolveVideoUrl(msgMatch), matchedMessage:msgMatch };
  }

  // Step 2: Quick local item match
  const quickMatch = matchMenuItem(question, menu);
  console.log('[AI] Quick match:', quickMatch?quickMatch.name:'none');

  // Step 3: Category/ingredient → carousel
  const groupResult = matchCategoryOrIngredient(question, menu);
  if (groupResult && groupResult.matches.length > 0) {
    console.log('[AI] Carousel:', groupResult.searchTerm, '->', groupResult.matches.length, 'items');
    return { response:"Here's what we have for "+groupResult.searchTerm+"!", item:null, videoUrl:'', ingredientMatches:groupResult.matches, searchTerm:groupResult.searchTerm };
  }

  // Step 4: AI call with full rich menu + messages data
  const richMenu = items.map((it,n) => {
    const p=[(n+1)+'. '+it.name];
    if(it.price)p.push('$'+it.price);
    if(it.cat)p.push(it.cat);
    if(it.desc)p.push(it.desc);
    if(it.ing)p.push('ing:'+it.ing);
    if(it.triggerKeywords)p.push('aka:'+it.triggerKeywords);
    return p.join(' | ');
  }).join('\n');
  const activeMsgs=(messages||[]).filter(m=>m.active);
  const msgStr=activeMsgs.map((m,n)=>{const p=['MSG'+(n+1)+'. '+m.title];if(m.body)p.push(m.body);if(m.triggerKeywords)p.push('triggers:'+m.triggerKeywords);return p.join(' | ');}).join('\n')||'none';

  const systemPrompt = [
    "You are Anna, a warm host at Stella's restaurant.",
    'Guest said: "'+question+'"',
    '',
    'MENU (name | price | category | description | ingredients | aka):',
    richMenu,
    '',
    'MESSAGES (greetings/specials/goodbye/order-confirmed/FAQs):',
    msgStr,
    '',
    'Match loosely using ALL fields. Last line ONLY one of:',
    '  CATEGORY:[word] — guest asking about a group (desserts, drinks, chicken, burgers, sandwiches)',
    '  MSG:[exact title] — a preset message fits (greeting, special, goodbye)',
    '  ITEM:[exact name] — a specific menu item fits',
    '  ITEM:none — nothing fits',
    'Write 1-2 warm sentences first, tag on very last line, nothing after.',
    langInstruction,
  ].join('\n');

  try {
    var rawText='';
    if(cfg.format==='anthropic'){
      var res=await fetch(cfg.baseUrl,{method:'POST',headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:cfg.model,max_tokens:300,system:systemPrompt,messages:[{role:'user',content:question}]})});
      var d=await res.json();if(d.error)throw new Error(d.error.message);
      rawText=(d.content&&d.content[0]&&d.content[0].text)||'';
    } else {
      var res=await fetch(cfg.baseUrl,{method:'POST',headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},body:JSON.stringify({model:cfg.model,max_tokens:300,temperature:0.3,messages:[{role:'system',content:systemPrompt},{role:'user',content:question}]})});
      var d=await res.json();if(d.error)throw new Error((d.error&&d.error.message)||JSON.stringify(d.error));
      rawText=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';
    }
    console.log('[AI] Raw:',rawText.substring(0,200));
    if(!rawText.trim())throw new Error('Empty');

    const allL=rawText.split('\n').map(l=>l.trim()).filter(Boolean);
    const tagL=allL.find(l=>/^(ITEM:|MSG:|CATEGORY:)/i.test(l));
    const reply=allL.filter(l=>!/^(ITEM:|MSG:|CATEGORY:)/i.test(l)).join(' ').trim()||"Let me help with that!";

    if(tagL&&/^CATEGORY:/i.test(tagL)){
      const cat=tagL.replace(/^CATEGORY:\s*/i,'').trim();
      const r2=matchCategoryOrIngredient(cat,menu);
      const ci=r2?r2.matches:menu.filter(i=>{if(!i.visible)return false;return((i.cat||'')+' '+(i.name||'')+' '+(i.desc||'')+' '+(i.ing||'')).toLowerCase().includes(cat.toLowerCase());});
      return {response:reply,item:null,videoUrl:'',ingredientMatches:ci,searchTerm:cat};
    }
    if(tagL&&/^MSG:/i.test(tagL)){
      const mt=tagL.replace(/^MSG:\s*/i,'').trim();
      const aa=(messages||[]).filter(m=>m.active);
      const mh=aa.find(m=>m.title.toLowerCase()===mt.toLowerCase())||aa.find(m=>m.title.toLowerCase().includes(mt.toLowerCase()));
      if(mh)return{response:mh.body||mh.title,item:null,videoUrl:resolveVideoUrl(mh),matchedMessage:mh};
    }
    const exName=(tagL&&/^ITEM:/i.test(tagL))?tagL.replace(/^ITEM:\s*/i,'').trim():'none';
    const aiMatch=exName.toLowerCase()!=='none'?matchMenuItem(exName,menu):null;
    const item=aiMatch||quickMatch||null;
    const videoUrl=resolveVideoUrl(item);
    console.log('[AI] Final:',item?item.name:'none','| video:',videoUrl||'none');

    if(!item){
      const faqMatch=matchFAQ(question,faq);
      if(faqMatch){
        const fp="You are Anna, host at Stella's. Guest: \""+question+"\". Info: \""+faqMatch.title+': '+faqMatch.body+"\". Reply warmly in 1-2 sentences. Output ONLY the reply."+langInstruction;
        try{
          var fr,fd,fr2='';
          if(cfg.format==='anthropic'){fr=await fetch(cfg.baseUrl,{method:'POST',headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:cfg.model,max_tokens:150,system:fp,messages:[{role:'user',content:question}]})});fd=await fr.json();fr2=(fd.content&&fd.content[0]&&fd.content[0].text)||'';}
          else{fr=await fetch(cfg.baseUrl,{method:'POST',headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},body:JSON.stringify({model:cfg.model,max_tokens:150,temperature:0.5,messages:[{role:'system',content:fp},{role:'user',content:question}]})});fd=await fr.json();fr2=(fd.choices&&fd.choices[0]&&fd.choices[0].message&&fd.choices[0].message.content)||'';}
          return{response:fr2.trim()||faqMatch.body,item:null,videoUrl:'',faqEntry:faqMatch};
        }catch(fe){return{response:faqMatch.body,item:null,videoUrl:'',faqEntry:faqMatch};}
      }
      return{response:reply||"I'm not sure — feel free to browse the menu or ask me about any dish!",item:null,videoUrl:''};
    }
    return{response:reply,item,videoUrl};
  }catch(err){
    console.error('[AI] Failed:',err);
    if(quickMatch)return{response:quickMatch.name+' is a great choice! '+(quickMatch.desc||'').split('.')[0]+'.',item:quickMatch,videoUrl:resolveVideoUrl(quickMatch)};
    return{response:"I'm not sure about that one — ask me about anything on the menu!",item:null,videoUrl:''};
  }
}

let heygenSDK = null;
let heygenSession = null;

async function loadHeygenSDK() {
  if (heygenSDK) return heygenSDK;
  try {
    const mod = await import(HEYGEN_SDK_URL);
    heygenSDK = mod.default || mod.StreamingAvatar || mod;
    return heygenSDK;
  } catch (e) {
    console.warn('HeyGen SDK load failed:', e);
    return null;
  }
}

async function startHeygenSession(apiKey, avatarId, videoElement) {
  const SDK = await loadHeygenSDK();
  if (!SDK) throw new Error('SDK unavailable');
  // Initialize streaming session
  // Real implementation: new SDK({ token: apiKey })
  // For now returns a mock session object -- replace with live SDK calls
  heygenSession = { speak: async (text) => console.log('HeyGen speak:', text), apiKey, avatarId };
  return heygenSession;
}

async function heygenSpeak(text) {
  if (!heygenSession) return false;
  try { await heygenSession.speak(text); return true; }
  catch(e){ return false; }
}

function stopHeygenSession() {
  heygenSession = null;
}

// Load QRCode library on demand
let _qrLib = null;
async function loadQRLib(){
  if(_qrLib) return _qrLib;
  if(window.QRCode){ _qrLib=window.QRCode; return _qrLib; }
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>{ _qrLib=window.QRCode; res(_qrLib); };
    s.onerror=()=>rej(new Error('QR lib failed to load'));
    document.head.appendChild(s);
  });
}

// Session token store — persists in localStorage
const SESSION_KEY = 'stellas_table_sessions';
function getSessions(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'{}'); }catch(e){ return {}; } }
function setSession(tableNum, token){ const s=getSessions(); s[String(tableNum)]=token; localStorage.setItem(SESSION_KEY,JSON.stringify(s)); }
function getSession(tableNum){ return getSessions()[String(tableNum)]||null; }
function genToken(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
// Ensure every table has a session token, create if missing
function ensureSession(tableNum){ let t=getSession(tableNum); if(!t){ t=genToken(); setSession(tableNum,t); } return t; }
// Reset a table — new token invalidates all old QR links
function resetSession(tableNum){ const t=genToken(); setSession(tableNum,t); console.log('[QR] Table',tableNum,'reset — new token:',t); return t; }

// -- AUDIO UNLOCK --------------------------
// iOS blocks autoplay with sound until a user gesture.
// We expose forceUnlock() so the mic button can unlock audio immediately
// on first tap -- that way the welcome video plays WITH sound the moment
// the user first speaks, with zero extra taps required.
let audioUnlocked=false;
const pendingUnlock=new Set();
function tryUnlock(v){
  if(audioUnlocked){v.muted=false;v.play().catch(()=>{});return;}
  pendingUnlock.add(v);
}
function forceUnlock(){
  // Called directly by the mic button on first tap
  if(audioUnlocked)return;
  audioUnlocked=true;
  console.log('[Audio] Unlocked by mic tap');
  for(const v of pendingUnlock){try{v.muted=false;v.play().catch(()=>{});}catch(e){}}
  pendingUnlock.clear();
}
// Also unlock on any user gesture as a safety net
if(typeof document!=='undefined'){
  ['touchstart','mousedown'].forEach(e=>
    document.addEventListener(e,()=>{
      if(!audioUnlocked)forceUnlock();
    },{once:true,capture:true})
  );
}

// ==========================================
// ==========================================
// GLOBAL AUDIO GUARD -- prevents overlapping plays
// Instead of moving a <video> element (causes black screen on iOS),
// we keep a play-ID counter. Each new play increments it; the old
// play's .then() callback checks if it's still current before unmuting.
// The <video> element stays in the JSX tree -- no DOM reparenting.
// ==========================================
let _playId = 0;
let _activeVideoEl = null; // reference to whichever <video> is currently playing

function registerVideoEl(el) {
  // Called when AvatarDisplay mounts its <video> ref
  _activeVideoEl = el;
}

function unregisterVideoEl(el) {
  if (_activeVideoEl === el) _activeVideoEl = null;
}

// Stop any currently playing video immediately
function stopCurrentVideo() {
  if (_activeVideoEl) {
    try {
      _activeVideoEl.pause();
      _activeVideoEl.currentTime = 0;
    } catch(e) {}
  }
  _playId++;
  console.log('[Video] Old video paused/reset | playId now:', _playId);
}

// Claim a play slot -- returns the ID to use
function claimPlay(el) {
  stopCurrentVideo();
  _activeVideoEl = el;
  return _playId;
}


// -- TTS (Web Speech API) ------------------
// speakText: reads text aloud using the browser's built-in speech synthesis.
// Uses the TTS locale for the selected language. Silent fail if not supported.
let _ttsUtterance = null;
function speakText(text, langCode) {
  if (!text || !langCode) return;
  if (!window.speechSynthesis) { console.warn("[TTS] speechSynthesis not supported"); return; }
  // Cancel any currently playing speech
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode;
  utt.rate = 0.95;
  utt.pitch = 1.0;
  utt.volume = getSavedVolume ? getSavedVolume() : 0.8;
  // Try to find a matching voice for the language
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === langCode)
    || voices.find(v => v.lang.startsWith(langCode.split("-")[0]))
    || null;
  if (match) utt.voice = match;
  _ttsUtterance = utt;
  utt.onstart  = () => console.log("[TTS] Speaking in", langCode, ":", text.substring(0,60)+"...");
  utt.onerror  = e  => console.warn("[TTS] Error:", e.error);
  utt.onend    = () => console.log("[TTS] Done");
  // iOS requires a user-gesture unlock -- wrap in try/catch
  try { window.speechSynthesis.speak(utt); }
  catch(e) { console.warn("[TTS] speak() failed:", e.message); }
}
function stopTTS(){ try{ window.speechSynthesis.cancel(); }catch(e){} }

// -- AVATAR DISPLAY --
// Persisted volume -- read/write localStorage, default 0.5
function getSavedVolume(){ try{ const v=parseFloat(localStorage.getItem('stellas_volume')); return(!isNaN(v)&&v>=0&&v<=1)?v:0.5; }catch(e){ return 0.5; } }
function saveVolume(v){ try{ localStorage.setItem('stellas_volume',String(v)); }catch(e){} }

function AvatarDisplay({videoUrl,posterUrl,height='62vh',active=false,loop=false,onEnded,fallbackVideoUrl,staticImgSrc,idleAfter=false}){
  const videoRef = useRef();
  const myPlayId = useRef(0);
  const[ended,setEnded]=useState(false);
  const[muted,setMuted]=useState(true);
  const[videoErr,setVideoErr]=useState(false);
  const[volume,setVolume]=useState(getSavedVolume);
  const sparks=[[15,0],[30,.5],[50,.9],[70,.3],[85,1.2],[25,1.6],[60,2.0]];

  const playUrl = videoUrl || fallbackVideoUrl || '';
  const effectiveLoop = videoUrl ? loop : (fallbackVideoUrl ? true : false);

  // Register this element as the active one on mount, unregister on unmount
  useEffect(()=>{
    return ()=>{ if(videoRef.current) unregisterVideoEl(videoRef.current); };
  },[]);

  // Play when URL changes -- claim the global slot, stop any other video
  useEffect(()=>{
    const v = videoRef.current;
    if(!v) return;
    if(!playUrl){
      v.pause(); v.currentTime=0;
      setEnded(false); setVideoErr(false);
      return;
    }
    // Claim global play slot -- increments _playId, stops other elements
    const id = claimPlay(v);
    myPlayId.current = id;
    setEnded(false); setVideoErr(false); setMuted(true);

    console.log('[Video] Old video paused/reset');
    v.pause();
    v.currentTime = 0;
    v.src = '';
    v.load();

    // One rAF to let browser flush the reset before loading new src
    requestAnimationFrame(()=>{
      if(myPlayId.current !== id) return; // superseded
      v.src = playUrl;
      v.loop = effectiveLoop;
      v.volume = getSavedVolume();
      v.muted = true; // always start muted; tryUnlock will unmute
      const p = v.play();
      if(p && p.then) p.then(()=>{
        if(myPlayId.current !== id){ v.pause(); return; }
        tryUnlock(v);
        console.log('[Video] New video loaded and played:', playUrl.split('/').pop());
      }).catch(e=>{
        if(myPlayId.current === id) console.warn('[Video] Playback error:', e.message);
      });
    });
  },[playUrl]);

  // Sync muted to DOM
  useEffect(()=>{
    const v=videoRef.current; if(!v) return;
    v.muted=muted;
    if(!muted){ v.volume=volume; v.play().catch(()=>{}); }
  },[muted]);

  // Sync volume to DOM
  useEffect(()=>{
    const v=videoRef.current; if(!v) return;
    v.volume=volume; saveVolume(volume);
    console.log('[Volume] Set to:', Math.round(volume*100)+'%');
  },[volume]);

  function replay(){
    const v=videoRef.current; if(!v) return;
    setEnded(false); setVideoErr(false); setMuted(true);
    const id = claimPlay(v);
    myPlayId.current = id;
    v.currentTime=0; v.volume=getSavedVolume(); v.muted=true;
    const p=v.play();
    if(p&&p.then) p.then(()=>{ if(myPlayId.current===id) tryUnlock(v); })
                   .catch(e=>console.warn('[Video] Replay error:',e.message));
  }

  const nameTag=h('div',{style:{position:'absolute',bottom:20,left:16,zIndex:2,pointerEvents:'none',background:'linear-gradient(135deg,var(--gold),var(--gold2))',color:'#1a1a0a',borderRadius:6,padding:'4px 10px',fontFamily:"'Playfair Display',serif",fontSize:11,fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.3)'}},
    h('div',{style:{fontSize:9,letterSpacing:2}},"STELLA'S"),h('div',{style:{fontSize:11}},'Anna'));

  const pillBtn={background:'rgba(0,0,0,.65)',border:'1.5px solid rgba(255,255,255,.25)',color:'white',borderRadius:50,padding:'0 14px',height:34,fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',boxShadow:'0 2px 10px rgba(0,0,0,.35)',fontFamily:"'Lato',sans-serif"};

  const volControl = playUrl && !ended && !videoErr && h('div',{className:'vol-wrap'},
    h('button',{className:'vol-btn',onClick:()=>setMuted(m=>!m),title:muted?'Unmute':'Mute'},
      muted?'\uD83D\uDD07':volume>0.5?'\uD83D\uDD0A':'\uD83D\uDD09'),
    !muted && h('input',{type:'range',className:'vol-slider',min:0,max:100,
      value:Math.round(volume*100),
      onChange:e=>{ const nv=parseInt(e.target.value)/100; setVolume(nv); if(nv>0&&muted)setMuted(false); },
      onTouchStart:e=>e.stopPropagation(),onTouchMove:e=>e.stopPropagation()})
  );

  const replayBtn = playUrl && (ended||videoErr) && h('button',{onClick:replay,style:{...pillBtn,position:'absolute',top:14,right:14,zIndex:4}},'↺ Play again');

  // -- No video: show idle static image --
  if(!playUrl){
    const imgSrc = staticImgSrc || posterUrl || '';
    return h('div',{className:'avatar-frame',style:{height,position:'relative',boxShadow:active?'0 0 40px rgba(201,168,76,.5),var(--shadow-glow)':'var(--shadow-glow)'}},
      imgSrc
        ? h('img',{src:imgSrc,alt:'Anna',className:'idle-breathe',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block'}})
        : h('div',{style:{width:'100%',height:'100%',background:'linear-gradient(180deg,var(--green),var(--green2))',display:'flex',alignItems:'center',justifyContent:'center'}},
            h('div',{style:{color:'var(--gold2)',fontSize:48,opacity:.4}},'✦')),
      active&&sparks.map(([l,d],i)=>h('div',{key:i,className:'sp',style:{left:`${l}%`,bottom:`${10+i*7}%`,width:4,height:4,animationDelay:`${d}s`}})),
      h('div',{className:'sparkle-overlay'}),nameTag
    );
  }

  // -- After confirm video ends: idle breathe with item thumbnail --
  if(ended && idleAfter){
    const idleSrc = staticImgSrc || posterUrl || '';
    return h('div',{className:'avatar-frame',style:{height,position:'relative',boxShadow:active?'0 0 40px rgba(201,168,76,.5),var(--shadow-glow)':'var(--shadow-glow)'}},
      idleSrc
        ? h('img',{src:idleSrc,alt:'Anna',className:'idle-breathe',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block'}})
        : h('div',{style:{width:'100%',height:'100%',background:'linear-gradient(180deg,var(--green),var(--green2))',display:'flex',alignItems:'center',justifyContent:'center'}},
            h('div',{style:{color:'var(--gold2)',fontSize:48,opacity:.4}},'✦')),
      sparks.map(([l,d],i)=>h('div',{key:i,className:'sp',style:{left:`${l}%`,bottom:`${10+i*7}%`,width:4,height:4,animationDelay:`${d}s`}})),
      h('div',{className:'sparkle-overlay'}),
      h('button',{onClick:replay,style:{...pillBtn,position:'absolute',top:14,right:14,zIndex:4}},'↺ Play again'),
      nameTag
    );
  }

  // -- Video playing --
  return h('div',{className:'avatar-video-wrap',style:{height}},
    // The <video> element stays in this JSX subtree -- never moved/reparented
    h('video',{
      ref:videoRef,
      src:playUrl,
      autoPlay:true,playsInline:true,muted:true,loop:effectiveLoop,
      'webkit-playsinline':'','x-webkit-airplay':'deny',
      disablePictureInPicture:true,disableRemotePlayback:true,
      style:{width:'100%',height:'100%',display:'block',objectFit:'cover',objectPosition:'top center',
        pointerEvents:'none',opacity:(ended&&!idleAfter)?0:1,transition:'opacity .4s ease'},
      onEnded:()=>{ setEnded(true); if(onEnded)onEnded(); },
      onError:()=>{ console.warn('[Video] Error loading:', playUrl.split('/').pop()); setVideoErr(true); },
    }),
    // Flat poster after regular (non-idle) video ends
    ended&&!idleAfter&&(posterUrl||staticImgSrc)&&h('div',{style:{position:'absolute',inset:0,zIndex:1}},

// CART DRAWER -- per-table order list
// ==========================================
function CartDrawer({tableNum,tableOrders,setTableOrders,onClose,showToast}){
  const orders=(tableOrders[tableNum]||[]);
  const now=Date.now();
  const CANCEL_WINDOW=7*60*1000;
  console.log('[Cart] Loaded cart for table:',tableNum,'| Items:',orders.length);
  function cancelItem(idx){
    const order=orders[idx];
    if(now-order.time>CANCEL_WINDOW){showToast('⚠️ Item already in prep');return;}
    const upd={...tableOrders,[tableNum]:orders.filter((_,i)=>i!==idx)};
    setTableOrders(upd);store.set('stellas_orders',upd);
    showToast('Removed: '+order.name);
  }
  const subtotal=orders.reduce((s,o)=>s+(o.price||0),0);
  const statusColor={new:'#e67e22',making:'#27ae60',ready:'#1976d2',done:'#888'};
  const statusLabel={new:'New',making:'Making',ready:'Ready!',done:'Done'};
  return h('div',null,
    h('div',{className:'cart-overlay',onClick:onClose}),
    h('div',{className:'cart-drawer'},
      h('div',{className:'cart-header'},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,color:'var(--gold)'}},'Table '+tableNum+' Order'),
        h('button',{onClick:onClose,style:{background:'transparent',border:'none',color:'var(--gold2)',fontSize:22,cursor:'pointer'}},'✕')
      ),
      h('div',{style:{flex:1,overflowY:'auto',padding:14}},
        orders.length===0
          ? h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
              h('div',{style:{fontSize:36,marginBottom:8}},'🛒'),
              h('div',{style:{fontSize:14}},'Your cart is empty')
            )
          : orders.map((order,idx)=>{
              const canCancel=now-order.time<CANCEL_WINDOW&&order.status==='new';
              const minsAgo=Math.floor((now-order.time)/60000);
              return h('div',{key:idx,className:'cart-item'},
                order.imgUrl&&h('img',{src:order.imgUrl,alt:order.name,style:{width:52,height:52,borderRadius:8,objectFit:'cover',flexShrink:0}}),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontWeight:700,fontSize:14,color:'var(--text1)'}},'$'+order.price+' · '+order.name),
                  h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},minsAgo===0?'Just now':minsAgo+'m ago'),
                  h('span',{style:{display:'inline-block',marginTop:4,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:700,background:(statusColor[order.status]||'#888')+'22',color:statusColor[order.status]||'#888'}},statusLabel[order.status]||order.status)
                ),
                h('button',{onClick:()=>cancelItem(idx),disabled:!canCancel,style:{background:canCancel?'rgba(220,60,60,.1)':'rgba(150,150,150,.1)',border:'none',borderRadius:8,padding:'6px 10px',color:canCancel?'var(--red)':'var(--text3)',fontSize:12,fontWeight:700,cursor:canCancel?'pointer':'not-allowed',flexShrink:0,fontFamily:"'Lato',sans-serif"}},canCancel?'Cancel':'In prep')
              );
            })
      ),
      orders.length>0&&h('div',{style:{padding:14,borderTop:'1.5px solid var(--gold)',background:'white',flexShrink:0}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
          h('span',{style:{fontSize:14,color:'var(--text2)'}},'Subtotal (excl. tax & tip)'),
          h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:'var(--text1)'}},'$'+subtotal.toFixed(2))
        ),
        h('div',{style:{fontSize:11,color:'var(--text3)'}},orders.length+' item'+(orders.length!==1?'s':''))
      )
    )
  );
}

function OrderConfirmPopup({item,tableNum,onConfirm,onCancel}){
  console.log('[Popup] Pop-up type: bottom bar | item:', item.name, '| table:', tableNum);
  // Swipe-down to dismiss
  const startY=useRef(0);
  function onTouchStart(e){startY.current=e.touches[0].clientY;}
  function onTouchEnd(e){if(e.changedTouches[0].clientY-startY.current>60)onCancel();}

  return h('div',{
    className:'order-confirm-overlay',
    onClick:e=>{ if(e.target===e.currentTarget)onCancel(); }
  },
    h('div',{

      h('div',{style:{width:36,height:4,borderRadius:2,background:'rgba(0,0,0,.15)',margin:'0 auto 14px'}}),

  console.log('[Home] Welcome already played?', alreadyPlayed);
  const avatarVideo = (!alreadyPlayed && welcomeVideo) ? welcomeVideo : '';

  function onWelcomePlayed(){
    sessionStorage.setItem('stellas_welcome_played','1');

  // Section titles from admin settings
  const titles = homeTitles || store.get('stellas_home_titles',{});
