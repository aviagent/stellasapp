<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'Lato',sans-serif;background:#f5ede4}
#root{display:flex;flex-direction:column}

:root{
  --cream:#f5ede4;--cream2:#ede0d3;--cream3:#faf6f0;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#a07830;--gold4:#f0d890;
  --green:#1a3a2a;--green2:#2a5a40;--green3:#3a6a50;
  --text1:#2c1810;--text2:#5a4a3a;--text3:#8a7a6a;
  --red:#d44;--white:#fff;
  --shadow-float:0 8px 32px rgba(44,24,16,0.18),0 2px 8px rgba(201,168,76,0.15);
  --shadow-glow:0 0 24px rgba(201,168,76,0.35),0 8px 32px rgba(44,24,16,0.18);
  --shadow-btn:0 6px 24px rgba(26,58,42,0.45),0 2px 8px rgba(201,168,76,0.2),inset 0 1px 0 rgba(255,255,255,0.15);
  --shadow-card:0 4px 20px rgba(44,24,16,0.12),0 1px 4px rgba(201,168,76,0.1);
}

/* --- GLASS CARD --- */
.glass{
  background:linear-gradient(145deg,rgba(250,246,240,0.95),rgba(240,232,222,0.9));
  border:1.5px solid var(--gold);
  border-radius:20px;
  box-shadow:var(--shadow-float);
  backdrop-filter:blur(10px);
}
.glass-hover{transition:transform .2s,box-shadow .2s}
.glass-hover:active{transform:scale(0.97);box-shadow:var(--shadow-glow)}

/* --- AVATAR FRAME --- */
.avatar-frame{
  border-radius:0;
  border-left:none;border-right:none;
  border-top:2px solid var(--gold);
  border-bottom:2px solid var(--gold);
  overflow:hidden;
  position:relative;
  box-shadow:var(--shadow-glow);
  width:100%;
}
.avatar-frame img{width:100%;height:100%;object-fit:cover;object-position:top center}

/* --- SPARKLE OVERLAY --- */
.sparkle-overlay{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(to top,rgba(201,168,76,0.2) 0%,transparent 100%);
  pointer-events:none;
}
@keyframes floatSp{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-40px) scale(0);opacity:0}}
.sp{position:absolute;border-radius:50%;background:var(--gold2);animation:floatSp 2.5s ease-out infinite}

/* --- BUTTONS --- */
.btn{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Lato',sans-serif;transition:all .2s;-webkit-appearance:none;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at center,rgba(255,255,255,0.2),transparent 60%);opacity:0;transition:opacity .3s}
.btn:active::after{opacity:1}
.btn:active{transform:scale(0.96)}

.btn-green{
  background:linear-gradient(145deg,var(--green2),var(--green));
  color:white;border-radius:50px;padding:14px 28px;font-size:16px;font-weight:700;letter-spacing:.5px;
  box-shadow:var(--shadow-btn);
}
.btn-gold{
  background:linear-gradient(145deg,var(--cream3),var(--cream2));
  color:var(--text1);border:1.5px solid var(--gold);border-radius:50px;padding:14px 28px;font-size:16px;
  box-shadow:0 4px 16px rgba(201,168,76,0.2),0 2px 6px rgba(44,24,16,0.1);
}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-icon{width:22px;height:22px;flex-shrink:0}

/* --- SPEECH BUBBLE --- */
.bubble{
  background:linear-gradient(145deg,var(--cream3),var(--cream2));
  border:1.5px solid var(--gold);border-radius:20px;padding:16px 20px;
  position:relative;
  box-shadow:var(--shadow-float);
}
.bubble::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  border:10px solid transparent;border-top-color:var(--gold);border-bottom:0}
.bubble::before{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);z-index:1;
  border:9px solid transparent;border-top-color:var(--cream2);border-bottom:0}

/* --- HEADER --- */
.app-header{text-align:center;padding:12px 16px 6px;flex-shrink:0;position:relative}
.app-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold3);letter-spacing:4px;text-transform:uppercase}

.subtitle-line::after{background:linear-gradient(to left,transparent,var(--gold))}
.gold-divider{height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);flex-shrink:0}

/* --- BOTTOM NAV --- */

  background:linear-gradient(145deg,var(--cream3),var(--cream2));

.nav-btn.active{color:var(--gold3)}

/* --- SCROLL --- */
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* --- TOGGLE --- */
.tgl{position:relative;width:44px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s}
.tgl-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tgl input:checked+.tgl-slider{background:var(--green2)}

/* --- MODAL --- */

.sheet{background:var(--cream);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;

.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text1)}
.close-btn{border:none;background:transparent;font-size:24px;cursor:pointer;color:var(--text3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}

/* --- CART DRAWER --- */

<script>
const{createElement:h,useState,useEffect,useRef,useCallback,useMemo}=React;
const{createRoot}=ReactDOM;

// ==========================================
// CONFIG
// ==========================================
const ADMIN_PASS='liveittothefullest02';

// -- AI PROVIDER CONFIGS (kept for AdminSettingsPanel) --
const AI_PROVIDERS={
  groq:    {label:'Groq',        subtitle:'Llama 3.1 70B -- Fast & free',     model:'llama-3.1-70b-versatile', baseUrl:'https://api.groq.com/openai/v1/chat/completions',   format:'openai', keyPlaceholder:'gsk_...'},
  xai:     {label:'xAI Grok',   subtitle:'Grok 2 -- Great reasoning',          model:'grok-2-latest',           baseUrl:'https://api.x.ai/v1/chat/completions',              format:'openai', keyPlaceholder:'xai_...'},
  openai:  {label:'OpenAI',     subtitle:'GPT-4o mini -- Reliable & accurate', model:'gpt-4o-mini',             baseUrl:'https://api.openai.com/v1/chat/completions',         format:'openai', keyPlaceholder:'sk-...'},
  anthropic:{label:'Anthropic', subtitle:'Claude 3.5 Sonnet -- Smartest',      model:'claude-3-5-sonnet-20241022',baseUrl:'https://api.anthropic.com/v1/messages',          format:'anthropic', keyPlaceholder:'sk-ant-...'},
};

// -- SETTINGS LOAD/SAVE -------------------
function loadSettings(){
  return store.get('stellas_settings',{
    provider:'groq',
    keys:{groq:'',xai:'',openai:'',anthropic:''},
    avatarMode:'prerecorded',
    heygenKey:'',
    heygenAvatarId:'',

    readAloud:false,
  });
}

// -- LANGUAGES (needed by AdminSettingsPanel) --
const LANGUAGES = [
  {code:'en-US', label:'English (US)',    flag:'\uD83C\uDDFA\uD83C\uDDF8', groq:'English',   tts:'en-US'},
  {code:'en-GB', label:'English (UK)',    flag:'\uD83C\uDDEC\uD83C\uDDE7', groq:'English',   tts:'en-GB'},
  {code:'en-CA', label:'English (CA)',    flag:'\uD83C\uDDE8\uD83C\uDDE6', groq:'English',   tts:'en-CA'},
  {code:'es',    label:'Espa\u00f1ol',    flag:'\uD83C\uDDEA\uD83C\uDDF8', groq:'Spanish',   tts:'es-ES'},
  {code:'fr',    label:'Fran\u00e7ais',   flag:'\uD83C\uDDEB\uD83C\uDDF7', groq:'French',    tts:'fr-FR'},
  {code:'pt',    label:'Portugu\u00eas',  flag:'\uD83C\uDDE7\uD83C\uDDF7', groq:'Portuguese',tts:'pt-BR'},
  {code:'fa',    label:'\u0641\u0627\u0631\u0633\u06CC', flag:'\uD83C\uDDEE\uD83C\uDDF7', groq:'Farsi', tts:'fa-IR'},
  {code:'it',    label:'Italiano',        flag:'\uD83C\uDDEE\uD83C\uDDF9', groq:'Italian',   tts:'it-IT'},
  {code:'nl',    label:'Nederlands',      flag:'\uD83C\uDDF3\uD83C\uDDF1', groq:'Dutch',     tts:'nl-NL'},
  {code:'zh',    label:'\u7B80\u4F53\u4E2D\u6587', flag:'\uD83C\uDDE8\uD83C\uDDF3', groq:'Simplified Chinese', tts:'zh-CN'},
  {code:'hi',    label:'\u0939\u093F\u0928\u094D\u0926\u0940', flag:'\uD83C\uDDEE\uD83C\uDDF3', groq:'Hindi', tts:'hi-IN'},
  {code:'pa',    label:'\u0A2A\u0A70\u0A1C\u0A3E\u0A2C\u0A40', flag:'\uD83C\uDDEE\uD83C\uDDF3', groq:'Punjabi', tts:'pa-IN'},
];

// -- TTS (needed by AdminSettingsPanel test button) --
function speakText(text, langCode) {
  if (!text || !langCode) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode;
  utt.rate = 0.95;
  utt.pitch = 1.0;
  utt.volume = getSavedVolume ? getSavedVolume() : 0.8;
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === langCode)
    || voices.find(v => v.lang.startsWith(langCode.split("-")[0]))
    || null;
  if (match) utt.voice = match;
  try { window.speechSynthesis.speak(utt); } catch(e) {}
}

// ==========================================
// STORAGE HELPERS
// ==========================================
const store={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn('localStorage set failed:',k,e);}},
};

// -- IndexedDB (offline cache) --
const DB_NAME='stellas_db';
const DB_VER=1;
let _db=null;
function openDB(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');};
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=()=>rej(req.error);
  });
}
async function idbSet(key,value){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(value,key);
      tx.oncomplete=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }catch(e){console.warn('idbSet fallback:',e);store.set(key,value);}
}
async function idbGet(key,defaultVal){
  try{
    const db=await openDB();
    return new Promise((res)=>{
      const req=db.transaction('kv','readonly').objectStore('kv').get(key);
      req.onsuccess=()=>res(req.result!==undefined?req.result:defaultVal);
      req.onerror=()=>res(defaultVal);
    });
  }catch(e){return store.get(key,defaultVal);}
}
function idbGetSync(key,defaultVal){return store.get(key+'_cache',defaultVal);}

// -- Supabase REST helpers --
function sbCfg(){
  const url=store.get('stellas_sb_url','').replace(/\/$/,'');
  const key=store.get('stellas_sb_key','');
  return url&&key?{url,key}:null;
}
function sbHeaders(cfg){
  return{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=minimal'};
}

async function sbUpsert(table, row){
  const cfg=sbCfg();if(!cfg)return;
  try{
    const res=await fetch(cfg.url+'/rest/v1/'+table,{
      method:'POST',
      headers:{...sbHeaders(cfg),'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(row)
    });
    if(!res.ok){const t=await res.text();console.error('[SB] upsert',table,'failed:',t);}
  }catch(e){console.error('[SB] upsert error:',e.message);}
}

async function sbDelete(table, id){
  const cfg=sbCfg();if(!cfg)return;
  try{
    await fetch(cfg.url+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbHeaders(cfg)});
  }catch(e){console.error('[SB] delete error:',e.message);}
}

async function sbLoadAll(table){
  const cfg=sbCfg();if(!cfg)return null;
  try{
    const res=await fetch(cfg.url+'/rest/v1/'+table+'?order=id.asc&limit=1000',{
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
    });
    if(!res.ok)return null;
    return await res.json();
  }catch(e){console.error('[SB] load',table,'error:',e.message);return null;}
}

// -- JS <-> DB field mapping --
function menuToSB(item){
  return{
    id:item.id, name:item.name, price:item.price, cat:item.cat,
    desc:item.desc||'', ing:item.ing||'',
    video_url:item.videoUrl||'', video_filename:item.videoFilename||'',
    img_url:item.imgUrl||'', visible:item.visible!==false,
    trigger_keywords:item.triggerKeywords||'',
    trigger_type:item.triggerType||'item-request',
    triggers:item.triggers||[],
    updated_at:new Date().toISOString()
  };
}
function menuFromSB(row){
  return{
    id:row.id, name:row.name, price:row.price, cat:row.cat,
    desc:row.desc||'', ing:row.ing||'',
    videoUrl:row.video_url||'', videoFilename:row.video_filename||'',
    imgUrl:row.img_url||'', visible:row.visible!==false,
    triggerKeywords:row.trigger_keywords||'',
    triggerType:row.trigger_type||'item-request',
    triggers:row.triggers||[],
  };
}
function msgToSB(m){
  return{
    id:m.id, type:m.type, title:m.title||'', body:m.body||'',
    img_url:m.imgUrl||'', video_url:m.videoUrl||'',
    video_filename:m.videoFilename||'', active:m.active!==false,
    slot:m.slot||'feature1',
    schedule_start:m.scheduleStart||null, schedule_end:m.scheduleEnd||null,
    trigger_keywords:m.triggerKeywords||'',
    updated_at:new Date().toISOString()
  };
}
function msgFromSB(row){
  return{
    id:row.id, type:row.type, title:row.title||'', body:row.body||'',
    imgUrl:row.img_url||'', videoUrl:row.video_url||'',
    videoFilename:row.video_filename||'', active:row.active!==false,
    slot:row.slot||'feature1',
    scheduleStart:row.schedule_start||'', scheduleEnd:row.schedule_end||'',
    triggerKeywords:row.trigger_keywords||'',
  };
}
function faqToSB(e){
  return{id:e.id,title:e.title,body:e.body,tags:e.tags||'',updated_at:new Date().toISOString()};
}

// -- UNIFIED SAVE --
async function saveMenu(updatedMenu, showToastFn){
  await idbSet('stellas_menu', updatedMenu);
  const cfg=sbCfg();
  if(cfg){
    await Promise.all(updatedMenu.map(item=>sbUpsert('menu_items', menuToSB(item))));
  }
  if(showToastFn) showToastFn('Saved');
}

async function saveMessages(updatedMsgs, showToastFn){
  await idbSet('stellas_messages', updatedMsgs);
  const cfg=sbCfg();
  if(cfg){
    await Promise.all(updatedMsgs.map(m=>sbUpsert('messages', msgToSB(m))));
  }
  if(showToastFn) showToastFn('Saved');
}

async function saveFAQ(updatedFAQ, showToastFn){
  await idbSet('stellas_faq', updatedFAQ);
  const cfg=sbCfg();
  if(cfg){
    await Promise.all(updatedFAQ.map(e=>sbUpsert('faq_info', faqToSB(e))));
  }
  if(showToastFn) showToastFn('Saved');
}

async function deleteMenuItem(id, updatedMenu){
  await idbSet('stellas_menu', updatedMenu);
  await sbDelete('menu_items', id);
}
async function deleteMessage(id, updatedMsgs){
  await idbSet('stellas_messages', updatedMsgs);
  await sbDelete('messages', id);
}
async function deleteFAQEntry(id, updatedFAQ){
  await idbSet('stellas_faq', updatedFAQ);
  await sbDelete('faq_info', id);
}

// -- STARTUP LOAD --
async function loadMenuData(){
  const sbRows = await sbLoadAll('menu_items');
  if(sbRows && sbRows.length){
    const items = sbRows.map(menuFromSB);
    await idbSet('stellas_menu', items);
    return items;
  }
  const cached = await idbGet('stellas_menu', null);
  if(cached && cached.length) return cached;
  return null;
}

async function loadMessagesData(){
  const sbRows = await sbLoadAll('messages');
  if(sbRows && sbRows.length){
    const msgs = sbRows.map(msgFromSB);
    await idbSet('stellas_messages', msgs);
    return msgs;
  }
  const cached = await idbGet('stellas_messages', null);
  if(cached && cached.length) return cached;
  return null;
}

async function loadFAQData(){
  const sbRows = await sbLoadAll('faq_info');
  if(sbRows && sbRows.length){
    await idbSet('stellas_faq', sbRows);
    return sbRows;
  }
  const cached = await idbGet('stellas_faq', null);
  if(cached && cached.length) return cached;
  return null;
}

let toastTimer;
function Toast({msg,onDone}){
  useEffect(()=>{toastTimer=setTimeout(onDone,2500);return()=>clearTimeout(toastTimer)},[]);
  return h('div',{className:'toast'},msg);
}

// ==========================================
// FILE UPLOAD HELPERS
// ==========================================
function readFileAsDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}
function FilePicker({label,accept,value,onChange,icon}){
  const ref=useRef();
  return h('div',{className:'form-group'},
    h('label',{className:'label'},label),
    h('div',{className:'file-drop',onClick:()=>ref.current.click()},
      value
        ? h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
            h('span',{style:{fontSize:13,color:'var(--green2)',fontWeight:700}},'File loaded'),
            h('button',{onClick:e=>{e.stopPropagation();onChange('')},style:{background:'transparent',border:'none',color:'var(--red)',cursor:'pointer',fontSize:18}},'x')
          )
        : h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,color:'var(--text3)'}},
            h('div',{style:{width:32,height:32}},icon||I.image),
            h('span',{style:{fontSize:13}},'Tap to upload from phone'),
            h('span',{style:{fontSize:11,color:'var(--text3)'}},accept)
          )
    ),
    h('input',{ref,type:'file',accept,onChange:async e=>{
      const f=e.target.files[0];if(!f)return;
      const data=await readFileAsDataURL(f);
      onChange(data);
    }})
  );
}

// ==========================================
// FUZZY ITEM MATCHER
// ==========================================
function matchMenuItem(rawName, menu) {
  if (!rawName || rawName.toLowerCase() === 'none') return null;
  const q = rawName.toLowerCase().trim();
  const items = menu.filter(i => i.visible);
  let hit = items.find(i => i.name.toLowerCase() === q);
  if (hit) return hit;
  hit = items.find(i => i.name.toLowerCase().includes(q));
  if (hit) return hit;
  hit = items.find(i => q.includes(i.name.toLowerCase()));
  if (hit) return hit;
  const queryWords = q.split(/\s+/).filter(w => w.length > 2);
  let bestScore = 0, bestItem = null;
  for (const item of items) {
    const haystack = (item.name + ' ' + item.desc + ' ' + (item.ing || '') + ' ' + item.cat).toLowerCase();
    let score = 0;
    for (const word of queryWords) {
      if (haystack.includes(word)) score++;
    }
    if (score > bestScore) { bestScore = score; bestItem = item; }
  }
  if (bestScore > 0) return bestItem;
  return null;
}

// ==========================================
// VIDEO URL RESOLVER
// ==========================================
function resolveVideoUrl(item) {
  if (!item) return '';
  if (item.videoUrl && item.videoUrl.startsWith('data:')) return item.videoUrl;
  if (item.videoUrl && item.videoUrl.startsWith('http')) return item.videoUrl;
  const filename = item.videoFilename || (item.videoUrl && !item.videoUrl.startsWith('data:') ? item.videoUrl : '');
  if (filename) {
    const r2Base = store.get('stellas_r2_base','').replace(/\/$/,'');
    if (r2Base) return `${r2Base}/${filename}`;
  }
  return item.videoUrl || '';
}

}

function saveVolume(v){ try{ localStorage.setItem('stellas_volume',String(v)); }catch(e){} }

// ==========================================
// AUDIO UNLOCK
// ==========================================
let audioUnlocked=false;
const pendingUnlock=new Set();
function tryUnlock(v){
  if(audioUnlocked){v.muted=false;v.play().catch(()=>{});return;}
  pendingUnlock.add(v);
}
function forceUnlock(){
  if(audioUnlocked)return;
  audioUnlocked=true;
  for(const v of pendingUnlock){try{v.muted=false;v.play().catch(()=>{});}catch(e){}}
  pendingUnlock.clear();
}
if(typeof document!=='undefined'){
  ['touchstart','mousedown'].forEach(e=>
    document.addEventListener(e,()=>{
      if(!audioUnlocked)forceUnlock();
    },{once:true,capture:true})
  );
}

// ==========================================
// GLOBAL VIDEO GUARD
// ==========================================
let _playId = 0;
let _activeVideoEl = null;

function registerVideoEl(el) { _activeVideoEl = el; }
function unregisterVideoEl(el) { if (_activeVideoEl === el) _activeVideoEl = null; }

function stopCurrentVideo() {
  if (_activeVideoEl) {
    try { _activeVideoEl.pause(); _activeVideoEl.currentTime = 0; } catch(e) {}
  }
  _playId++;
}

function claimPlay(el) {
  stopCurrentVideo();
  _activeVideoEl = el;
  return _playId;
}

// ==========================================
// ORDER NUMBER GENERATOR
// ==========================================
function genOrderNum(){
  const n = store.get('stellas_takeout_counter', 100) + 1;
  store.set('stellas_takeout_counter', n);
  return 'TO-' + String(n).padStart(4,'0');
}

function AvatarDisplay({videoUrl,posterUrl,height='62vh',active=false,loop=false,onEnded,fallbackVideoUrl,staticImgSrc,idleAfter=false,hideNameTag=false,carouselOverlay=null}){
  const videoRef = useRef();
  const myPlayId = useRef(0);
  const[ended,setEnded]=useState(false);
  const[muted,setMuted]=useState(true);
  const[videoErr,setVideoErr]=useState(false);
  const[volume,setVolume]=useState(getSavedVolume);
  const sparks=[[15,0],[30,.5],[50,.9],[70,.3],[85,1.2],[25,1.6],[60,2.0]];

  const playUrl = videoUrl || fallbackVideoUrl || '';
  const effectiveLoop = videoUrl ? loop : (fallbackVideoUrl ? true : false);

  useEffect(()=>{
    return ()=>{ if(videoRef.current) unregisterVideoEl(videoRef.current); };
  },[]);

  useEffect(()=>{
    const v = videoRef.current;
    if(!v) return;
    if(!playUrl){
      v.pause(); v.currentTime=0;
      setEnded(false); setVideoErr(false);
      return;
    }
    const id = claimPlay(v);
    myPlayId.current = id;
    setEnded(false); setVideoErr(false); setMuted(true);

    v.pause();
    v.src = playUrl;
    v.loop = effectiveLoop;
    v.volume = getSavedVolume();
    v.muted = true;
    const p = v.play();
    if(p && p.then) p.then(()=>{
      if(myPlayId.current !== id){ v.pause(); return; }
      tryUnlock(v);
    }).catch(e=>{
      if(e.name !== 'NotAllowedError' && myPlayId.current === id){
        console.warn('[Video] Playback error:', e.message);
      }
    });
  },[playUrl]);

  useEffect(()=>{
    const v=videoRef.current; if(!v) return;
    v.muted=muted;
    if(!muted){ v.volume=volume; v.play().catch(()=>{}); }
  },[muted]);

  useEffect(()=>{
    const v=videoRef.current; if(!v) return;
    v.volume=volume; saveVolume(volume);
  },[volume]);

  function replay(){
    const v=videoRef.current; if(!v) return;
    setEnded(false); setVideoErr(false); setMuted(true);
    const id = claimPlay(v);
    myPlayId.current = id;
    v.currentTime=0; v.volume=getSavedVolume(); v.muted=true;
    const p=v.play();
    if(p&&p.then) p.then(()=>{ if(myPlayId.current===id) tryUnlock(v); })
                   .catch(e=>console.warn('[Video] Replay error:',e.message));
  }

  const nameTag=hideNameTag?null:h('div',{style:{position:'absolute',bottom:20,left:16,zIndex:2,pointerEvents:'none',background:'linear-gradient(135deg,var(--gold),var(--gold2))',color:'#1a1a0a',borderRadius:6,padding:'4px 10px',fontFamily:"'Playfair Display',serif",fontSize:11,fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.3)'}},
    h('div',{style:{fontSize:9,letterSpacing:2}},"STELLA'S"),h('div',{style:{fontSize:11}},'Anna'));

  const pillBtn={background:'rgba(0,0,0,.65)',border:'1.5px solid rgba(255,255,255,.25)',color:'white',borderRadius:50,padding:'0 14px',height:34,fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',boxShadow:'0 2px 10px rgba(0,0,0,.35)',fontFamily:"'Lato',sans-serif"};

  const volControl = playUrl && !ended && !videoErr && h('div',{className:'vol-wrap'},
    h('button',{className:'vol-btn',onClick:()=>setMuted(m=>!m),title:muted?'Unmute':'Mute'},
      muted?'\uD83D\uDD07':volume>0.5?'\uD83D\uDD0A':'\uD83D\uDD09'),
    !muted && h('input',{type:'range',className:'vol-slider',min:0,max:100,
      value:Math.round(volume*100),
      onChange:e=>{ const nv=parseInt(e.target.value)/100; setVolume(nv); if(nv>0&&muted)setMuted(false); },
      onTouchStart:e=>e.stopPropagation(),onTouchMove:e=>e.stopPropagation()})
  );

  const replayBtn = playUrl && (ended||videoErr) && h('button',{onClick:replay,style:{...pillBtn,position:'absolute',top:14,right:14,zIndex:4}},'Play again');

  if(!playUrl){
    const imgSrc = staticImgSrc || posterUrl || '';
    return h('div',{className:'avatar-frame',style:{height,position:'relative',boxShadow:active?'0 0 40px rgba(201,168,76,.5),var(--shadow-glow)':'var(--shadow-glow)'}},
      imgSrc
        ? h('img',{src:imgSrc,alt:'Anna',className:'idle-breathe',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block'}})
        : h('div',{style:{width:'100%',height:'100%',background:'linear-gradient(180deg,var(--green),var(--green2))',display:'flex',alignItems:'center',justifyContent:'center'}},
            h('div',{style:{color:'var(--gold2)',fontSize:48,opacity:.4}},'*')),
      active&&sparks.map(([l,d],i)=>h('div',{key:i,className:'sp',style:{left:`${l}%`,bottom:`${10+i*7}%`,width:4,height:4,animationDelay:`${d}s`}})),
      h('div',{className:'sparkle-overlay'}),nameTag,
      carouselOverlay
    );
  }

  if(ended && idleAfter){
    const idleSrc = staticImgSrc || posterUrl || '';
    return h('div',{className:'avatar-frame',style:{height,position:'relative',boxShadow:active?'0 0 40px rgba(201,168,76,.5),var(--shadow-glow)':'var(--shadow-glow)'}},
      idleSrc
        ? h('img',{src:idleSrc,alt:'Anna',className:'idle-breathe',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block'}})
        : h('div',{style:{width:'100%',height:'100%',background:'linear-gradient(180deg,var(--green),var(--green2))',display:'flex',alignItems:'center',justifyContent:'center'}},
            h('div',{style:{color:'var(--gold2)',fontSize:48,opacity:.4}},'*')),
      sparks.map(([l,d],i)=>h('div',{key:i,className:'sp',style:{left:`${l}%`,bottom:`${10+i*7}%`,width:4,height:4,animationDelay:`${d}s`}})),
      h('div',{className:'sparkle-overlay'}),
      h('button',{onClick:replay,style:{...pillBtn,position:'absolute',top:14,right:14,zIndex:4}},'Play again'),
      nameTag,
      carouselOverlay
    );
  }

  return h('div',{className:'avatar-video-wrap',style:{height}},
    h('video',{
      ref:videoRef,
      playsInline:true,muted:true,
      'webkit-playsinline':'','x-webkit-airplay':'deny',
      disablePictureInPicture:true,disableRemotePlayback:true,
      style:{width:'100%',height:'100%',display:'block',objectFit:'cover',objectPosition:'top center',
        pointerEvents:'none',opacity:(ended&&!idleAfter)?0:1,transition:'opacity .4s ease'},
      onEnded:()=>{ setEnded(true); if(onEnded)onEnded(); },
      onError:()=>{ setVideoErr(true); },
    }),
    ended&&!idleAfter&&(posterUrl||staticImgSrc)&&h('div',{style:{position:'absolute',inset:0,zIndex:1}},
      h('img',{src:posterUrl||staticImgSrc,alt:'poster',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block'}})
    ),
    volControl,replayBtn,nameTag,
    active&&sparks.map(([l,d],i)=>h('div',{key:i,className:'sp',style:{left:`${l}%`,bottom:`${10+i*7}%`,width:4,height:4,animationDelay:`${d}s`}})),

function HomeScreen({menu,messages,onItemSelect,onPromoSelect,homeTitles}){
  const welcome=messages.find(m=>m.type==='welcome'&&m.active);
  const welcomeVideo=resolveVideoUrl(welcome||null);
  const welcomeImg=welcome?.imgUrl||'';

  // Play welcome video on first touch of the session
  const[touchTriggered,setTouchTriggered]=useState(false);

  // On first touch/click anywhere, trigger the welcome video
  useEffect(()=>{
    if(touchTriggered) return;
    function onFirstTouch(){
      setTouchTriggered(true);
      forceUnlock();
    }
    document.addEventListener('touchstart',onFirstTouch,{once:true,capture:true});
    document.addEventListener('mousedown',onFirstTouch,{once:true,capture:true});
    return ()=>{
      document.removeEventListener('touchstart',onFirstTouch,{capture:true});
      document.removeEventListener('mousedown',onFirstTouch,{capture:true});
    };
  },[touchTriggered]);

  const avatarVideo = (touchTriggered && welcomeVideo) ? welcomeVideo : '';

  function onWelcomePlayed(){
    console.log('[Home] Welcome video finished');
  }

  const titles = homeTitles || store.get('stellas_home_titles',{});
  const highlightsTitle = titles.highlights || 'Menu Highlights';
  const picksTitle = titles.picks || "Chef's Picks";
  const picksCategory = titles.picksCategory || 'Mains';

  const features=['feature1','feature2','feature3'];
  const now=new Date();

  function getPromo(slot){
    return messages.find(m=>{
      if(m.type!=='promo'||m.slot!==slot||!m.active)return false;
      if(m.scheduleStart&&new Date(m.scheduleStart)>now)return false;
      if(m.scheduleEnd&&new Date(m.scheduleEnd)<now)return false;
      return true;
    });
  }

  const promos=features.map(s=>getPromo(s));
  const hasAnyPromo=promos.some(Boolean);

  const cardTapStyle={cursor:'pointer',WebkitTapHighlightColor:'rgba(201,168,76,.18)',transition:'transform .12s'};

    h('div',{style:{padding:'14px 16px 0'}},
      h('div',{className:'bubble',style:{textAlign:'center'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:22,color:'var(--text1)',marginBottom:4}},
          welcome?welcome.title:"Hi, I'm Anna"

        h('div',{style:{fontSize:14,color:'var(--text2)',lineHeight:1.6}},

      )
    ),

    // Featured Promos
    hasAnyPromo&&h('div',null,
      h('div',{className:'section-head'},
        h('span',{className:'section-head-title'},'Featured Today'),
        h('div',{className:'section-head-line'}),
        h('span',{style:{color:'var(--gold)',fontSize:20,paddingLeft:4}},'>')
      ),
      h('div',{className:'hscroll'},
        promos.filter(Boolean).map((p,i)=>h('div',{
          key:i,className:'feat-card',style:{width:180,...cardTapStyle},
          onClick:()=>onPromoSelect(p),
          role:'button','aria-label':'Learn about '+p.title
        },
          p.imgUrl&&h('img',{src:p.imgUrl,alt:p.title,style:{width:'100%',height:110,objectFit:'cover'}}),
          !p.imgUrl&&h('div',{style:{height:110,background:'linear-gradient(135deg,var(--green),var(--green2))',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold2)',fontSize:32}},'*'),
          h('div',{className:'feat-label'},

            h('div',{className:'feat-label-sub',style:{fontSize:11,lineHeight:1.4}},p.body.substring(0,55)+'...')
          )

    // Menu Highlights

// Load QRCode library on demand
let _qrLib = null;
async function loadQRLib(){
  if(_qrLib) return _qrLib;
  if(window.QRCode){ _qrLib=window.QRCode; return _qrLib; }
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>{ _qrLib=window.QRCode; res(_qrLib); };
    s.onerror=()=>rej(new Error('QR lib failed to load'));
    document.head.appendChild(s);
  });
}

// Session token store — persists in localStorage
const SESSION_KEY = 'stellas_table_sessions';
function getSessions(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'{}'); }catch(e){ return {}; } }
function setSession(tableNum, token){ const s=getSessions(); s[String(tableNum)]=token; localStorage.setItem(SESSION_KEY,JSON.stringify(s)); }
function getSession(tableNum){ return getSessions()[String(tableNum)]||null; }
function genToken(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
// Ensure every table has a session token, create if missing
function ensureSession(tableNum){ let t=getSession(tableNum); if(!t){ t=genToken(); setSession(tableNum,t); } return t; }
// Reset a table — new token invalidates all old QR links
function resetSession(tableNum){ const t=genToken(); setSession(tableNum,t); console.log('[QR] Table',tableNum,'reset — new token:',t); return t; }

function QRDisplay({tableNum, baseUrl, sessionToken, onReset}){
  const canvasRef = useRef();
  const [copied, setCopied] = useState(false);
  const token = sessionToken || ensureSession(tableNum);
  const base = baseUrl || window.location.href.split('?')[0];
  const url = base + '?table=' + tableNum + '&session=' + token;

  useEffect(()=>{
    const el = canvasRef.current;
    if(!el) return;
    el.innerHTML = '';
    loadQRLib().then(QRCode=>{
      new QRCode(el, {
        text: url,
        width: 160,
        height: 160,
        colorDark: '#1a3a2a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }).catch(()=>{
      // Fallback: show URL text if lib fails
      el.innerHTML = '<div style="font-size:9px;word-break:break-all;padding:8px;color:#1a3a2a">' + url + '</div>';
    });
  }, [url]);

  function printSlip(){
    const win = window.open('','_blank','width=400,height=500');
    win.document.write(`

      <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap');

        .msg{font-size:11px;color:#5a4a3a;line-height:1.6;margin-bottom:8px}
        .token{font-size:11px;color:#8a7a6a;letter-spacing:2px}
        .divider{border:none;border-top:1px dashed #ccc;margin:10px 0}
      </style>
      </head><body>
      <div class="slip">
        <div class="brand">STELLA'S</div>
        <div class="sub">AI HOST</div>
        <div class="table">Table ${tableNum}</div>
        <div id="qr-print"></div>
        <div class="msg">Scan to chat with Anna,<br>your AI host!</div>
        <hr class="divider">
        <div class="token">Session: ${token}</div>
      </div>
      <scr"+"ipt src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></scr"+"ipt>
      '<scr'+'ipt>
        new QRCode(document.getElementById('qr-print'),{text:'${url}',width:160,height:160,colorDark:'#1a3a2a',colorLight:'#ffffff'});
        setTimeout(()=>window.print(),800);

    `);
    win.document.close();
  }

  function copyUrl(){

  return h('div',{style:{textAlign:'center'}},

// -- SHARED: Upload + storage filename field ------------------
function VideoField({videoUrl,videoFilename,onUrlChange,onFilenameChange}){
  const r2Base=store.get('stellas_r2_base','').replace(/\/$/,'');
  const r2WorkerUrl=store.get('stellas_r2_worker','');
  const[uploading,setUploading]=useState(false);
  const[uploadMsg,setUploadMsg]=useState('');
  const ref=useRef();

  // Build preview URL from filename
  let resolvedUrl=videoUrl||'';
  if(!resolvedUrl&&videoFilename&&r2Base){
    resolvedUrl=`${r2Base}/${videoFilename}`;
  }

  async function uploadToR2(file){
    const workerUrl=(store.get('stellas_r2_worker','')||'').replace(/\/$/,'');
    const secret=store.get('stellas_r2_secret','');
    if(!workerUrl){
      // No worker configured -- store as local blob only
      const data=await readFileAsDataURL(file);
      onUrlChange(data);onFilenameChange('');
      setUploadMsg('✓ Stored locally (add Worker URL in Settings to upload to R2)');
      return;
    }
    setUploading(true);setUploadMsg('Uploading to R2…');
    try{
      const fd=new FormData();
      fd.append('file',file);
      const res=await fetch(workerUrl+'/upload',{
        method:'POST',
        headers:{'x-upload-secret':secret},
        body:fd,
      });

// ADMIN - LIVE ACTIVITY (Tables + Orders)
function AdminLive({tableOrders,setTableOrders,showToast}){
  const tables=Object.keys(tableOrders).sort((a,b)=>parseInt(a)-parseInt(b));
  const[addTable,setAddTable]=useState('');
  
  function addTableNum(){
    const n=parseInt(addTable);if(!n||tableOrders[n])return;
    const upd={...tableOrders,[n]:[]};setTableOrders(upd);store.set('stellas_orders',upd);
    setAddTable('');
  }
  function removeTable(tbl){
    if(!confirm(`Remove Table ${tbl}?`))return;
    const upd={...tableOrders};delete upd[tbl];
    setTableOrders(upd);store.set('stellas_orders',upd);
  }
  function updateStatus(tbl,idx,status){
    const upd={...tableOrders,[tbl]:tableOrders[tbl].map((o,i)=>i===idx?{...o,status}:o)};
    setTableOrders(upd);store.set('stellas_orders',upd);
    if(status==='making')showToast(`🍳 Sent to kitchen!`);
    if(status==='ready')showToast(`✅ Ready for pickup!`);
  }
  function clearTable(tbl){
    const upd={...tableOrders,[tbl]:[]};setTableOrders(upd);store.set('stellas_orders',upd);
    showToast(`Table ${tbl} cleared`);
  }
  
  const statusFlow=['new','making','ready','done'];
  const statusLabel={new:'New Order',making:'Making',ready:'Ready!',done:'Done'};
  const statusNext={new:'making',making:'ready',ready:'done'};
  const statusActionLabel={new:'▶ Send to Kitchen',making:'✓ Mark Ready',ready:'✓ Mark Done'};
  const statusClass={new:'status-new',making:'status-making',ready:'status-ready',done:'status-done'};
  
  const totalActive=tables.reduce((acc,t)=>acc+tableOrders[t].filter(o=>o.status!=='done').length,0);
  
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Live Activity'),
        totalActive>0&&h('div',{style:{fontSize:12,color:'var(--red)',fontWeight:700,marginTop:2}},`🔴 ${totalActive} active orders`)
      ),
      h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        h('input',{value:addTable,onChange:e=>setAddTable(e.target.value),placeholder:'Table #',type:'number',className:'field',style:{width:80,padding:'8px 12px',fontSize:14,borderRadius:10}}),
        h('button',{className:'btn btn-green btn-sm',onClick:addTableNum},h('div',{className:'btn-icon'},I.plus),'Add Table')
      )
    ),
    
    tables.length===0&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:48,marginBottom:12}},'🍽️'),
      h('div',{style:{fontSize:14}}),'Add table numbers to monitor orders in real time'
    ),
    
    tables.map(tbl=>{
      const orders=tableOrders[tbl];
      const activeOrders=orders.filter(o=>o.status!=='done');
      return h('div',{key:tbl,className:'table-card'},
        h('div',{className:'table-card-head'},
          h('div',null,
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}},'Table '+tbl),
            activeOrders.length>0&&h('span',{style:{marginLeft:8,background:'rgba(255,100,100,.3)',padding:'2px 8px',borderRadius:20,fontSize:11}},'⚡ '+activeOrders.length+' pending')
          ),
          h('div',{style:{display:'flex',gap:8}},
            h('div',null,
              h(QRDisplay,{tableNum:tbl})
            ),
            h('button',{onClick:()=>clearTable(tbl),style:{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,fontFamily:"'Lato',sans-serif"}},'Clear All')
          )
        ),
        h('div',{style:{padding:12}},
          orders.length===0
            ?h('div',{style:{textAlign:'center',padding:'16px',color:'var(--text3)',fontSize:13}},'No orders yet -- customer will see order button after scanning QR')
            :orders.map((order,idx)=>h('div',{key:idx,className:'order-item'},
              order.imgUrl&&h('img',{src:order.imgUrl,style:{width:44,height:44,borderRadius:8,objectFit:'cover',flexShrink:0}}),
              h('div',{style:{flex:1}},
                h('div',{style:{fontWeight:700,fontSize:14,color:'var(--text1)'}},'$'+order.price+' · '+order.name),
                h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},new Date(order.time).toLocaleTimeString())
              ),
              h('span',{className:'order-status '+statusClass[order.status]},statusLabel[order.status]),
              order.status!=='done'&&h('button',{
                onClick:()=>updateStatus(tbl,idx,statusNext[order.status]),
                className:'btn btn-sm',
                style:{background:order.status==='new'?'var(--green)':order.status==='making'?'#e67e22':'#1976d2',color:'white',borderRadius:20,border:'none',padding:'6px 12px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}
              },statusActionLabel[order.status])
            ))
        )
      );
    })
  );
}
// ADMIN - QR CODES
function AdminQR({tableOrders}){
  const[count,setCount]=useState(10);
  const[sessions,setSessions]=useState(()=>getSessions());
  const tables=Array.from({length:count},(_,i)=>i+1);

  function handleReset(n){
    if(!confirm('Reset Table '+n+'? The current QR link will stop working immediately.'))return;
    const t=resetSession(n);
    setSessions({...getSessions()});
  }
  function handleResetAll(){
    if(!confirm('Reset ALL tables? All current QR links will stop working.'))return;
    tables.forEach(n=>resetSession(n));
    setSessions({...getSessions()});
  }

  return h('div',null,
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)',marginBottom:8}},'QR Codes'),
    h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:12,lineHeight:1.6}},
      'Each table gets a unique session code. When a party leaves, tap Reset to generate a new code -- the old QR link instantly stops working.'
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}},
      h('label',{className:'label',style:{margin:0}},'Number of tables:'),
      h('input',{type:'number',value:count,onChange:e=>setCount(Math.max(1,Math.min(50,parseInt(e.target.value)||1))),className:'field',style:{width:70,padding:'8px 12px'}}),
      h('button',{
        onClick:handleResetAll,
        style:{marginLeft:'auto',background:'rgba(220,60,60,.08)',color:'var(--red)',border:'1px solid rgba(220,60,60,.3)',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif"}
      },'Reset All Tables')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      tables.map(n=>h('div',{key:n+(sessions[n]||''),className:'glass',style:{padding:14,textAlign:'center'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,color:'var(--text1)',marginBottom:10,fontWeight:700}},'Table '+n),
        h(QRDisplay,{tableNum:n, sessionToken:sessions[String(n)]||ensureSession(n), onReset:()=>handleReset(n)})
      ))
    )
  );
}

function AdminFAQ({faq,setFaq,showToast}){
  const empty={title:'',body:'',tags:''};
  const[form,setForm]=useState(empty);
  const[editing,setEditing]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  function save(){
    if(!form.title||!form.body){showToast('⚠️ Title and body required');return;}
    const entry={...form,id:editing||Date.now()};
    const upd=editing?faq.map(e=>e.id===editing?entry:e):[...faq,entry];
    setFaq(upd);
    saveFAQ(upd, showToast);
    setEditing(null);setShowForm(false);setForm(empty);
  }

  function del(id){
    if(!confirm('Delete this FAQ entry?'))return;
    const upd=faq.filter(e=>e.id!==id);
    setFaq(upd);
    deleteFAQEntry(id, upd);
    showToast('Deleted');
  }

  function edit(entry){setForm({...entry});setEditing(entry.id);setShowForm(true);}

  const tagStyle={display:'inline-block',background:'rgba(201,168,76,.12)',color:'var(--gold3)',borderRadius:20,padding:'1px 8px',margin:'1px 2px',fontSize:10};

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'FAQ & Info'),
        h('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},'Answers chat questions not covered by the menu (hours, parking, dress code, etc.)')
      ),
      h('button',{className:'btn btn-green btn-sm',onClick:()=>{setShowForm(true);setEditing(null);setForm(empty);}},
        h('div',{className:'btn-icon'},I.plus),'Add Entry'
      )
    ),

    // -- Add / Edit Form --
    showForm&&h('div',{className:'glass',style:{padding:16,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:14}},editing?'Edit Entry':'New FAQ Entry'),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Title *'),
        h('input',{value:form.title,onChange:e=>f('title',e.target.value),className:'field',placeholder:'e.g. Opening Hours, Parking, Dress Code, Reservations'})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Answer / Body *'),
        h('textarea',{value:form.body,onChange:e=>f('body',e.target.value),className:'field',rows:4,placeholder:'e.g. We\'re open Monday to Sunday, 5pm-11pm. Last call is 10:30pm.'})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Tags'),
        h('input',{value:form.tags||'',onChange:e=>f('tags',e.target.value),className:'field',placeholder:'e.g. hours, open, close, late, early'}),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},'Comma-separated. Chat matches these words to find this entry.')
      ),
      form.tags&&h('div',{style:{marginBottom:10}},
        form.tags.split(',').map(t=>t.trim()).filter(Boolean).map((t,i)=>h('span',{key:i,style:tagStyle},t))
      ),
      h('div',{style:{display:'flex',gap:10,marginTop:4}},
        h('button',{className:'btn btn-green',style:{flex:1},onClick:save},editing?'Update':'Save'),
        h('button',{className:'btn btn-gold',style:{flex:1},onClick:()=>{setShowForm(false);setEditing(null);setForm(empty);}},'Cancel')
      )
    ),

    // -- Entry list --
    faq.length===0&&!showForm&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:32,marginBottom:8}},'❓'),
      h('div',{style:{fontSize:14}},'No FAQ entries yet.'),
      h('div',{style:{fontSize:12,marginTop:4}},'Add entries for hours, parking, reservations, dress code, etc.')
    ),

    faq.map(entry=>h('div',{key:entry.id,className:'glass',style:{padding:12,marginBottom:10}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:'var(--text1)',flex:1,marginRight:8}},entry.title),
        h('div',{style:{display:'flex',gap:8,flexShrink:0}},
          h('button',{onClick:()=>edit(entry),style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--gold3)',fontSize:16}},'✏️'),
          h('button',{onClick:()=>del(entry.id),style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16}},'🗑')
        )
      ),
      h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:entry.tags?8:0}},entry.body),
      entry.tags&&h('div',null,
        entry.tags.split(',').map(t=>t.trim()).filter(Boolean).map((t,i)=>h('span',{key:i,style:tagStyle},t))
      )
    ))
  );

            };
            const base = lang.code.split('-')[0];
            const phrase = testPhrases[base] || testPhrases['en'];
            speakText(phrase, lang.tts);
          },
          style:{marginTop:8,padding:'6px 14px',borderRadius:20,border:'1px solid var(--green2)',background:'rgba(42,90,64,.08)',color:'var(--green2)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif"}
        },'▶ Test Voice')
      )
    ),

    // -- 8. Backup & Restore --
    h(Accord,{id:'backup',emoji:'💾',label:'Backup & Restore'},
      h('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:14}},
        'Export everything -- menu items, messages, FAQ, images, videos, API keys, settings -- to a single JSON file. Import on any device to restore instantly. Do this before every upgrade.'
      ),

      // EXPORT
      h('button',{
        className:'btn btn-green',
        style:{width:'100%',marginBottom:10,fontSize:14},
        onClick:async()=>{
          showToast('Preparing export...');
          try{
            const menuData = await idbGet('stellas_menu',[]);
            const msgsData = await idbGet('stellas_messages',[]);
            const faqData  = await idbGet('stellas_faq',[]);
            const backup = {
              version:2,
              exportedAt:new Date().toISOString(),
              settings:   store.get('stellas_settings',{}),
              r2Base:     store.get('stellas_r2_base',''),
              altUrl:     store.get('stellas_alt_storage',''),
              r2Worker:   store.get('stellas_r2_worker',''),
              r2Secret:   store.get('stellas_r2_secret',''),
              homeTitles: store.get('stellas_home_titles',{}),
              cats:       store.get('stellas_cats',[]),
              msgTypes:   store.get('stellas_msg_types',[]),
              orders:     store.get('stellas_orders',{}),
              menu:menuData, msgs:msgsData, faqData:faqData,
            };
            const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
            const a=document.createElement('a');
            a.href=URL.createObjectURL(blob);
            a.download='stellas-backup-'+new Date().toISOString().slice(0,10)+'.json';
            a.click();
            showToast('Backup downloaded -- save it to your phone!');
          }catch(e){showToast('Export failed: '+e.message);}
        }
      },'Export All Data (backup)'),

      // IMPORT
      h('div',null,
        h('label',{
          style:{display:'block',width:'100%',padding:'13px',textAlign:'center',
            background:'rgba(201,168,76,.1)',border:'1.5px solid var(--gold)',
            borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:700,
            color:'var(--gold3)',fontFamily:"'Lato',sans-serif"},
        },
          'Import Backup (restore)',
          h('input',{
            type:'file',accept:'.json',
            style:{display:'none'},
            onChange:async e=>{
              const file=e.target.files[0]; if(!file)return;
              if(!confirm('This will REPLACE all current data with the backup. Continue?'))return;
              showToast('Restoring...');
              try{
                const text=await file.text();
                const b=JSON.parse(text);
                if(b.settings)   store.set('stellas_settings',b.settings);
                if(b.r2Base)     store.set('stellas_r2_base',b.r2Base);
                if(b.altUrl)     store.set('stellas_alt_storage',b.altUrl);
                if(b.r2Worker) store.set('stellas_r2_worker',b.r2Worker);
                if(b.r2Secret) store.set('stellas_r2_secret',b.r2Secret);
                if(b.homeTitles) store.set('stellas_home_titles',b.homeTitles);
                if(b.cats)       store.set('stellas_cats',b.cats);
                if(b.msgTypes)   store.set('stellas_msg_types',b.msgTypes);
                if(b.orders)     store.set('stellas_orders',b.orders);
                if(b.menu)    await idbSet('stellas_menu',b.menu);
                if(b.msgs)    await idbSet('stellas_messages',b.msgs);
                if(b.faqData) await idbSet('stellas_faq',b.faqData);
                showToast('Restored! Reloading in 2 seconds...');
                setTimeout(()=>window.location.reload(),2000);
              }catch(err){showToast('Import failed: '+err.message);}
            }
          })
        )
      ),

      h('div',{style:{marginTop:10,fontSize:11,color:'var(--text3)',lineHeight:1.6}},
        'Tip: Export before every upgrade and save the .json file to your Files app. After any redeploy, tap Import to restore everything including images, videos, and keys.'
      )
    ),

    // -- Save --
    h('button',{className:'btn btn-green',style:{width:'100%',fontSize:16,padding:'15px',marginTop:6,marginBottom:8},onClick:save,disabled:saving},saving?'⏳ Saving…':'✓ Save All Settings'),
    h('div',{style:{textAlign:'center',fontSize:11,color:'var(--text3)',paddingBottom:20}},'Settings stored on this device. Videos stored in Cloudflare R2.')
  );
}

function AdminTakeout({showToast}){
  const[orders,setOrders]=useState(()=>store.get('stellas_takeout_orders',[]));
  const[filter,setFilter]=useState('all');

  function refresh(){ setOrders(store.get('stellas_takeout_orders',[])); }
  useEffect(()=>{ const t=setInterval(refresh,5000); return()=>clearInterval(t); },[]);

  function updateStatus(idx,status){
    const upd=orders.map((o,i)=>i===idx?{...o,status}:o);
    setOrders(upd); store.set('stellas_takeout_orders',upd);
    if(status==='making') showToast('🍳 Sent to kitchen!');
    if(status==='ready') showToast('✅ Ready for pickup!');
    if(status==='done') showToast('✓ Order complete!');
  }
  function clearDone(){
    const upd=orders.filter(o=>o.status!=='done');
    setOrders(upd); store.set('stellas_takeout_orders',upd);
    showToast('Cleared completed orders');
  }

  const statusFlow={new:'making',making:'ready',ready:'done'};
  const statusActionLabel={new:'▶ Send to Kitchen',making:'✓ Mark Ready',ready:'✓ Mark Done'};
  const statusClass={new:'status-new',making:'status-making',ready:'status-ready',done:'status-done'};
  const statusLabel={new:'New',making:'Making',ready:'Ready!',done:'Done'};
  const statusBtnColor={new:'var(--green)',making:'#e67e22',ready:'#1976d2'};

  const filtered = filter==='all' ? orders : orders.filter(o=>o.status===filter);
  const activeCount = orders.filter(o=>o.status!=='done').length;

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Takeout Orders'),
        activeCount>0&&h('div',{style:{fontSize:12,color:'var(--red)',fontWeight:700,marginTop:2}},'🔴 '+activeCount+' active')
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:refresh,style:{background:'rgba(42,90,64,.1)',border:'none',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'var(--green2)',fontFamily:"'Lato',sans-serif"}},'↻ Refresh'),
        h('button',{onClick:clearDone,style:{background:'rgba(220,60,60,.08)',border:'1px solid rgba(220,60,60,.2)',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'var(--red)',fontFamily:"'Lato',sans-serif"}},'Clear Done')
      )
    ),

    // Filter chips
    h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      ['all','new','making','ready','done'].map(f=>
        h('button',{key:f,onClick:()=>setFilter(f),style:{
          padding:'5px 14px',borderRadius:20,border:'none',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif",
          background:filter===f?'var(--green)':'rgba(201,168,76,.12)',
          color:filter===f?'white':'var(--text2)'
        }},f.charAt(0).toUpperCase()+f.slice(1)+(f==='all'?' ('+orders.length+')':f==='new'?' ('+orders.filter(o=>o.status==='new').length+')':f==='making'?' ('+orders.filter(o=>o.status==='making').length+')':f==='ready'?' ('+orders.filter(o=>o.status==='ready').length+')':' ('+orders.filter(o=>o.status==='done').length+')'))
      )
    ),

    filtered.length===0&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:14}},'No takeout orders yet')
    ),

    filtered.map((order,idx)=>{
      const realIdx = orders.indexOf(order);
      const subtotal = (order.items||[]).reduce((s,i)=>s+(i.price||0),0);
      const tax = subtotal * 0.13;
      return h('div',{key:order.orderNum+idx,className:'admin-takeout-card'},
        h('div',{className:'admin-takeout-head'},
          h('div',null,
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}},order.orderNum),
            h('span',{style:{marginLeft:10,fontSize:11,opacity:.8}},new Date(order.time).toLocaleTimeString()),
            order.customer&&order.customer.name&&h('div',{style:{fontSize:13,marginTop:4,opacity:.9}},
              '👤 '+order.customer.name+(order.customer.phone?' · 📞 '+order.customer.phone:'')+(order.customer.email?' · ✉️ '+order.customer.email:'')
            )
          ),
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{className:'order-status '+statusClass[order.status]},statusLabel[order.status]),
            order.status!=='done'&&h('button',{
              onClick:()=>updateStatus(realIdx,statusFlow[order.status]),
              style:{background:'rgba(255,255,255,.25)',border:'1px solid rgba(255,255,255,.4)',color:'white',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:"'Lato',sans-serif",whiteSpace:'nowrap'}
            },statusActionLabel[order.status])
          )
        ),
        h('div',{style:{padding:12}},
          (order.items||[]).map((item,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<order.items.length-1?'1px solid rgba(201,168,76,.15)':'none'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              item.imgUrl&&h('img',{src:item.imgUrl,style:{width:36,height:36,borderRadius:6,objectFit:'cover'}}),
              h('span',{style:{fontSize:14,color:'var(--text1)',fontWeight:600}},item.name)
            ),
            h('span',{style:{fontSize:14,color:'var(--gold3)',fontWeight:700}},'$'+item.price.toFixed(2))
          )),
          h('div',{style:{display:'flex',justifyContent:'space-between',paddingTop:8,borderTop:'1px solid rgba(201,168,76,.2)',marginTop:6}},
            h('span',{style:{fontSize:12,color:'var(--text3)'}},'Subtotal $'+subtotal.toFixed(2)+' + tax $'+tax.toFixed(2)),
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'var(--text1)'}},'$'+(subtotal+tax).toFixed(2))
          ),
          h('div',{style:{marginTop:6,fontSize:11,color:'var(--text3)',fontStyle:'italic'}},'💳 Pay at register')
        )
      );
    })
  );
}

function AdminCarousel({menu, showToast}){
  const KEY = 'stellas_carousel_cfg';
  const DEF = {
    enabled: true,
    popupMode: 'voice',
    style: 'overlay',
    showPrice: true,
    showAddBtn: true,
    addBtnLabel: '+ Add',
    triggers: [],
    pinnedIds: [],
  };

  const load = () => { try{ return {...DEF,...JSON.parse(localStorage.getItem(KEY)||'{}')}; }catch(e){ return DEF; } };
  const [cfg, setCfg] = useState(load);
  const [newPhrases, setNewPhrases] = useState('');
  const [newLabel, setNewLabel] = useState('');
  const [newPhraseItems, setNewPhraseItems] = useState([]);
  const [newVideoUrl, setNewVideoUrl] = useState('');
  const [newVideoFilename, setNewVideoFilename] = useState('');
  const [newImgUrl, setNewImgUrl] = useState('');
  const [section, setSection] = useState('triggers');

  function save(nextCfg){
    const c = nextCfg || cfg;
    localStorage.setItem(KEY, JSON.stringify(c));
    setCfg(c);
    showToast('Carousel saved');
  }
  function upd(k,v){ setCfg(p => ({...p,[k]:v})); }

  const visibleItems = menu.filter(i => i.visible);

  function addTrigger(){
    if(!newPhrases.trim()){ showToast('Enter at least one trigger phrase'); return; }
    if(!newPhraseItems.length){ showToast('Select at least one item'); return; }
    const t = {phrases: newPhrases.trim().toLowerCase(), label: newLabel.trim()||'', itemIds: newPhraseItems, videoUrl:newVideoUrl, videoFilename:newVideoFilename, imgUrl:newImgUrl};
    const next = {...cfg, triggers:[...cfg.triggers, t]};
    save(next); setNewPhrases(''); setNewLabel(''); setNewPhraseItems([]); setNewVideoUrl(''); setNewVideoFilename(''); setNewImgUrl('');
  }
  function deleteTrigger(i){
    const next = {...cfg, triggers: cfg.triggers.filter((_,idx)=>idx!==i)};
    save(next);
  }
  function toggleTriggerItem(id){
    setNewPhraseItems(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
  }
  function togglePinned(id){
    const next = {...cfg, pinnedIds: cfg.pinnedIds.includes(id) ? cfg.pinnedIds.filter(x=>x!==id) : [...cfg.pinnedIds,id]};
    save(next);
  }

  const tabStyle = active => ({
    padding:'8px 16px', borderRadius:'8px 8px 0 0', border:'none', cursor:'pointer',
    fontFamily:"'Lato',sans-serif", fontSize:13, fontWeight:700,
    background: active ? 'white' : 'rgba(201,168,76,.12)',
    color: active ? 'var(--text1)' : 'var(--text3)',
    borderBottom: active ? '2px solid var(--gold)' : '2px solid transparent',
  });

  const pill = (label, active, onClick) => h('button',{
    onClick, style:{
      padding:'6px 14px', borderRadius:20, border:'1.5px solid var(--gold)', fontSize:12,
      fontWeight:700, cursor:'pointer', fontFamily:"'Lato',sans-serif",
      background: active ? 'var(--green)' : 'transparent',
      color: active ? 'white' : 'var(--text2)',
    }
  }, label);

  return h('div', null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Carousel Settings'),
      h('label',{className:'tgl'},
        h('input',{type:'checkbox',checked:cfg.enabled,onChange:e=>{ const n={...cfg,enabled:e.target.checked}; save(n); }}),
        h('span',{className:'tgl-slider'})
      )
    ),
    h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:16,lineHeight:1.5}},
      cfg.enabled
        ? 'Carousel is ON \u2014 scrollable cards appear over Anna\'s photo when she shows a group of items.'
        : 'Carousel is OFF \u2014 Anna lists items in the text bubble only.'
    ),

    h('div',{style:{display:'flex',gap:4,marginBottom:16,borderBottom:'2px solid rgba(201,168,76,.2)'}},
      h('button',{style:tabStyle(section==='triggers'),onClick:()=>setSection('triggers')},'Triggers'),
      h('button',{style:tabStyle(section==='pinned'),onClick:()=>setSection('pinned')},'Pinned Items'),
      h('button',{style:tabStyle(section==='display'),onClick:()=>setSection('display')},'Display')
    ),

    // TRIGGERS TAB
    section==='triggers'&&h('div',null,
      h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:14,lineHeight:1.5}},
        'Set phrases that trigger the carousel with specific items. When someone says that phrase, Anna shows those items as cards.'
      ),

      cfg.triggers.length===0&&h('div',{style:{
        textAlign:'center',padding:'24px 16px',background:'rgba(201,168,76,.06)',
        borderRadius:12,border:'1.5px dashed var(--gold)',marginBottom:16,color:'var(--text3)',fontSize:13
      }},'No triggers yet \u2014 add one below'),

      cfg.triggers.map((t,i) => {
        const items = t.itemIds.map(id => visibleItems.find(it=>it.id===id)).filter(Boolean);
        const hasVid = !!(t.videoUrl||t.videoFilename);
        const hasImg = !!t.imgUrl;
        return h('div',{key:i,className:'glass',style:{padding:14,marginBottom:10}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},
            h('div',null,
              h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text1)',marginBottom:2}},
                (t.label ? t.label+': ' : '')+'"'+(t.phrases||t.phrase||'')+'"'
              ),
              h('div',{style:{fontSize:11,color:'var(--text3)',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
                items.length+' item'+(items.length!==1?'s':''),
                hasVid&&h('span',{style:{background:'rgba(42,90,64,.15)',padding:'1px 6px',borderRadius:8,fontSize:10,color:'var(--green2)',fontWeight:700}},'\uD83C\uDFA5 Video'),
                hasImg&&h('span',{style:{background:'rgba(201,168,76,.15)',padding:'1px 6px',borderRadius:8,fontSize:10,color:'var(--gold3)',fontWeight:700}},'\uD83D\uDDBC Image')
              )
            ),
            h('button',{onClick:()=>deleteTrigger(i),style:{background:'rgba(220,60,60,.08)',border:'1px solid rgba(220,60,60,.25)',borderRadius:8,padding:'5px 10px',fontSize:12,fontWeight:700,cursor:'pointer',color:'var(--red)',fontFamily:"'Lato',sans-serif"}},'Delete')

          hasImg&&h('img',{src:t.imgUrl,style:{width:'100%',height:60,objectFit:'cover',borderRadius:8,marginBottom:6}}),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            items.map(it=>h('div',{key:it.id,style:{

          )
        );

      h('div',{className:'glass',style:{padding:16,marginTop:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:12}},'+ Add Trigger'),

        h('div',{className:'form-group'},

            value:newPhrases,
            onChange:e=>setNewPhrases(e.target.value),

            className:'field'
          }),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},'Add multiple phrases separated by commas. Any match triggers this carousel.')
        ),
        h('div',{className:'form-group'},
          h('label',{className:'label'},'Display label (optional)'),
          h('input',{
            value:newLabel,
            onChange:e=>setNewLabel(e.target.value),
            placeholder:'e.g. Drinks, Desserts, Burgers',
            className:'field'
          }),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},'Title shown above the carousel cards. Defaults to the matched phrase if empty.')
        ),

        h('div',{className:'form-group'},
          h('label',{className:'label'},'Items to show'),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:8}},'Tap to select \u2014 these cards appear in the carousel for this phrase.'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:280,overflowY:'auto'}},
            visibleItems.map(it => {
              const selected = newPhraseItems.includes(it.id);
              return h('div',{
                key:it.id,
                onClick:()=>toggleTriggerItem(it.id),
                style:{
                  display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                  borderRadius:10,cursor:'pointer',border:'1.5px solid',
                  borderColor: selected ? 'var(--green2)' : 'rgba(201,168,76,.3)',
                  background: selected ? 'rgba(42,90,64,.08)' : 'white',
                }
              },
                it.imgUrl&&h('img',{src:it.imgUrl,alt:it.name,style:{width:40,height:40,borderRadius:8,objectFit:'cover',flexShrink:0}}),
                h('div',{style:{flex:1}},
                  h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text1)'}},'$'+it.price+' \u00B7 '+it.name),
                  h('div',{style:{fontSize:11,color:'var(--text3)'}},'\u2726 '+it.cat)
                ),
                h('div',{style:{
                  width:22,height:22,borderRadius:'50%',border:'2px solid',flexShrink:0,
                  borderColor:selected?'var(--green2)':'var(--gold)',
                  background:selected?'var(--green2)':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'white',fontSize:13,fontWeight:700
                }},selected?'\u2713':'')
              );
            })
          )
        ),

        // -- Video upload for this trigger --
        h(VideoField,{
          videoUrl:newVideoUrl,
          videoFilename:newVideoFilename,
          onUrlChange:v=>setNewVideoUrl(v),
          onFilenameChange:v=>setNewVideoFilename(v),
        }),

        // -- Image upload for this trigger --
        h('div',{className:'form-group'},
          h('label',{className:'label'},'Background Image (optional)'),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:6}},'Shown behind the carousel if no video is set. Uses idle breathing effect.'),
          h('div',{className:'file-drop',onClick:()=>document.getElementById('img-upload-carousel').click()},
            newImgUrl
              ? h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
                  h('img',{src:newImgUrl,style:{width:40,height:40,borderRadius:6,objectFit:'cover'}}),
                  h('span',{style:{fontSize:13,color:'var(--green2)',fontWeight:700}},'\u2713 Image loaded'),
                  h('button',{onClick:e=>{e.stopPropagation();setNewImgUrl('');},style:{background:'transparent',border:'none',color:'var(--red)',cursor:'pointer',fontSize:18}},'\u00D7')
                )
              : h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center',color:'var(--text3)'}},
                  h('div',{style:{width:20,height:20}},I.image),
                  h('span',{style:{fontSize:13}},'Upload image from phone')

          h('input',{id:'img-upload-carousel',type:'file',accept:'image/*',style:{display:'none'},onChange:async e=>{

      h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:14,lineHeight:1.5}},

      h('div',{style:{display:'flex',flexDirection:'column',gap:6}},

            onClick:()=>togglePinned(it.id),
