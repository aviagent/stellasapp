}

// -- QUANTITY PARSER -----------------------------------------
// Extracts quantity from phrases like "two", "another", "3 more", "a couple"
function parseQty(text) {
  const q = text.toLowerCase();
  const wordMap = {one:1,a:1,an:1,another:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,'a couple':2,'couple of':2};
  // Check word numbers first
  for (const [word, num] of Object.entries(wordMap)) {
    if (q.includes(word)) return num;
  }
  // Check digit
  const m = q.match(/\b(\d+)\b/);
  if (m) return Math.min(parseInt(m[1]), 20); // cap at 20
  return 1; // default
}

// TEXT CHAT MODAL
function TextChatModal({menu,messages=[],faq=[],onClose,onNavigate,tableNum,onOrder,onAddToCart,activeItem,selectedItem,onItemSelect}){
  const[msgs,setMsgs]=useState([{role:'assistant',content:"Hi! I'm Anna \uD83D\uDC4B What can I help you with today?"}]);
  const[inp,setInp]=useState('');
  const[loading,setLoading]=useState(false);
  const[coolingDown,setCoolingDown]=useState(false);
  const[coolSecsLeft,setCoolSecsLeft]=useState(0);
  const endRef=useRef();
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);
  // Clean up cooldown timer if modal unmounts
  useEffect(()=>()=>{ if(burstRef.current.coolTimer) clearTimeout(burstRef.current.coolTimer); },[]);

  // -- TTS helper -- reads aloud if setting is on --
  function speakReply(text){
    const s = loadSettings();
    if(!s.readAloud || !text) return;
    const langObj = LANGUAGES.find(l=>l.code===(s.language||'en-US'))||LANGUAGES[0];
    console.log('[TTS] Chat reply in', langObj.label, ':', text.substring(0,60)+'...');
    speakText(text, langObj.tts);
  }

  // Write order to Supabase -- localStorage/React state is handled by onAddToCart callback
  function writeOrder(item, qty, tableId){
    console.log('[Order] Writing', qty, 'x', item.name, '| Table:', tableId);
    const sbUrl=store.get('stellas_sb_url','').replace(/\/$/,'');
    const sbKey=store.get('stellas_sb_key','');
    if(sbUrl&&sbKey){
      fetch(sbUrl+'/rest/v1/orders',{
        method:'POST',
        headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({table_id:String(tableId),item_name:item.name,item_price:item.price,item_img:item.imgUrl||'',qty,status:'pending',created_at:new Date().toISOString()})
      }).then(r=>{
        console.log('[Supabase] Order insert status:',r.status,'| qty:',qty);
        if(!r.ok)r.text().then(t=>console.error('[Supabase] Order error:',t));
      }).catch(e=>console.error('[Supabase] Order failed:',e));
    }
  }

  // -- Burst protection state (in-memory, resets when modal unmounts) --
  const burstRef = useRef({ timestamps: [], coolingDown: false, coolTimer: null });

  // Write message event to Supabase table_messages for analytics (fire-and-forget)
  function logMessageToSupabase(tableId, msgText){
    const sbUrl = store.get('stellas_sb_url','').replace(/\/$/,'');
    const sbKey = store.get('stellas_sb_key','');
    if(!sbUrl||!sbKey) return;
    fetch(sbUrl+'/rest/v1/table_messages',{
      method:'POST',
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({table_id:String(tableId||'none'),message_preview:msgText.substring(0,80),created_at:new Date().toISOString()})
    }).catch(()=>{}); // silent fail -- analytics only
  }

  async function send(){
    if(!inp.trim()||loading)return;
    const txt=inp.trim();

    // -- Burst protection --
    // If >20 messages in under 2 min with no pause >5 seconds between them:
    // trigger 90-second cooldown
    const burst = burstRef.current;
    const now = Date.now();

    if(burst.coolingDown){
      // During cooldown: just show the message but don't process
      setMsgs(p=>[...p,{role:'user',content:txt}]);
      setInp('');
      return;
    }

    // Prune timestamps older than 2 minutes, or where there was a >5 second gap
    // (silence resets the burst window)
    const TWO_MIN = 2 * 60 * 1000;
    const GAP_RESET = 5 * 1000;
    const cutoff = now - TWO_MIN;
    burst.timestamps = burst.timestamps.filter(t => t > cutoff);
    // Also check if last message was more than 5 seconds ago -- reset counter
    if(burst.timestamps.length > 0 && (now - burst.timestamps[burst.timestamps.length-1]) > GAP_RESET){
      burst.timestamps = [];
    }
    burst.timestamps.push(now);

    // Log to Supabase for analytics
    logMessageToSupabase(tableNum, txt);

    // Check burst threshold
    if(burst.timestamps.length > 20){
      burst.coolingDown = true;
      burst.timestamps = [];
      console.log('[BurstProtect] Threshold hit -- cooling down 90 seconds');
      setInp('');
      setCoolingDown(true);
      setCoolSecsLeft(90);
      setMsgs(p=>[...p,
        {role:'user',content:txt},
        {role:'assistant',content:"Wow, you've been chatting a lot -- give me a minute and a half to catch up! 😅"}
      ]);
      // Countdown ticker
      let secsLeft = 90;
      const ticker = setInterval(()=>{
        secsLeft--;
        setCoolSecsLeft(secsLeft);
        if(secsLeft <= 0) clearInterval(ticker);
      }, 1000);
      burst.coolTimer = setTimeout(()=>{
        clearInterval(ticker);
        burst.coolingDown = false;
        burst.timestamps = [];
        setCoolingDown(false);
        setCoolSecsLeft(0);
        console.log('[BurstProtect] Cooldown over -- ready');
        setMsgs(p=>[...p,{role:'assistant',content:"Okay, I'm back! What was your question?"}]);
      }, 90 * 1000);
      return;
    }

    setInp('');
    setMsgs(p=>[...p,{role:'user',content:txt}]);
    setLoading(true);
    console.log('[TextChat] Question:',txt,'| Table mode:',tableNum||'none');
    try{
      // -- Priority 0: Menu item trigger keywords --
      // First scan ALL menu items (works from home screen, menu page, anywhere).
      // Then also check activeItem/selectedItem for context-specific triggers.
      const globalTrigger = matchAnyMenuTrigger(txt, menu);
      const ctxItemForTrigger = activeItem || selectedItem || null;
      const localTrigger = ctxItemForTrigger ? matchMenuItemTrigger(txt, ctxItemForTrigger) : null;
      // Prefer the context (active) item trigger if it matches, else use global
      const menuTrigger = localTrigger || globalTrigger;

      if(menuTrigger){
        console.log('[Multi-trigger] Text chat matched:', menuTrigger.phrase, '| action:', menuTrigger.type, '| item:', menuTrigger.item.name);
        const mi = menuTrigger.item;
        const trigVid = resolveTriggerVideo(menuTrigger);
        // Always set activeItem so follow-up "add it/this" phrases work
        if(onItemSelect) onItemSelect(mi);
        if((menuTrigger.type==='order-add') && tableNum){
          const qty = parseQty(txt);
          console.log('[Order] Pop-up shown for:', mi.name);
          setMsgs(p=>[...p,{role:'assistant',content:'Sure! Add '+mi.name+' ($'+mi.price+') to Table '+tableNum+'?',item:mi,qty,orderPrompt:true,confirmed:false,msgId:Date.now()}]);
          speakReply('Sure! Add '+mi.name+' to Table '+tableNum+'?');
        } else if(menuTrigger.type==='order-add'){
          // No table — show info
          const reply = mi.desc ? mi.name+' -- '+mi.desc.split('.')[0]+'.' : 'Here\'s what I know about '+mi.name+'!';
          setMsgs(p=>[...p,{role:'assistant',content:reply,item:mi}]);
          speakReply(reply);
        } else if(trigVid){
          // Has a video -- close chat and navigate to response screen with video
          setLoading(false);
          onClose();
          onNavigate(mi.desc ? mi.name+' -- '+mi.desc.split('.')[0]+'.' : mi.name+'!', mi, trigVid);
          return;
        } else {
          // No video -- show info card in chat
          const reply = mi.desc ? mi.name+' -- '+mi.desc.split('.')[0]+'.' : 'Here\'s what I know about '+mi.name+'!';
          setMsgs(p=>[...p,{role:'assistant',content:reply,item:mi}]);
          speakReply(reply);
        }
        setLoading(false);
        return;
      }

      // -- Context phrase check: "add this", "order that" etc --
      // Resolve item BEFORE AI call -- use activeItem if context phrase, otherwise let AI handle it
      const isCtx = detectContextPhrase(txt);
      if(isCtx){
        // Use activeItem first, then selectedItem (the item currently on the response screen)
        const ctxItem = activeItem || selectedItem || null;
        console.log('[TextChat] Context phrase matched:', txt, '| activeItem:', activeItem?.name||'none', '| selectedItem:', selectedItem?.name||'none');
        console.log('[TextChat] Vague order on page:', txt, '| Using current item:', ctxItem?.name||'none');
        if(!ctxItem){
          const noItemMsg = "Which item would you like? Tap a menu item first and I'll add it for you!";
          setMsgs(p=>[...p,{role:'assistant',content:noItemMsg}]);
          speakReply(noItemMsg);
          setLoading(false);
          return;
        }
        const qty = parseQty(txt);
        if(tableNum){
          console.log('[Order] Pop-up shown for:', ctxItem.name);
          const addMsg = 'Sure! Add '+ctxItem.name+' ($'+ctxItem.price+') to Table '+tableNum+'?';
          setMsgs(p=>[...p,{
            role:'assistant',
            content:addMsg,
            item:ctxItem,qty,orderPrompt:true,confirmed:false,msgId:Date.now()
          }]);
          speakReply(addMsg);
        } else {
          // No table -- just show item info
          const infoMsg = ctxItem.name+' -- '+ctxItem.desc.split('.')[0]+'. Scan a table QR code to order!';
          setMsgs(p=>[...p,{
            role:'assistant',
            content:infoMsg,
            item:ctxItem
          }]);
          speakReply(infoMsg);
        }
        setLoading(false);
        return;
      }

      const{response,item,videoUrl,noKey,orderIntent,qty:aiQty,ingredientMatches,searchTerm}=await askAI(txt,menu,messages,tableNum||null,faq||[]);
      console.log('[TextChat] AI result -- item:',item?.name||'none','| video:',videoUrl||'none','| orderIntent:',orderIntent,'| ingredientMatches:',ingredientMatches?.length||0);
      if(noKey){setMsgs(p=>[...p,{role:'assistant',content:response}]);setLoading(false);return;}

      // -- Ingredient search result → show compact dish list --
      if(ingredientMatches&&ingredientMatches.length>0){
        setMsgs(p=>[...p,{
          role:'assistant',
          content:response,
          ingredientList:ingredientMatches,
          searchTerm,
          msgId:Date.now()
        }]);
        speakReply(response);  // speak the "Here are the dishes with X" heading
        setLoading(false);
        return;
      }

      // Order intent in table mode -- fresh confirm card every time, even for duplicates
      const effectiveOrderIntent = orderIntent || (tableNum && item && detectOrderIntent(txt));
      if(tableNum && item && effectiveOrderIntent){
        const qty = aiQty || parseQty(txt);
        const isDupe=msgs.some(m=>m.orderPrompt&&m.item?.id===item.id);
        if(isDupe)console.log('[Order] Duplicate add:',item.name,'qty:',qty,'tableID:',tableNum);
        else console.log('[AI] Intent detected: order-intent |',item.name,'| qty:',qty);
        const cardText=qty>1
          ?'Add '+qty+'× '+item.name+' ($'+(item.price*qty).toFixed(2)+' total) to Table '+tableNum+'?'
          :(isDupe?'Add another '+item.name+' to Table '+tableNum+'?':'Add '+item.name+' ($'+item.price+') to Table '+tableNum+'?');
        setMsgs(p=>[...p,{role:'assistant',content:response||cardText,item,qty,orderPrompt:true,confirmed:false,msgId:Date.now()}]);
        speakReply(response||cardText);
        setLoading(false);
        return;
      }

      // Has video -- navigate to response screen
      if(item&&videoUrl){setLoading(false);onClose();onNavigate(response,item,videoUrl);return;}
      // Has item, no video
      if(item){
        setMsgs(p=>[...p,{role:'assistant',content:response,item}]);
        speakReply(response);
        setLoading(false);return;
      }
      const finalReply = response||"Let me check that for you!";
      setMsgs(p=>[...p,{role:'assistant',content:finalReply}]);
      speakReply(finalReply);
    }catch(err){
      console.error('[TextChat]',err);
      setMsgs(p=>[...p,{role:'assistant',content:"Let me check that for you!"}]);
    }
    setLoading(false);
  }

  // Confirm by msgId -- marks only that card, writes order, closes chat
  function doConfirm(msgId,item,qty){
    if(!item||!tableNum)return;
    writeOrder(item,qty,tableNum);
    // Update App React state via callback (this makes cart badge + drawer update)
    onAddToCart(item, qty, tableNum);
    console.log('[Order] Cart updated for table', tableNum, ':', qty, 'x', item.name);
    const replyText=qty>1
      ?'Done! '+qty+'× '+item.name+' on the way to Table '+tableNum+' 🍽️'
      :'Added! Your '+item.name+' is on its way to Table '+tableNum+' 🍽️';
    setMsgs(p=>p.map(m=>m.msgId===msgId?{...m,confirmed:true}:m).concat([{role:'assistant',content:replyText}]));
    // Close chat then navigate -- pass item so response screen shows confirm video + item image
    setTimeout(()=>{
      onClose();
      onNavigate(replyText, item, null, true); // 4th arg = isOrderConfirm
    }, 800);
  }

  function doDecline(msgId){
    setMsgs(p=>p.map(m=>m.msgId===msgId?{...m,confirmed:true}:m).concat([{role:'assistant',content:"No worries! Anything else I can help with?"}]));
  }

  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'sheet'},
      h('div',{className:'modal-top'},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('div',{className:'modal-title'},'Chat with Anna \u2728'),
          tableNum&&h('span',{className:'table-badge',style:{fontSize:11}},'Table '+tableNum)
        ),
        h('button',{className:'close-btn',onClick:()=>{stopTTS();onClose();},},'\u2715')
      ),
      h('div',{style:{height:340,overflowY:'auto',display:'flex',flexDirection:'column',gap:10,marginBottom:12}},
        msgs.map((m,i)=>h('div',{key:m.msgId||i,style:{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',gap:6}},
          h('div',{style:{background:m.role==='user'?'linear-gradient(135deg,var(--green2),var(--green))':'white',color:m.role==='user'?'white':'var(--text1)',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',padding:'10px 14px',fontSize:14,maxWidth:'82%',border:m.role==='assistant'?'1px solid rgba(201,168,76,.3)':'none',boxShadow:'var(--shadow-card)'}},m.content),

          // -- Ingredient search results list --
          m.ingredientList&&m.ingredientList.length>0&&h('div',{style:{
            background:'white',border:'1.5px solid var(--gold)',borderRadius:14,
            maxWidth:'92%',overflow:'hidden',boxShadow:'var(--shadow-float)',marginTop:2
          }},
            h('div',{style:{
              maxHeight:220,overflowY:'auto',
              scrollbarWidth:'thin'
            }},
              m.ingredientList.map((dish,di)=>h('div',{key:dish.id||di,style:{
                display:'flex',alignItems:'center',gap:8,padding:'9px 12px',
                borderBottom:di<m.ingredientList.length-1?'1px solid rgba(201,168,76,.12)':'none',
              }},
                // Thumbnail
                dish.imgUrl
                  ? h('img',{src:dish.imgUrl,alt:dish.name,style:{width:36,height:36,borderRadius:6,objectFit:'cover',flexShrink:0,border:'1px solid var(--gold)'}})
                  : h('div',{style:{width:36,height:36,borderRadius:6,background:'var(--cream2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},'🍽️'),
                // Name + price -- tap to navigate
                h('button',{
                  onClick:()=>{
                    onClose();
                    if(onItemSelect) onItemSelect(dish);
                    else onNavigate(dish.desc||dish.name, dish, resolveVideoUrl(dish));
                  },
                  style:{
                    flex:1,textAlign:'left',background:'transparent',border:'none',
                    cursor:'pointer',padding:0,minWidth:0
                  }
                },
                  h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:'var(--text1)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},'$'+dish.price+' · '+dish.name),
                  h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:1}},dish.cat)
                ),
                // Add button -- only in table mode
                tableNum&&h('button',{
                  onClick:()=>{
                    // Add to cart immediately (no Yes/No -- single tap)
                    onAddToCart(dish, 1, tableNum);
                    // Play order confirm video + navigate to response
                    const confirmMsg = messages.find(msg=>msg.active&&msg.type==='order-confirmed'&&(msg.videoUrl||msg.videoFilename))
                      || messages.find(msg=>msg.active&&(msg.triggerKeywords||'').toLowerCase().includes('order-confirmed')&&(msg.videoUrl||msg.videoFilename))
                      || messages.find(msg=>msg.active&&msg.type==='announcement'&&(msg.videoUrl||msg.videoFilename));
                    const confirmVid = confirmMsg ? resolveVideoUrl(confirmMsg) : resolveVideoUrl(dish);
                    onClose();
                    onNavigate(
                      'Great! Your '+dish.name+' is on its way to Table '+tableNum+' \uD83C\uDF7D\uFE0F',
                      dish,
                      confirmVid,
                      true  // isOrderConfirm → idle after
                    );
                  },
                  style:{
                    background:'var(--green)',color:'white',border:'none',
                    borderRadius:8,padding:'5px 10px',fontSize:11,fontWeight:700,
                    cursor:'pointer',flexShrink:0,fontFamily:"'Lato',sans-serif",
                    whiteSpace:'nowrap'
                  }
                },'Add')
              ))
            ),
            // Footer: item count
            h('div',{style:{padding:'6px 12px',background:'rgba(201,168,76,.06)',fontSize:11,color:'var(--text3)',textAlign:'center'}},
              m.ingredientList.length+' dish'+(m.ingredientList.length!==1?'es':'')+' found'+(m.searchTerm?' with '+m.searchTerm:'')
            )
          ),
          // Confirm card -- only for unconfirmed order prompts
          m.orderPrompt&&!m.confirmed&&m.item&&h('div',{style:{background:'white',border:'1.5px solid var(--gold)',borderRadius:14,padding:12,maxWidth:'90%',boxShadow:'var(--shadow-float)',marginTop:2}},
            h('div',{style:{display:'flex',gap:10,marginBottom:10,alignItems:'center'}},
              m.item.imgUrl&&h('img',{src:m.item.imgUrl,alt:m.item.name,style:{width:48,height:48,borderRadius:8,objectFit:'cover',flexShrink:0,border:'1.5px solid var(--gold)'}}),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:'var(--text1)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},m.qty>1?m.qty+'\u00D7 '+m.item.name:m.item.name),
                h('div',{style:{fontSize:12,color:'var(--gold3)',fontWeight:700,marginTop:2}},m.qty>1?'$'+(m.item.price*m.qty).toFixed(2)+' total':'$'+m.item.price),
                h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:1}},tableNum?'Add to Table '+tableNum+'?':'Add to order?')
              )
            ),
            h('div',{style:{display:'flex',gap:8}},
              h('button',{className:'btn btn-green',style:{flex:1,padding:'9px',fontSize:13},onClick:()=>doConfirm(m.msgId,m.item,m.qty||1)},'\u2713 Yes'),
              h('button',{className:'btn btn-gold',style:{flex:1,padding:'9px',fontSize:13},onClick:()=>doDecline(m.msgId)},'No')
            )
          ),
          // View full response for non-order items
          m.item&&!m.orderPrompt&&h('button',{onClick:()=>{onClose();onNavigate(m.content,m.item,'');},style:{fontSize:12,background:'var(--green)',color:'white',border:'none',borderRadius:20,padding:'6px 14px',cursor:'pointer',alignSelf:'flex-start',fontFamily:"'Lato',sans-serif",fontWeight:700}},'\u25B6 See full response')
        )),
        loading&&h('div',{style:{alignSelf:'flex-start',display:'flex',alignItems:'center',gap:8,color:'var(--text3)',fontSize:13,padding:'4px 8px'}},
          ...[0,1,2].map(i=>h('div',{key:i,style:{width:7,height:7,borderRadius:'50%',background:'var(--gold)',animation:'pulse 1.2s ease-in-out infinite',animationDelay:`${i*0.25}s`}})),
          h('span',{style:{fontStyle:'italic'}},'Anna is typing\u2026')
        ),
        coolingDown&&h('div',{style:{alignSelf:'center',background:'rgba(220,60,60,.08)',border:'1px solid rgba(220,60,60,.2)',borderRadius:12,padding:'8px 14px',fontSize:12,color:'var(--red)',textAlign:'center',maxWidth:'90%'}},
          h('div',{style:{fontWeight:700,marginBottom:4}},'⏳ Cooling down\u2026'),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:6}},'Ready again in '+coolSecsLeft+' second'+(coolSecsLeft!==1?'s':'')),
          h('div',{style:{height:4,background:'rgba(220,60,60,.15)',borderRadius:2,overflow:'hidden'}},
            h('div',{style:{height:'100%',background:'var(--red)',borderRadius:2,width:((coolSecsLeft/90)*100).toFixed(1)+'%',transition:'width 1s linear'}})
          )
        ),
        h('div',{ref:endRef})
      ),
      h('div',{style:{display:'flex',gap:10}},
        h('input',{value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==='Enter'&&!loading&&!coolingDown&&send(),placeholder:coolingDown?'Cooling down\u2026 ('+coolSecsLeft+'s)':(tableNum?'Ask or order anything\u2026':'Ask about the menu\u2026'),className:'field',style:{flex:1,borderRadius:50,padding:'12px 18px',opacity:coolingDown?0.5:1},disabled:coolingDown}),
        h('button',{className:'btn btn-green',style:{padding:'12px 20px',opacity:(loading||coolingDown)?0.6:1},onClick:send,disabled:loading||coolingDown},'Send')
      )
    )
  );
}

// ADMIN LOGIN
function AdminLogin({onLogin}){
  const[pass,setPass]=useState('');const[err,setErr]=useState(false);
  function go(){if(pass===ADMIN_PASS)onLogin();else{setErr(true);setTimeout(()=>setErr(false),2000);}}
  return h('div',{style:{position:'fixed',inset:0,background:'var(--green)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,zIndex:200}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:34,color:'var(--gold)',letterSpacing:4,marginBottom:4}},"STELLA'S"),
    h('div',{style:{color:'var(--gold2)',fontSize:12,letterSpacing:3,marginBottom:40}},'ADMIN PANEL'),
    h('div',{className:'glass',style:{width:'100%',maxWidth:320,padding:28}},
      h('label',{className:'label'},'Password'),
      h('input',{type:'password',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),
        placeholder:'Enter password',className:'field',style:{marginBottom:err?8:14}}),
      err&&h('div',{style:{color:'var(--red)',fontSize:13,marginBottom:10}},'Incorrect password'),
      h('button',{className:'btn btn-green',style:{width:'100%'},onClick:go},'Login')

}

// -- SHARED: Media Preview (image or video blob/url) ----------
function MediaPreview({src,type='image',label}){
  if(!src) return null;
  const isBlob=src.startsWith('data:');
  return h('div',{style:{marginTop:8,borderRadius:12,overflow:'hidden',border:'1.5px solid var(--gold)',boxShadow:'var(--shadow-card)',background:'#000',position:'relative'}},
    h('div',{style:{position:'absolute',top:6,left:8,background:'rgba(0,0,0,.6)',color:'var(--gold2)',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,zIndex:1,backdropFilter:'blur(4px)'}},
      label||(type==='video'?'🎬 Video Preview':'🖼 Image Preview')
    ),
    type==='video'
      ? h('video',{src,controls:true,playsInline:true,style:{width:'100%',maxHeight:200,display:'block',background:'#000'}})

// -- SHARED: Upload + storage filename field ------------------
function VideoField({videoUrl,videoFilename,onUrlChange,onFilenameChange}){
  const sbUrl=store.get('stellas_sb_url','').replace(/\/$/,'');
  const sbKey=store.get('stellas_sb_key','');
  const sbBucket=store.get('stellas_sb_bucket','videos');
  const r2Base=store.get('stellas_r2_base','').replace(/\/$/,'');
  const[uploading,setUploading]=useState(false);
  const[uploadMsg,setUploadMsg]=useState('');
  const ref=useRef();

  // Build preview URL from filename (Supabase > R2 > empty)
  let resolvedUrl=videoUrl||'';
  if(!resolvedUrl&&videoFilename){
    if(sbUrl)resolvedUrl=`${sbUrl}/storage/v1/object/public/${sbBucket}/${videoFilename}`;
    else if(r2Base)resolvedUrl=`${r2Base}/${videoFilename}`;
  }

  async function uploadToSupabase(file){
    if(!sbUrl||!sbKey){
      // No Supabase -- store as local blob
      const data=await readFileAsDataURL(file);
      onUrlChange(data);onFilenameChange('');
      setUploadMsg('✓ Stored locally (add Supabase in Settings to sync across devices)');
      return;
    }
    setUploading(true);setUploadMsg('Uploading…');
    const filename=file.name.toLowerCase().replace(/[^a-z0-9._-]/g,'-');
    try{
      const res=await fetch(`${sbUrl}/storage/v1/object/${sbBucket}/${filename}`,{
        method:'POST',
        headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':file.type,'x-upsert':'true'},
        body:file,
      });
      const d=await res.json();
      console.log('[Supabase] Upload response:',d);
      if(d.error){throw new Error(d.error.message||JSON.stringify(d.error));}
      onFilenameChange(filename);onUrlChange('');
      setUploadMsg('✓ Uploaded: '+filename);
    }catch(e){
      console.error('[Supabase] Upload failed:',e);
      // Fallback to local blob
      const data=await readFileAsDataURL(file);
      onUrlChange(data);onFilenameChange('');
      setUploadMsg('⚠️ Supabase upload failed ('+e.message+') -- stored locally');
    }
    setUploading(false);
  }

  return h('div',{className:'form-group'},
    h('label',{className:'label'},'Avatar Video'),
    h('div',{style:{display:'flex',gap:8,marginBottom:8}},
      h('div',{className:'file-drop',style:{flex:1,padding:'12px 10px'},onClick:()=>ref.current.click()},
        uploading
          ?h('div',{style:{textAlign:'center',fontSize:13,color:'var(--text2)'}},'⏳ Uploading…')
          :videoUrl
            ?h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
                h('span',{style:{fontSize:13,color:'var(--green2)',fontWeight:700}},'✓ Local file ready'),
                h('button',{onClick:e=>{e.stopPropagation();onUrlChange('');setUploadMsg('');},style:{background:'transparent',border:'none',color:'var(--red)',cursor:'pointer',fontSize:18,lineHeight:1}},'×')
              )
            :videoFilename
              ?h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
                  h('span',{style:{fontSize:13,color:'var(--green2)',fontWeight:700}},'✓ '+videoFilename),
                  h('button',{onClick:e=>{e.stopPropagation();onFilenameChange('');setUploadMsg('');},style:{background:'transparent',border:'none',color:'var(--red)',cursor:'pointer',fontSize:18,lineHeight:1}},'×')
                )
              :h('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center',color:'var(--text3)'}},
                  h('div',{style:{width:20,height:20}},I.video),
                  h('span',{style:{fontSize:13}},sbUrl?'Upload MP4 → auto-saves to Supabase':'Upload MP4 from phone')
                )
      ),
      h('input',{ref,type:'file',accept:'video/mp4,video/*',onChange:async e=>{
        const f=e.target.files[0];if(!f)return;
        await uploadToSupabase(f);
      }})
    ),
    // Manual filename entry
    h('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:4}},
      h('span',{style:{fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}},sbUrl?'or Supabase filename:':'or filename:'),
      h('input',{value:videoFilename||'',onChange:e=>{onFilenameChange(e.target.value);onUrlChange('');setUploadMsg('');},placeholder:'sticky-toffee.mp4',className:'field',style:{flex:1,padding:'8px 12px',fontSize:13}})
    ),
    resolvedUrl&&!videoUrl&&h('div',{style:{fontSize:10,color:'var(--green2)',padding:'4px 8px',background:'rgba(42,90,64,.06)',borderRadius:6,wordBreak:'break-all',marginBottom:4}},
      '🔗 '+resolvedUrl
    ),
    uploadMsg&&h('div',{style:{fontSize:11,color:'var(--text2)',padding:'4px 8px',background:'rgba(201,168,76,.08)',borderRadius:6,marginBottom:4}},uploadMsg),
    resolvedUrl&&h(MediaPreview,{src:resolvedUrl,type:'video',label:'🎬 Video Preview'}),
    h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:4,lineHeight:1.5}},
      sbUrl?'📤 Files auto-upload to Supabase Storage on select.':'💡 Add Supabase in Settings to enable cloud storage.'
    )
  );
}

  function addCat(){
    const c=newCat.trim();
    if(!c||allCats.includes(c)){showToast('⚠️ Category empty or already exists');return;}
    const upd=[...customCats,c];
    setCustomCats(upd);store.set('stellas_cats',upd);setNewCat('');showToast('✓ Category added');
  }
  function delCat(c){
    const upd=customCats.filter(x=>x!==c);
    setCustomCats(upd);store.set('stellas_cats',upd);
  }

    if(!form.name||!form.price){showToast('⚠️ Name & price required');return;}
    const item={...form,id:editing||Date.now(),price:parseFloat(form.price)};

    setMenu(upd);
    saveMenu(upd, showToast);

// ADMIN - LIVE ACTIVITY (Tables + Orders)
function AdminLive({tableOrders,setTableOrders,showToast}){
  const tables=Object.keys(tableOrders).sort((a,b)=>parseInt(a)-parseInt(b));
  const[addTable,setAddTable]=useState('');
  
  function addTableNum(){
    const n=parseInt(addTable);if(!n||tableOrders[n])return;
    const upd={...tableOrders,[n]:[]};setTableOrders(upd);store.set('stellas_orders',upd);
    setAddTable('');
  }
  function removeTable(tbl){
    if(!confirm(`Remove Table ${tbl}?`))return;
    const upd={...tableOrders};delete upd[tbl];
    setTableOrders(upd);store.set('stellas_orders',upd);
  }
  function updateStatus(tbl,idx,status){
    const upd={...tableOrders,[tbl]:tableOrders[tbl].map((o,i)=>i===idx?{...o,status}:o)};
    setTableOrders(upd);store.set('stellas_orders',upd);
    if(status==='making')showToast(`🍳 Sent to kitchen!`);
    if(status==='ready')showToast(`✅ Ready for pickup!`);
  }
  function clearTable(tbl){
    const upd={...tableOrders,[tbl]:[]};setTableOrders(upd);store.set('stellas_orders',upd);
    showToast(`Table ${tbl} cleared`);
  }
  
  const statusFlow=['new','making','ready','done'];
  const statusLabel={new:'New Order',making:'Making',ready:'Ready!',done:'Done'};
  const statusNext={new:'making',making:'ready',ready:'done'};
  const statusActionLabel={new:'▶ Send to Kitchen',making:'✓ Mark Ready',ready:'✓ Mark Done'};
  const statusClass={new:'status-new',making:'status-making',ready:'status-ready',done:'status-done'};
  
  const totalActive=tables.reduce((acc,t)=>acc+tableOrders[t].filter(o=>o.status!=='done').length,0);
  
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Live Activity'),
        totalActive>0&&h('div',{style:{fontSize:12,color:'var(--red)',fontWeight:700,marginTop:2}},`🔴 ${totalActive} active orders`)
      ),
      h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        h('input',{value:addTable,onChange:e=>setAddTable(e.target.value),placeholder:'Table #',type:'number',className:'field',style:{width:80,padding:'8px 12px',fontSize:14,borderRadius:10}}),
        h('button',{className:'btn btn-green btn-sm',onClick:addTableNum},h('div',{className:'btn-icon'},I.plus),'Add Table')
      )
    ),
    
    tables.length===0&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:48,marginBottom:12}},'🍽️'),
      h('div',{style:{fontSize:14}}),'Add table numbers to monitor orders in real time'
    ),
    
    tables.map(tbl=>{
      const orders=tableOrders[tbl];
      const activeOrders=orders.filter(o=>o.status!=='done');
      return h('div',{key:tbl,className:'table-card'},
        h('div',{className:'table-card-head'},
          h('div',null,
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}},'Table '+tbl),
            activeOrders.length>0&&h('span',{style:{marginLeft:8,background:'rgba(255,100,100,.3)',padding:'2px 8px',borderRadius:20,fontSize:11}},'⚡ '+activeOrders.length+' pending')
          ),
          h('div',{style:{display:'flex',gap:8}},
            h('div',null,
              h(QRDisplay,{tableNum:tbl})
            ),
            h('button',{onClick:()=>clearTable(tbl),style:{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'white',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,fontFamily:"'Lato',sans-serif"}},'Clear All')
          )
        ),
        h('div',{style:{padding:12}},
          orders.length===0
            ?h('div',{style:{textAlign:'center',padding:'16px',color:'var(--text3)',fontSize:13}},'No orders yet -- customer will see order button after scanning QR')
            :orders.map((order,idx)=>h('div',{key:idx,className:'order-item'},
              order.imgUrl&&h('img',{src:order.imgUrl,style:{width:44,height:44,borderRadius:8,objectFit:'cover',flexShrink:0}}),
              h('div',{style:{flex:1}},
                h('div',{style:{fontWeight:700,fontSize:14,color:'var(--text1)'}},'$'+order.price+' · '+order.name),
                h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},new Date(order.time).toLocaleTimeString())
              ),
              h('span',{className:'order-status '+statusClass[order.status]},statusLabel[order.status]),
              order.status!=='done'&&h('button',{
                onClick:()=>updateStatus(tbl,idx,statusNext[order.status]),
                className:'btn btn-sm',
                style:{background:order.status==='new'?'var(--green)':order.status==='making'?'#e67e22':'#1976d2',color:'white',borderRadius:20,border:'none',padding:'6px 12px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}
              },statusActionLabel[order.status])
            ))
        )
      );
    })
  );
}

// ADMIN - QR CODES
function AdminQR({tableOrders}){
  const[count,setCount]=useState(10);
  const[sessions,setSessions]=useState(()=>getSessions());
  const tables=Array.from({length:count},(_,i)=>i+1);

  function handleReset(n){
    if(!confirm('Reset Table '+n+'? The current QR link will stop working immediately.'))return;
    const t=resetSession(n);
    setSessions({...getSessions()});
  }
  function handleResetAll(){
    if(!confirm('Reset ALL tables? All current QR links will stop working.'))return;
    tables.forEach(n=>resetSession(n));
    setSessions({...getSessions()});
  }

  return h('div',null,
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)',marginBottom:8}},'QR Codes'),
    h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:12,lineHeight:1.6}},
      'Each table gets a unique session code. When a party leaves, tap Reset to generate a new code -- the old QR link instantly stops working.'
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}},
      h('label',{className:'label',style:{margin:0}},'Number of tables:'),
      h('input',{type:'number',value:count,onChange:e=>setCount(Math.max(1,Math.min(50,parseInt(e.target.value)||1))),className:'field',style:{width:70,padding:'8px 12px'}}),
      h('button',{
        onClick:handleResetAll,
        style:{marginLeft:'auto',background:'rgba(220,60,60,.08)',color:'var(--red)',border:'1px solid rgba(220,60,60,.3)',borderRadius:8,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif"}
      },'Reset All Tables')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      tables.map(n=>h('div',{key:n+(sessions[n]||''),className:'glass',style:{padding:14,textAlign:'center'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,color:'var(--text1)',marginBottom:10,fontWeight:700}},'Table '+n),
        h(QRDisplay,{tableNum:n, sessionToken:sessions[String(n)]||ensureSession(n), onReset:()=>handleReset(n)})
      ))
    )
  );
}

function AdminFAQ({faq,setFaq,showToast}){
  const empty={title:'',body:'',tags:''};
  const[form,setForm]=useState(empty);
  const[editing,setEditing]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  function save(){
    if(!form.title||!form.body){showToast('⚠️ Title and body required');return;}
    const entry={...form,id:editing||Date.now()};
    const upd=editing?faq.map(e=>e.id===editing?entry:e):[...faq,entry];
    setFaq(upd);
    saveFAQ(upd, showToast);
    setEditing(null);setShowForm(false);setForm(empty);
  }

  function del(id){
    if(!confirm('Delete this FAQ entry?'))return;
    const upd=faq.filter(e=>e.id!==id);
    setFaq(upd);
    deleteFAQEntry(id, upd);
    showToast('Deleted');
  }

  function edit(entry){setForm({...entry});setEditing(entry.id);setShowForm(true);}

  const tagStyle={display:'inline-block',background:'rgba(201,168,76,.12)',color:'var(--gold3)',borderRadius:20,padding:'1px 8px',margin:'1px 2px',fontSize:10};

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'FAQ & Info'),
        h('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},'Answers chat questions not covered by the menu (hours, parking, dress code, etc.)')
      ),
      h('button',{className:'btn btn-green btn-sm',onClick:()=>{setShowForm(true);setEditing(null);setForm(empty);}},
        h('div',{className:'btn-icon'},I.plus),'Add Entry'
      )
    ),

    // -- Add / Edit Form --
    showForm&&h('div',{className:'glass',style:{padding:16,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,color:'var(--text1)',marginBottom:14}},editing?'Edit Entry':'New FAQ Entry'),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Title *'),
        h('input',{value:form.title,onChange:e=>f('title',e.target.value),className:'field',placeholder:'e.g. Opening Hours, Parking, Dress Code, Reservations'})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Answer / Body *'),
        h('textarea',{value:form.body,onChange:e=>f('body',e.target.value),className:'field',rows:4,placeholder:'e.g. We\'re open Monday to Sunday, 5pm-11pm. Last call is 10:30pm.'})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'label'},'Tags'),
        h('input',{value:form.tags||'',onChange:e=>f('tags',e.target.value),className:'field',placeholder:'e.g. hours, open, close, late, early'}),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},'Comma-separated. Chat matches these words to find this entry.')
      ),
      form.tags&&h('div',{style:{marginBottom:10}},
        form.tags.split(',').map(t=>t.trim()).filter(Boolean).map((t,i)=>h('span',{key:i,style:tagStyle},t))
      ),
      h('div',{style:{display:'flex',gap:10,marginTop:4}},
        h('button',{className:'btn btn-green',style:{flex:1},onClick:save},editing?'Update':'Save'),
        h('button',{className:'btn btn-gold',style:{flex:1},onClick:()=>{setShowForm(false);setEditing(null);setForm(empty);}},'Cancel')
      )
    ),

    // -- Entry list --
    faq.length===0&&!showForm&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:32,marginBottom:8}},'❓'),
      h('div',{style:{fontSize:14}},'No FAQ entries yet.'),
      h('div',{style:{fontSize:12,marginTop:4}},'Add entries for hours, parking, reservations, dress code, etc.')
    ),

    faq.map(entry=>h('div',{key:entry.id,className:'glass',style:{padding:12,marginBottom:10}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:'var(--text1)',flex:1,marginRight:8}},entry.title),
        h('div',{style:{display:'flex',gap:8,flexShrink:0}},
          h('button',{onClick:()=>edit(entry),style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--gold3)',fontSize:16}},'✏️'),
          h('button',{onClick:()=>del(entry.id),style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16}},'🗑')
        )
      ),
      h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:entry.tags?8:0}},entry.body),
      entry.tags&&h('div',null,
        entry.tags.split(',').map(t=>t.trim()).filter(Boolean).map((t,i)=>h('span',{key:i,style:tagStyle},t))
      )
    ))
  );
}

function AdminSettingsPanel({showToast}){

  const[altUrl,setAltUrl]=useState(()=>store.get('stellas_alt_storage',''));

  const[homeTitles,setHomeTitles]=useState(()=>store.get('stellas_home_titles',{highlights:'Menu Highlights',picks:"Chef's Picks",picksCategory:'Mains'}));
  const[revealed,setRevealed]=useState({});
  const[saving,setSaving]=useState(false);
  const[openSection,setOpenSection]=useState('provider');

  const providers=Object.entries(AI_PROVIDERS);
  const seg=(id,active)=>({flex:1,padding:'9px 6px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:"'Lato',sans-serif",transition:'all .2s',background:active?'var(--green)':'rgba(201,168,76,.08)',color:active?'white':'var(--text2)',boxShadow:active?'var(--shadow-btn)':'none'});

  function save(){
    setSaving(true);
    store.set('stellas_settings',cfg);
    store.set('stellas_r2_base',r2Base.trim());
    store.set('stellas_alt_storage',altUrl.trim());
    store.set('stellas_sb_url',sbUrl.trim());
    store.set('stellas_sb_key',sbKey.trim());
    store.set('stellas_sb_bucket',sbBucket.trim()||'videos');

    if(!sbUrl||!sbKey){showToast('⚠️ Enter Supabase URL and key first');return;}

                const text=await file.text();

                if(b.r2Base)     store.set('stellas_r2_base',b.r2Base);
                if(b.altUrl)     store.set('stellas_alt_storage',b.altUrl);

                if(b.msgTypes)   store.set('stellas_msg_types',b.msgTypes);
                if(b.orders)     store.set('stellas_orders',b.orders);
                if(b.menu)    await idbSet('stellas_menu',b.menu);
                if(b.msgs)    await idbSet('stellas_messages',b.msgs);
                if(b.faqData) await idbSet('stellas_faq',b.faqData);
                showToast('Restored! Reloading in 2 seconds...');
                setTimeout(()=>window.location.reload(),2000);
              }catch(err){showToast('Import failed: '+err.message);}
            }
          })
        )
      ),

      h('div',{style:{marginTop:10,fontSize:11,color:'var(--text3)',lineHeight:1.6}},
        'Tip: Export before every upgrade and save the .json file to your Files app. After any redeploy, tap Import to restore everything including images, videos, and keys.'

  );
}

// ADMIN - TAKEOUT ORDERS
// ==========================================
function AdminTakeout({showToast}){
  const[orders,setOrders]=useState(()=>store.get('stellas_takeout_orders',[]));
  const[filter,setFilter]=useState('all');

  function refresh(){ setOrders(store.get('stellas_takeout_orders',[])); }
  useEffect(()=>{ const t=setInterval(refresh,5000); return()=>clearInterval(t); },[]);

  function updateStatus(idx,status){
    const upd=orders.map((o,i)=>i===idx?{...o,status}:o);
    setOrders(upd); store.set('stellas_takeout_orders',upd);
    if(status==='making') showToast('🍳 Sent to kitchen!');
    if(status==='ready') showToast('✅ Ready for pickup!');
    if(status==='done') showToast('✓ Order complete!');
  }
  function clearDone(){
    const upd=orders.filter(o=>o.status!=='done');
    setOrders(upd); store.set('stellas_takeout_orders',upd);
    showToast('Cleared completed orders');
  }

  const statusFlow={new:'making',making:'ready',ready:'done'};
  const statusActionLabel={new:'▶ Send to Kitchen',making:'✓ Mark Ready',ready:'✓ Mark Done'};
  const statusClass={new:'status-new',making:'status-making',ready:'status-ready',done:'status-done'};
  const statusLabel={new:'New',making:'Making',ready:'Ready!',done:'Done'};
  const statusBtnColor={new:'var(--green)',making:'#e67e22',ready:'#1976d2'};

  const filtered = filter==='all' ? orders : orders.filter(o=>o.status===filter);
  const activeCount = orders.filter(o=>o.status!=='done').length;

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,color:'var(--text1)'}},'Takeout Orders'),
        activeCount>0&&h('div',{style:{fontSize:12,color:'var(--red)',fontWeight:700,marginTop:2}},'🔴 '+activeCount+' active')
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:refresh,style:{background:'rgba(42,90,64,.1)',border:'none',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'var(--green2)',fontFamily:"'Lato',sans-serif"}},'↻ Refresh'),
        h('button',{onClick:clearDone,style:{background:'rgba(220,60,60,.08)',border:'1px solid rgba(220,60,60,.2)',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'var(--red)',fontFamily:"'Lato',sans-serif"}},'Clear Done')
      )
    ),

    // Filter chips
    h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      ['all','new','making','ready','done'].map(f=>
        h('button',{key:f,onClick:()=>setFilter(f),style:{
          padding:'5px 14px',borderRadius:20,border:'none',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif",
          background:filter===f?'var(--green)':'rgba(201,168,76,.12)',
          color:filter===f?'white':'var(--text2)'
        }},f.charAt(0).toUpperCase()+f.slice(1)+(f==='all'?' ('+orders.length+')':f==='new'?' ('+orders.filter(o=>o.status==='new').length+')':f==='making'?' ('+orders.filter(o=>o.status==='making').length+')':f==='ready'?' ('+orders.filter(o=>o.status==='ready').length+')':' ('+orders.filter(o=>o.status==='done').length+')'))
      )
    ),

    filtered.length===0&&h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},
      h('div',{style:{fontSize:14}},'No takeout orders yet')
    ),

    filtered.map((order,idx)=>{
      const realIdx = orders.indexOf(order);
      const subtotal = (order.items||[]).reduce((s,i)=>s+(i.price||0),0);
      const tax = subtotal * 0.13;
      return h('div',{key:order.orderNum+idx,className:'admin-takeout-card'},
        h('div',{className:'admin-takeout-head'},
          h('div',null,
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}},order.orderNum),
            h('span',{style:{marginLeft:10,fontSize:11,opacity:.8}},new Date(order.time).toLocaleTimeString()),
            order.customer&&order.customer.name&&h('div',{style:{fontSize:13,marginTop:4,opacity:.9}},
              '👤 '+order.customer.name+(order.customer.phone?' · 📞 '+order.customer.phone:'')+(order.customer.email?' · ✉️ '+order.customer.email:'')
            )
          ),
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{className:'order-status '+statusClass[order.status]},statusLabel[order.status]),
            order.status!=='done'&&h('button',{
              onClick:()=>updateStatus(realIdx,statusFlow[order.status]),
              style:{background:'rgba(255,255,255,.25)',border:'1px solid rgba(255,255,255,.4)',color:'white',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:"'Lato',sans-serif",whiteSpace:'nowrap'}
            },statusActionLabel[order.status])
          )
        ),
        h('div',{style:{padding:12}},
          (order.items||[]).map((item,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<order.items.length-1?'1px solid rgba(201,168,76,.15)':'none'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              item.imgUrl&&h('img',{src:item.imgUrl,style:{width:36,height:36,borderRadius:6,objectFit:'cover'}}),
              h('span',{style:{fontSize:14,color:'var(--text1)',fontWeight:600}},item.name)
            ),
            h('span',{style:{fontSize:14,color:'var(--gold3)',fontWeight:700}},'$'+item.price.toFixed(2))
          )),
          h('div',{style:{display:'flex',justifyContent:'space-between',paddingTop:8,borderTop:'1px solid rgba(201,168,76,.2)',marginTop:6}},
            h('span',{style:{fontSize:12,color:'var(--text3)'}},'Subtotal $'+subtotal.toFixed(2)+' + tax $'+tax.toFixed(2)),
            h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:'var(--text1)'}},'$'+(subtotal+tax).toFixed(2))
          ),
          h('div',{style:{marginTop:6,fontSize:11,color:'var(--text3)',fontStyle:'italic'}},'💳 Pay at register')
        )
      );
    })
  );
}

function TakeoutCartDrawer({cart, setCart, onClose, onCheckout, showToast, onViewLastOrder}){

  const [cachedOrder, setCachedOrder] = useState(null);
  useEffect(()=>{
    try{
      const s = localStorage.getItem('stellas_last_order');
      setCachedOrder(s ? JSON.parse(s) : null);
    }catch(e){ setCachedOrder(null); }
  },[]);
  // Read directly from sessionStorage every render — no state timing issues

  const subtotal = cart.reduce((s,i)=>s+(i.price||0),0);
  const tax = subtotal * 0.13;
  const total = subtotal + tax;
  const[step, setStep] = useState('cart'); // 'cart' | 'info'

  const[phone, setPhone] = useState('');
  const[email, setEmail] = useState('');

    setCart(c=>c.filter((_,i)=>i!==idx));
    showToast('Item removed');
  }

    if(cart.length===0) return;
    setStep('info');
  }

    const errs = {};
    if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errs.email = 'Enter a valid email';
    if(Object.keys(errs).length){ setErrors(errs); return; }
    setErrors({});
    onCheckout({name:name.trim(), phone:phone.trim(), email:email.trim()});

  const errStyle = {fontSize:11,color:'var(--red)',marginTop:3};

    h('div',{className:'cart-overlay',onClick:onClose}),

          ? h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}},

function TakeoutConfirmPopup({item, onConfirm, onCancel}){
  const startY=useRef(0);
  function onTouchStart(e){startY.current=e.touches[0].clientY;}
  function onTouchEnd(e){if(e.changedTouches[0].clientY-startY.current>60)onCancel();}
  return h('div',{className:'order-confirm-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'order-confirm-popup',onTouchStart,onTouchEnd},
      h('div',{style:{width:36,height:4,borderRadius:2,background:'rgba(0,0,0,.15)',margin:'0 auto 14px'}}),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},

          ? h('img',{src:item.imgUrl,alt:item.name,style:{width:56,height:56,borderRadius:10,objectFit:'cover',flexShrink:0,border:'1.5px solid var(--gold)'}})
          : h('div',{style:{width:56,height:56,borderRadius:10,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}},'🍽️'),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:'var(--text1)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},item.name),
          h('div',{style:{fontSize:13,color:'var(--gold3)',fontWeight:700,marginTop:2}},'$'+item.price),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:1}},'Add to takeout order?')
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:7,flexShrink:0}},
          h('button',{onClick:onConfirm,style:{background:'var(--green)',color:'white',border:'none',borderRadius:10,padding:'9px 18px',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:"'Lato',sans-serif",boxShadow:'var(--shadow-btn)'}},'✓ Yes'),

        )

    )
  );
}

// -------- MAIN APP ------------------------
// ==========================================
function App(){
  // State
  const[screen,setScreen]=useState('home');
  const[navTab,setNavTab]=useState('home');
  const[menu,setMenu]=useState(DEFAULT_MENU);
  const[messages,setMessages]=useState(DEFAULT_MESSAGES);
  const[faq,setFaq]=useState([]);
  const[tableOrders,setTableOrders]=useState(()=>store.get('stellas_orders',{}));
  const[selectedItem,setSelectedItem]=useState(null);
  const[aiResponse,setAiResponse]=useState('');
  const[videoUrl,setVideoUrl]=useState('');
  const[transcript,setTranscript]=useState('');
  const[ordered,setOrdered]=useState(false);
  const[showText,setShowText]=useState(false);
  const[showAdmin,setShowAdmin]=useState(false);
  const[adminAuth,setAdminAuth]=useState(false);
  const[adminTab,setAdminTab]=useState('live');
  const[toast,setToast]=useState('');
  const[tableNum,setTableNum]=useState(null);
  const[sessionBlocked,setSessionBlocked]=useState(false); // true when QR session is expired/invalid
  const[showSettings,setShowSettings]=useState(false);
  const[heygenFallback,setHeygenFallback]=useState(false);
  const[thinking,setThinking]=useState(false);
  const[showCart,setShowCart]=useState(false);
  const[pendingOrderItem,setPendingOrderItem]=useState(null);
  const[activeItem,setActiveItem]=useState(null); // last item user viewed -- for "add this"
  const[homeTitles,setHomeTitles]=useState(()=>store.get('stellas_home_titles',{highlights:'Menu Highlights',picks:"Chef's Picks",picksCategory:'Mains'}));
  // ── Takeout state ──
  const[takeoutCart,setTakeoutCart]=useState([]);
  const[orderVersion,setOrderVersion]=useState(0);
  const[showTakeoutCart,setShowTakeoutCart]=useState(false);
  const[pendingTakeoutItem,setPendingTakeoutItem]=useState(null);
  const[takeoutConfirmed,setTakeoutConfirmed]=useState(null);
  const recRef=useRef();

  // Load data: Supabase first, IndexedDB fallback -- runs on every mount
  useEffect(()=>{
    loadMenuData().then(v=>{ if(v&&v.length) setMenu(v); });
    loadMessagesData().then(v=>{ if(v&&v.length) setMessages(v); });
    loadFAQData().then(v=>{ if(v&&v.length) setFaq(v); });
  },[]);

  // -- TTS: speak AI response when readAloud is on --
  // Fires on every new aiResponse (voice + card-ask flow).
  // Text chat has its own inline TTS call so it can target the right message.
  useEffect(()=>{
    if(!aiResponse) return;
    const settings = loadSettings();
    if(!settings.readAloud) return;
    const langObj = LANGUAGES.find(l=>l.code===(settings.language||'en-US'))||LANGUAGES[0];
    // Small delay so video audio doesn't fight speech
    const tid = setTimeout(()=>{
      speakText(aiResponse, langObj.tts);
      console.log('[TTS] Auto-read response in', langObj.label);
    }, 600);
    return ()=>clearTimeout(tid);
  },[aiResponse]);

  // Check URL for table param + validate session token
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const t = params.get('table');
    const urlSession = params.get('session');
    if(!t) return; // no table in URL — normal home screen load

    const tNum = parseInt(t);
    console.log('[Table] QR scan detected -- Table:', tNum, '| Session:', urlSession||'none');

    if(urlSession){
      // Validate session token against stored valid token
      const validToken = getSession(tNum);
      if(validToken && urlSession !== validToken){
        // Token mismatch — this QR has been reset, block access
        console.log('[Session] BLOCKED -- URL token:', urlSession, '| Valid token:', validToken);
        setSessionBlocked(true);
        return;
      }
      if(!validToken){
        // No session stored yet — first scan, accept and store
        setSession(tNum, urlSession);
      }
    }

    // Valid session — allow table ordering
    setTableNum(tNum);
    const upd={...store.get('stellas_orders',{})};
    if(!upd[t]) upd[t]=[];
    setTableOrders(upd); store.set('stellas_orders',upd);

    // Auto-expire: track last activity time
    const INACTIVITY_MS = 45 * 60 * 1000; // 45 minutes
    const activityKey = 'stellas_last_activity_' + tNum;
    function markActivity(){ localStorage.setItem(activityKey, Date.now()); }
    function checkExpiry(){
      const last = parseInt(localStorage.getItem(activityKey)||'0');
      if(last && Date.now() - last > INACTIVITY_MS){
        console.log('[Session] Auto-expired after 45min inactivity -- Table:', tNum);
        resetSession(tNum); // generate new token, old QR now invalid
        setSessionBlocked(true);
      }
    }
    markActivity();
    // Check every 5 minutes
    const expiryTimer = setInterval(checkExpiry, 5 * 60 * 1000);
    // Mark activity on any user interaction
    const onActivity = ()=>markActivity();
    window.addEventListener('touchstart', onActivity, {passive:true});
    window.addEventListener('click', onActivity);
    return ()=>{
      clearInterval(expiryTimer);
      window.removeEventListener('touchstart', onActivity);
      window.removeEventListener('click', onActivity);
    };
  },[]);
  
  function showToast(msg){setToast(msg);}
  
  // Voice -- robust, works from table URLs
  function startListening(){
    setTranscript('');setOrdered(false);
    stopTTS(); // cancel any reading aloud before listening starts
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ setShowText(true); return; }

    // Resume AudioContext synchronously inside this gesture handler (iOS requirement)
    try{
      const AC=window.AudioContext||window.webkitAudioContext;
      if(AC){ const ac=new AC(); ac.resume().catch(()=>{}); }
    }catch(e){}

    forceUnlock(); // also unmute any pending videos

    setScreen('listening');
    setThinking(false);

    // Defer r.start() one microtask so React can flush the screen change first
    // This prevents the iOS race where setScreen re-render cancels the mic grant
    Promise.resolve().then(()=>{
      try{
        const r=new SR();
        r.continuous=false;
        r.interimResults=true;
        r.lang='en-US';
        recRef.current=r;
        let handled=false;

        r.onresult=e=>{
          const t=Array.from(e.results).map(x=>x[0].transcript).join('');
          setTranscript(t);
          if(e.results[e.results.length-1].isFinal){
            handled=true;
            r.stop();
            processVoiceText(t);
          }
        };

        r.onerror=e=>{
          handled=true;
          console.warn('[Voice] Error:',e.error);
          if(e.error==='not-allowed'||e.error==='service-not-allowed'){
            setScreen('home');
            showToast('Mic permission needed -- tap Allow when prompted');
          } else if(e.error==='no-speech'){
            setScreen('home'); // silent fail, don't toast
          } else {
            setScreen('home');
            showToast('Mic issue: '+e.error+' -- try again or use text chat');
          }
        };

        r.onend=()=>{
          if(handled)return;
          setScreen('home');
        };

        r.start();
        console.log('[Voice] Listening started');
      }catch(err){
        console.error('[Voice] Failed to start:',err);
        setScreen('home');
        showToast('Microphone unavailable -- use the text chat button instead');
      }
    });
  }

  // Separated from startListening so it always has fresh state via closure
  async function processVoiceText(text){
    if(!text||!text.trim()){setScreen('home');return;}
    console.log('[Voice] Processing:', text, '| Table mode:', tableNum||'none');
    setThinking(true);
    try{
    // -- Priority 0: Scan ALL menu item triggers first (works from any screen) --
    // Then also check activeItem/selectedItem for context-specific triggers
    const globalVoiceTrigger = matchAnyMenuTrigger(text, menu);
    const ctxItemVoice = activeItem || selectedItem || null;
    const localVoiceTrigger = ctxItemVoice ? matchMenuItemTrigger(text, ctxItemVoice) : null;
    const menuTriggerVoice = localVoiceTrigger || globalVoiceTrigger;

    if(menuTriggerVoice){
      console.log('[Multi-trigger] Voice matched:', menuTriggerVoice.phrase, '| action:', menuTriggerVoice.type, '| item:', menuTriggerVoice.item.name);
      setThinking(false);
      const mi = menuTriggerVoice.item;
      const trigVid = resolveTriggerVideo(menuTriggerVoice);
      setActiveItem(mi); // remember for follow-up "add it" phrases
      if(menuTriggerVoice.type === 'order-add' && tableNum){
        console.log('[Order] Pop-up shown for:', mi.name);
        setAiResponse('Sure! Want me to add '+mi.name+' to Table '+tableNum+'?');
        setSelectedItem(mi);
        setVideoUrl(trigVid);
        setScreen('response');
        setPendingOrderItem(mi);
      } else if(menuTriggerVoice.type === 'order-add'){
        console.log('[Order] Takeout pop-up shown for:', mi.name);
        setAiResponse('Sure! Want me to add '+mi.name+' to your takeout order?');
        setSelectedItem(mi);
        setVideoUrl(trigVid);
        setScreen('response');
        setPendingTakeoutItem(mi);
      } else {
        // item-request, info-only etc -- show item + play video
        setAiResponse(mi.desc ? mi.name+' -- '+mi.desc.split('.')[0]+'.' : mi.name+' is one of our favourites!');
        setSelectedItem(mi);
        setVideoUrl(trigVid);
        setScreen('response');
      }
      return;
    }

    // Context phrase → use activeItem || selectedItem STRICTLY, never fall through to AI
    if(detectContextPhrase(text)){
      // selectedItem is the item currently displayed on the response screen
      const ctxItem = activeItem || selectedItem || null;
      console.log('[Voice] Context phrase matched:', text);
      console.log('[Voice] Vague order on page:', text, '| Using current item:', ctxItem?.name||'none');
      setThinking(false);
      if(tableNum && ctxItem){
        console.log('[Order] Order triggered with:', ctxItem.name);
        console.log('[Order] Pop-up shown for:', ctxItem.name);
        setAiResponse('Sure! Want me to add '+ctxItem.name+' to Table '+tableNum+'?');
        setSelectedItem(ctxItem);
        setVideoUrl(resolveVideoUrl(ctxItem)||'');
        setScreen('response');
        setPendingOrderItem(ctxItem);
      } else if(!tableNum && ctxItem){
        console.log('[Order] Takeout pop-up for:', ctxItem.name);
        setAiResponse('Sure! Want me to add '+ctxItem.name+' to your takeout order?');
        setSelectedItem(ctxItem);
        setVideoUrl(resolveVideoUrl(ctxItem)||'');
        setScreen('response');
        setPendingTakeoutItem(ctxItem);
      } else {
        setAiResponse("Which item would you like? Tap a menu item first and I'll add it for you!");
        setSelectedItem(null);
        setVideoUrl('');
        setScreen('response');
      }
      return;
    }

      const{response,item,videoUrl:vid,noKey,orderIntent}=await askAI(text,menu,messages,tableNum,faq||[]);
      setThinking(false);
      if(noKey){showToast(response);setScreen('home');return;}

      // CRITICAL: always update activeItem from voice result so context phrases work
      if(item){ setActiveItem(item); console.log('[Voice] Current item on page:', item.name); }

      console.log('[Voice] AI result -- item:', item?.name||'none', '| video:', vid||'none', '| orderIntent:', orderIntent);

      // Order intent -- table OR takeout
      const effectiveOrderIntent = orderIntent || (item && detectOrderIntent(text));
      if(item && effectiveOrderIntent && tableNum){
        console.log('[Order] Intent detected from voice:', item.name, '| Table:', tableNum);
        setAiResponse(response||"Great choice!");
        setSelectedItem(item);
        setVideoUrl(vid||'');
        setOrdered(false);
        setHeygenFallback(false);
        setScreen('response');
        setPendingOrderItem(item);
        return;
      }
      if(item && effectiveOrderIntent && !tableNum){
        console.log('[Order] Takeout intent from voice:', item.name);
        setAiResponse(response||"Great choice!");
        setSelectedItem(item);
        setVideoUrl(vid||'');
        setOrdered(false);
        setHeygenFallback(false);
        setScreen('response');
        setPendingTakeoutItem(item);
        return;
      }

      setAiResponse(response||"Let me check that for you!");
      setSelectedItem(item||null);
      setVideoUrl(vid||'');
      setOrdered(false);
      setHeygenFallback(false);
      setScreen('response');
    }catch(err){
      console.error('[processVoiceText]',err);
      setThinking(false);
      setAiResponse("Let me check that for you!");
      setSelectedItem(null);
      setVideoUrl('');
      setScreen('response');
    }
  }

  // Keep stopProcess for the stop-button on listening screen
  function stopListen(){
    try{recRef.current?.stop();}catch(e){}
    const t=transcript;
    if(t&&t.trim()) processVoiceText(t);
    else setScreen('home');
  }
  
  // Order handler -- table mode OR takeout mode
  function placeOrder(item){
    if(tableNum){
      setPendingOrderItem(item); // table: existing confirm popup
    } else {
      setPendingTakeoutItem(item); // takeout: new takeout confirm popup
    }
  }

  // Confirm takeout item → add to takeout cart, play confirm video
  function confirmTakeoutItem(){
    const item = pendingTakeoutItem;
    if(!item){ setPendingTakeoutItem(null); return; }
    setTakeoutCart(c=>[...c, {...item, qty:1, time:Date.now(), status:'new'}]);
    setPendingTakeoutItem(null);
    showToast('✓ '+item.name+' added to takeout!');
    // Play order-confirmation video same logic as table
    const findConfirmVideo = ()=>{
      const byType = messages.find(m=>m.active&&(m.videoUrl||m.videoFilename)&&m.type==='order-confirmation');
      if(byType) return {vid:resolveVideoUrl(byType),img:byType.imgUrl||''};
      const byOld = messages.find(m=>m.active&&(m.videoUrl||m.videoFilename)&&m.type.toLowerCase().includes('order')&&m.type.toLowerCase().includes('confirm'));
      if(byOld) return {vid:resolveVideoUrl(byOld),img:byOld.imgUrl||''};
      const itemVid=resolveVideoUrl(item);
      return {vid:itemVid||'',img:item.imgUrl||''};
    };
    const {vid:confirmVid,img:confirmImg}=findConfirmVideo();
    setAiResponse("Added to your takeout order! Tap the cart to review or place your order.");
    setSelectedItem({...item,_confirmImg:confirmImg});
    setVideoUrl(confirmVid);
    setOrdered(true);
    setScreen('response');
  }

  // Place the full takeout order → show confirmation page
  function placeTakeoutOrder(customer){
    if(takeoutCart.length===0) return;
    const orderNum = genOrderNum();
    const orderItems = [...takeoutCart];
    const subtotal = orderItems.reduce((s,i)=>s+(i.price||0),0);
    const existing = store.get('stellas_takeout_orders',[]);
    const newOrder = {
      orderNum, items:orderItems, subtotal,
      customer: customer||{name:'',phone:'',email:''},
      time:Date.now(), status:'new'
    };
    store.set('stellas_takeout_orders',[...existing, newOrder]);
    // Cache in sessionStorage so customer can return to confirmation screen
    try{ localStorage.setItem('stellas_last_order', JSON.stringify({orderNum, items:orderItems, customer})); }catch(e){}
    setLastOrderNum(orderNum);
    setOrderVersion(v=>v+1);
    setTakeoutCart([]);
    setShowTakeoutCart(false);
    setTakeoutConfirmed({orderNum, items:orderItems, customer});
  }

  // Called when user taps "Yes" in voice confirm popup
  function confirmOrder(){
    const item=pendingOrderItem;
    if(!item||!tableNum){setPendingOrderItem(null);return;}

    console.log('[Order] Confirmed via popup:', item.name, '| Table:', tableNum);
    console.log('[Order] Pop-up shown for:', item.name, '| Table:', tableNum);

    // Write to localStorage
    const order={...item, qty:1, time:Date.now(), status:'new', tableId:tableNum};
    const upd={...tableOrders,[tableNum]:[...(tableOrders[tableNum]||[]),order]};
    setTableOrders(upd);
    store.set('stellas_orders',upd);
    console.log('[Order] Added to table', tableNum, ':', item.name);

    // Write to Supabase if configured
    const sbUrl=store.get('stellas_sb_url','').replace(/\/$/,'');
    const sbKey=store.get('stellas_sb_key','');
    if(sbUrl&&sbKey){
      fetch(sbUrl+'/rest/v1/orders',{
        method:'POST',
        headers:{
          'apikey':sbKey,
          'Authorization':'Bearer '+sbKey,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({
          table_id:String(tableNum),
          item_name:item.name,
          item_price:item.price,
          item_img:item.imgUrl||'',
          qty:1,
          status:'pending',
          created_at:new Date().toISOString()
        })
      }).then(r=>{
        console.log('[Supabase] Order insert status:', r.status);
        if(!r.ok)r.text().then(t=>console.error('[Supabase] Order insert error:', t));
      }).catch(e=>console.error('[Supabase] Order write failed:', e));
    }

    setPendingOrderItem(null);
    setOrdered(true);
    showToast('🍽️ '+item.name+' added to Table '+tableNum+'!');

    // -- Strict video priority for order confirmation --
    // 1. Message with type 'order-confirmed' (custom type you can set in Messages)
    // 2. Message with trigger keyword containing 'order-confirmed' or 'order confirmed'
    // 3. Message with type 'announcement' (closest built-in type)
    // 4. Item's own video
    // 5. Empty -- show idle image, NEVER the welcome video
    const findConfirmVideo = ()=>{
      // Priority 1: any message type containing "order" AND "confirm" (catches "Order Confirmation", "order-confirmed", etc.)
      const byType = messages.find(m=>m.active&&(m.videoUrl||m.videoFilename)&&
        m.type.toLowerCase().includes('order')&&m.type.toLowerCase().includes('confirm'));
      if(byType){ console.log('[Order] Confirm video: type match --',byType.type); return {vid:resolveVideoUrl(byType), img:byType.imgUrl||''}; }

      // Priority 2: any message whose trigger keywords include 'order-confirmed'
      const byKeyword = messages.find(m=>m.active&&(m.triggerKeywords||'').toLowerCase().includes('order-confirmed')&&(m.videoUrl||m.videoFilename));
      if(byKeyword){ console.log('[Order] Confirm video: trigger keyword match'); return {vid:resolveVideoUrl(byKeyword), img:byKeyword.imgUrl||''}; }

      // Priority 3: message whose title/body suggests confirmation
      const confirmWords = ['confirm','order','sent','way','table','right out','placed','received'];
      const byContent = messages.find(m=>m.active&&(m.videoUrl||m.videoFilename)&&confirmWords.some(w=>(m.title+' '+m.body).toLowerCase().includes(w)));
      if(byContent){ console.log('[Order] Confirm video: content match --',byContent.title); return {vid:resolveVideoUrl(byContent), img:byContent.imgUrl||''}; }

      // Priority 4: announcement type
      const byAnnouncement = messages.find(m=>m.active&&m.type==='announcement'&&(m.videoUrl||m.videoFilename));
      if(byAnnouncement){ console.log('[Order] Confirm video: announcement type'); return {vid:resolveVideoUrl(byAnnouncement), img:byAnnouncement.imgUrl||''}; }

      // Priority 5: ANY active message with a video (last resort)
      const anyMsg = messages.find(m=>m.active&&m.type!=='welcome'&&m.type!=='goodbye'&&(m.videoUrl||m.videoFilename));
      if(anyMsg){ console.log('[Order] Confirm video: first available --',anyMsg.title); return {vid:resolveVideoUrl(anyMsg), img:anyMsg.imgUrl||''}; }

      // Priority 6: item's own video
      const itemVid = resolveVideoUrl(item);
      if(itemVid){ console.log('[Order] Confirm video: item video'); return {vid:itemVid, img:item.imgUrl||''}; }

      console.log('[Order] No confirm video found');
      return {vid:'', img:item.imgUrl||''};
    };
    const {vid:confirmVid, img:confirmImg} = findConfirmVideo();

    setAiResponse("I'll have that sent right out to you as soon as it's ready!");
    setSelectedItem({...item, _confirmImg: confirmImg}); // carry confirm image for idle
    setVideoUrl(confirmVid);
    setOrdered(true);
    console.log('[Order] Confirmed -- switching to idle with thumbnail:', confirmImg||item.imgUrl||'no image');
    setScreen('response');
  }
